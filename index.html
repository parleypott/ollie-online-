<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollie's Universe</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #0a1628;
      color: #e8e6f0;
      font-family: 'Press Start 2P', monospace;
      -webkit-font-smoothing: none;
      image-rendering: pixelated;
      height: 100%;
      overflow-x: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 30%, rgba(30,90,255,0.15) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(30,90,255,0.03) 3px, rgba(30,90,255,0.03) 4px),
        #0a1628;
    }

    h1 {
      font-size: clamp(20px, 5vw, 64px);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4dacff;
      text-shadow:
        0 0 10px rgba(77,172,255,0.6),
        0 0 40px rgba(77,172,255,0.2),
        3px 3px 0 #0a2a5c;
      margin-bottom: 24px;
    }

    /* planet */
    .caption {
      font-size: clamp(8px, 2vw, 14px);
      color: #ff4466;
      text-shadow: 0 0 10px rgba(255,68,102,0.6), 0 0 30px rgba(255,68,102,0.2);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
      animation: caption-pulse 2s ease-in-out infinite;
    }

    @keyframes caption-pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; text-shadow: 0 0 15px rgba(255,68,102,0.8), 0 0 40px rgba(255,68,102,0.3); }
    }

    .planet-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vw, 30px);
      margin: 8px 0 36px;
    }

    .planet-wrap {
      position: relative;
      width: clamp(80px, 15vw, 140px);
      height: clamp(80px, 15vw, 140px);
      animation: float 4s ease-in-out infinite;
    }

    .dog-wrap {
      position: relative;
      width: clamp(90px, 16vw, 160px);
      height: clamp(90px, 16vw, 160px);
      animation: float 4s ease-in-out infinite;
      animation-delay: 0.5s;
    }

    .dog-wrap canvas {
      width: 100%;
      height: 100%;
    }

    .sideeye-wrap {
      position: relative;
      width: clamp(90px, 16vw, 160px);
      height: clamp(90px, 16vw, 160px);
      animation: float 4s ease-in-out infinite;
      animation-delay: 1s;
    }

    .sideeye-wrap canvas {
      width: 100%;
      height: 100%;
    }

    .sideeye-caption {
      font-size: clamp(5px, 1.2vw, 9px);
      color: #ff44ff;
      text-shadow: 0 0 10px rgba(255,68,255,0.6), 0 0 30px rgba(255,68,255,0.3);
      text-align: center;
      letter-spacing: 0.05em;
      animation: caption-pulse 2s ease-in-out infinite;
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .planet {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #6ec6ff 0%, #2a7cdb 40%, #0f3a7a 80%, #091e42 100%);
      box-shadow:
        0 0 20px rgba(77,172,255,0.4),
        0 0 60px rgba(77,172,255,0.15),
        inset -8px -8px 20px rgba(0,0,0,0.5);
    }

    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(75deg);
      width: 180%;
      height: 180%;
      border-radius: 50%;
      border: 3px solid rgba(77,172,255,0.3);
      box-shadow:
        0 0 8px rgba(77,172,255,0.2),
        inset 0 0 8px rgba(77,172,255,0.1);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* stars */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* buttons */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      max-width: 700px;
      position: relative;
      z-index: 1;
    }

    .game-btn {
      width: clamp(100px, 25vw, 160px);
      height: clamp(60px, 12vw, 90px);
      border: 2px solid rgba(77,172,255,0.4);
      border-radius: 8px;
      background: rgba(77,172,255,0.06);
      cursor: pointer;
      position: relative;
      animation: pulse-glow 3s ease-in-out infinite;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .game-btn:nth-child(2) { animation-delay: 0.4s; }
    .game-btn:nth-child(3) { animation-delay: 0.8s; }
    .game-btn:nth-child(4) { animation-delay: 1.2s; }
    .game-btn:nth-child(5) { animation-delay: 1.6s; }

    .game-btn:hover {
      transform: scale(1.08);
      border-color: rgba(77,172,255,0.8);
      box-shadow:
        0 0 20px rgba(77,172,255,0.4),
        0 0 40px rgba(77,172,255,0.15),
        inset 0 0 15px rgba(77,172,255,0.1);
    }

    .game-btn::after {
      content: "?";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 3vw, 28px);
      color: rgba(77,172,255,0.3);
    }

    .game-btn.has-label::after {
      content: none;
    }

    .game-btn .btn-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.8vw, 11px);
      color: #4dacff;
      line-height: 1.6;
      text-shadow: 0 0 8px rgba(77,172,255,0.4);
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow:
          0 0 8px rgba(77,172,255,0.1),
          0 0 20px rgba(77,172,255,0.05);
        border-color: rgba(77,172,255,0.3);
      }
      50% {
        box-shadow:
          0 0 15px rgba(77,172,255,0.3),
          0 0 40px rgba(77,172,255,0.1),
          inset 0 0 10px rgba(77,172,255,0.05);
        border-color: rgba(77,172,255,0.6);
      }
    }

    .page > * { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="page">
    <h1>Ollie's Universe</h1>

    <div class="caption">"The perfect smile doesn't exist"</div>

    <div class="planet-row">
      <div class="planet-wrap">
        <div class="planet"></div>
        <div class="ring"></div>
      </div>
      <div class="dog-wrap">
        <canvas id="dogCanvas" width="300" height="300"></canvas>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="sideeye-caption">BOMBASTIC SIDEEYE</div>
        <div class="sideeye-wrap">
          <canvas id="sideEyeCanvas" width="300" height="300"></canvas>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button class="game-btn has-label" onclick="location.href='pick-the-plot.html'"><span class="btn-label">Pick the<br>Plot</span></button>
      <button class="game-btn has-label" onclick="location.href='dino-run.html'"><span class="btn-label">Dino<br>Run</span></button>
      <button class="game-btn has-label" onclick="location.href='rocket-run.html'"><span class="btn-label">Rocket<br>Run</span></button>
      <button class="game-btn has-label" onclick="location.href='hamster-hunt.html'"><span class="btn-label">Hamster<br>Hunt</span></button>
      <button class="game-btn has-label" onclick="location.href='reggie-forest.html'"><span class="btn-label">Reggie in<br>the Forest</span></button>
    </div>
  </div>

  <script>
    // Draw photorealistic corgi with cheeky smile
    (function(){
      const dc = document.getElementById('dogCanvas');
      const c = dc.getContext('2d');
      const W = 300, H = 300;
      const cx = W/2, cy = 155;

      // Soft blur helper
      function softEll(x,y,rx,ry,color,rot){
        c.fillStyle=color;
        c.beginPath();c.ellipse(x,y,rx,ry,rot||0,0,Math.PI*2);c.fill();
      }

      // === NECK / BODY peek ===
      const neckG = c.createLinearGradient(cx,cy+60,cx,cy+100);
      neckG.addColorStop(0,'#d49540');
      neckG.addColorStop(1,'#b07828');
      softEll(cx,cy+82,70,30,neckG);

      // White chest
      const chestG = c.createRadialGradient(cx,cy+78,5,cx,cy+78,35);
      chestG.addColorStop(0,'#fffcf6');
      chestG.addColorStop(0.7,'#f5ece0');
      chestG.addColorStop(1,'#ddd0c0');
      softEll(cx,cy+78,40,22,chestG);

      // Chest fur tufts
      for(let i=-4;i<=4;i++){
        softEll(cx+i*8, cy+76, 6, 12, 'rgba(255,250,240,0.25)');
      }

      // === EARS (behind head) ===
      for(let side=-1;side<=1;side+=2){
        const ex = cx+side*50;
        // Ear outer
        const earG = c.createLinearGradient(ex,100,ex-side*10,20);
        earG.addColorStop(0,'#c48030');
        earG.addColorStop(0.5,'#d49540');
        earG.addColorStop(1,'#b87828');
        c.fillStyle=earG;
        c.beginPath();
        c.moveTo(ex-side*18, 108);
        c.bezierCurveTo(ex-side*30, 50, ex+side*5, 12, ex+side*18, 15);
        c.bezierCurveTo(ex+side*35, 18, ex+side*28, 65, ex+side*18, 108);
        c.closePath();
        c.fill();

        // Ear edge highlight
        c.strokeStyle='rgba(220,170,100,0.4)';
        c.lineWidth=2;
        c.beginPath();
        c.moveTo(ex-side*16, 105);
        c.bezierCurveTo(ex-side*28, 52, ex+side*5, 16, ex+side*16, 18);
        c.stroke();

        // Ear inner pink
        const earInG = c.createLinearGradient(ex,95,ex,30);
        earInG.addColorStop(0,'#f0b8a0');
        earInG.addColorStop(0.4,'#f2c0aa');
        earInG.addColorStop(1,'#e8a890');
        c.fillStyle=earInG;
        c.beginPath();
        c.moveTo(ex-side*10, 100);
        c.bezierCurveTo(ex-side*20, 56, ex+side*6, 26, ex+side*12, 28);
        c.bezierCurveTo(ex+side*24, 30, ex+side*20, 68, ex+side*12, 100);
        c.closePath();
        c.fill();

        // Ear inner shadow
        softEll(ex+side*2, 80, 10, 25, 'rgba(180,100,70,0.15)');
      }

      // === HEAD (main shape) ===
      // Base fur with multi-stop gradient
      const headG = c.createRadialGradient(cx,cy-10,15,cx,cy+5,90);
      headG.addColorStop(0,'#eaac58');
      headG.addColorStop(0.3,'#dca048');
      headG.addColorStop(0.6,'#cc8c38');
      headG.addColorStop(0.85,'#b87828');
      headG.addColorStop(1,'#9a6420');
      c.fillStyle=headG;
      c.beginPath();
      c.ellipse(cx,cy,88,80,0,0,Math.PI*2);
      c.fill();

      // Subtle side shading
      softEll(cx-65,cy, 30,55, 'rgba(130,70,20,0.2)', 0.1);
      softEll(cx+65,cy, 30,55, 'rgba(130,70,20,0.2)', -0.1);

      // Top of head lighter
      softEll(cx,cy-45, 40,25, 'rgba(240,190,110,0.3)');

      // Cheek fluff
      softEll(cx-55,cy+15, 28,30, 'rgba(210,160,80,0.3)');
      softEll(cx+55,cy+15, 28,30, 'rgba(210,160,80,0.3)');

      // === WHITE BLAZE (corgi marking) ===
      // Smooth white stripe
      const blazeG = c.createLinearGradient(cx,cy-65,cx,cy+70);
      blazeG.addColorStop(0,'#fff9f2');
      blazeG.addColorStop(0.5,'#fffcf8');
      blazeG.addColorStop(1,'#fff5ea');
      c.fillStyle=blazeG;
      c.beginPath();
      c.moveTo(cx-20, cy-62);
      c.bezierCurveTo(cx-26, cy-30, cx-30, cy, cx-32, cy+20);
      c.bezierCurveTo(cx-34, cy+45, cx-28, cy+68, cx, cy+72);
      c.bezierCurveTo(cx+28, cy+68, cx+34, cy+45, cx+32, cy+20);
      c.bezierCurveTo(cx+30, cy, cx+26, cy-30, cx+20, cy-62);
      c.closePath();
      c.fill();

      // Blaze soft edge blending
      softEll(cx-28, cy+5, 8, 50, 'rgba(220,170,90,0.15)');
      softEll(cx+28, cy+5, 8, 50, 'rgba(220,170,90,0.15)');

      // === MUZZLE ===
      // White muzzle puffs
      const muzzG = c.createRadialGradient(cx,cy+28,5,cx,cy+28,40);
      muzzG.addColorStop(0,'#fffdf8');
      muzzG.addColorStop(0.6,'#fef8f0');
      muzzG.addColorStop(1,'#f5ece0');
      softEll(cx,cy+28, 42, 32, muzzG);

      // Left muzzle puff
      softEll(cx-14, cy+24, 22, 20, 'rgba(255,252,245,0.7)', 0.1);
      // Right muzzle puff
      softEll(cx+14, cy+24, 22, 20, 'rgba(255,252,245,0.7)', -0.1);
      // Muzzle highlight
      softEll(cx, cy+18, 14, 8, 'rgba(255,255,255,0.3)');

      // === EYES ===
      const eyeY = cy-10;
      const eyeSpread = 32;

      for(let side=-1;side<=1;side+=2){
        const ex = cx+eyeSpread*side;

        // Eye socket shadow
        softEll(ex, eyeY, 18, 15, 'rgba(120,70,20,0.12)');

        // Eye white
        const ewG = c.createRadialGradient(ex,eyeY,2,ex,eyeY,13);
        ewG.addColorStop(0,'#ffffff');
        ewG.addColorStop(0.7,'#f8f4ee');
        ewG.addColorStop(1,'#e8ddd0');
        c.fillStyle=ewG;
        c.beginPath();
        c.moveTo(ex-14,eyeY+1);
        c.bezierCurveTo(ex-10,eyeY-12, ex+10,eyeY-12, ex+14,eyeY+1);
        c.bezierCurveTo(ex+10,eyeY+10, ex-10,eyeY+10, ex-14,eyeY+1);
        c.fill();

        // Iris
        const iG = c.createRadialGradient(ex+side,eyeY,1,ex+side,eyeY,9);
        iG.addColorStop(0,'#5a3010');
        iG.addColorStop(0.3,'#6a3a18');
        iG.addColorStop(0.7,'#3a1e08');
        iG.addColorStop(1,'#2a1505');
        c.fillStyle=iG;
        c.beginPath();c.arc(ex+side,eyeY,9,0,Math.PI*2);c.fill();

        // Pupil
        c.fillStyle='#0a0502';
        c.beginPath();c.arc(ex+side,eyeY+0.5,5,0,Math.PI*2);c.fill();

        // Eye shine (big)
        c.fillStyle='rgba(255,255,255,0.92)';
        c.beginPath();c.arc(ex+side+3.5,eyeY-3,2.8,0,Math.PI*2);c.fill();
        // Eye shine (small)
        c.fillStyle='rgba(255,255,255,0.5)';
        c.beginPath();c.arc(ex+side-2,eyeY+2.5,1.5,0,Math.PI*2);c.fill();

        // Warm iris reflection
        c.fillStyle='rgba(200,150,80,0.15)';
        c.beginPath();c.arc(ex+side,eyeY+3,4,0,Math.PI*2);c.fill();

        // Eye outline
        c.strokeStyle='#3a1a08';
        c.lineWidth=1.5;
        c.beginPath();
        c.moveTo(ex-14,eyeY+1);
        c.bezierCurveTo(ex-10,eyeY-12, ex+10,eyeY-12, ex+14,eyeY+1);
        c.bezierCurveTo(ex+10,eyeY+10, ex-10,eyeY+10, ex-14,eyeY+1);
        c.stroke();

        // Lower eyelid subtle line
        c.strokeStyle='rgba(80,40,10,0.2)';
        c.lineWidth=1;
        c.beginPath();
        c.bezierCurveTo(ex-12,eyeY+9,ex,eyeY+12,ex+12,eyeY+9);
        c.stroke();

        // Eyelash flicks (top)
        c.strokeStyle='rgba(60,30,10,0.3)';
        c.lineWidth=1;
        c.beginPath();c.moveTo(ex+side*12,eyeY-5);c.lineTo(ex+side*16,eyeY-9);c.stroke();
        c.beginPath();c.moveTo(ex+side*10,eyeY-8);c.lineTo(ex+side*13,eyeY-13);c.stroke();
      }

      // Slight squint / happy lines under eyes
      for(let side=-1;side<=1;side+=2){
        const ex = cx+eyeSpread*side;
        c.strokeStyle='rgba(160,100,50,0.12)';
        c.lineWidth=1;
        c.beginPath();
        c.arc(ex, eyeY+4, 16, 0.2*side+0.3, 0.2*side+1.2);
        c.stroke();
      }

      // === NOSE ===
      // Nose shape
      const noseG = c.createRadialGradient(cx-2,cy+14,2,cx,cy+18,12);
      noseG.addColorStop(0,'#333');
      noseG.addColorStop(0.5,'#1a1a1a');
      noseG.addColorStop(1,'#111');
      c.fillStyle=noseG;
      c.beginPath();
      c.moveTo(cx, cy+10);
      c.bezierCurveTo(cx-12, cy+8, cx-14, cy+18, cx-8, cy+22);
      c.bezierCurveTo(cx-4, cy+24, cx+4, cy+24, cx+8, cy+22);
      c.bezierCurveTo(cx+14, cy+18, cx+12, cy+8, cx, cy+10);
      c.fill();

      // Nose shine
      c.fillStyle='rgba(255,255,255,0.18)';
      c.beginPath();c.ellipse(cx-3,cy+13,4,2.5,0.4,0,Math.PI*2);c.fill();
      c.fillStyle='rgba(255,255,255,0.08)';
      c.beginPath();c.ellipse(cx+2,cy+12,2.5,1.5,-0.2,0,Math.PI*2);c.fill();

      // Nostrils
      c.fillStyle='#050505';
      c.beginPath();c.ellipse(cx-4,cy+18,2.5,1.8,0.2,0,Math.PI*2);c.fill();
      c.beginPath();c.ellipse(cx+4,cy+18,2.5,1.8,-0.2,0,Math.PI*2);c.fill();

      // Nose to mouth line (philtrum)
      c.strokeStyle='rgba(100,60,30,0.3)';
      c.lineWidth=1.5;
      c.beginPath();c.moveTo(cx,cy+23);c.lineTo(cx,cy+32);c.stroke();

      // === SMILE ===
      // Natural corgi smile - wide and happy with upturned corners
      c.strokeStyle='#6a3a18';
      c.lineWidth=2.2;
      c.lineCap='round';
      c.lineJoin='round';

      // Main mouth curve
      c.beginPath();
      c.moveTo(cx-38,cy+28);
      c.bezierCurveTo(cx-28,cy+34, cx-10,cy+38, cx,cy+35);
      c.bezierCurveTo(cx+10,cy+38, cx+28,cy+34, cx+38,cy+28);
      c.stroke();

      // Smile corners turning up
      c.strokeStyle='#7a4420';
      c.lineWidth=1.8;
      c.beginPath();
      c.moveTo(cx-38,cy+28);
      c.bezierCurveTo(cx-42,cy+25, cx-43,cy+22, cx-40,cy+20);
      c.stroke();
      c.beginPath();
      c.moveTo(cx+38,cy+28);
      c.bezierCurveTo(cx+42,cy+25, cx+43,cy+22, cx+40,cy+20);
      c.stroke();

      // Tongue peeking out
      const tongueG = c.createRadialGradient(cx,cy+42,2,cx,cy+44,14);
      tongueG.addColorStop(0,'#ff8888');
      tongueG.addColorStop(0.5,'#ee6666');
      tongueG.addColorStop(1,'#cc4444');
      c.fillStyle=tongueG;
      c.beginPath();
      c.moveTo(cx-10,cy+35);
      c.bezierCurveTo(cx-12,cy+42, cx-8,cy+52, cx,cy+54);
      c.bezierCurveTo(cx+8,cy+52, cx+12,cy+42, cx+10,cy+35);
      c.closePath();
      c.fill();

      // Tongue center line
      c.strokeStyle='rgba(180,60,60,0.3)';
      c.lineWidth=1;
      c.beginPath();c.moveTo(cx,cy+36);c.lineTo(cx,cy+51);c.stroke();

      // Tongue highlight
      softEll(cx-2, cy+42, 4, 6, 'rgba(255,170,170,0.35)');

      // === WHISKER DOTS ===
      c.fillStyle='rgba(80,50,20,0.3)';
      for(let side=-1;side<=1;side+=2){
        for(let row=0;row<3;row++){
          for(let col=0;col<2;col++){
            c.beginPath();
            c.arc(cx+side*(20+col*6), cy+20+row*5, 1.2, 0, Math.PI*2);
            c.fill();
          }
        }
      }

      // === FUR TEXTURE ===
      // Many tiny strokes radiating outward for fur feel
      const seed = 42;
      function prand(i){ return ((Math.sin(i*127.1+seed)*43758.5453)%1+1)%1; }
      c.lineWidth=0.7;
      for(let i=0;i<120;i++){
        const angle = prand(i)*Math.PI*2;
        const dist = 30+prand(i+500)*55;
        const fx = cx+Math.cos(angle)*dist;
        const fy = cy+Math.sin(angle)*dist*0.85;
        // Skip if in white blaze area
        if(Math.abs(fx-cx)<25 && fy>cy-40) continue;
        const fl = 4+prand(i+200)*7;
        const fa = angle+Math.PI+(-0.4+prand(i+300)*0.8);
        const bright = 140+Math.floor(prand(i+400)*60);
        c.strokeStyle=`rgba(${bright},${Math.floor(bright*0.6)},${Math.floor(bright*0.3)},0.08)`;
        c.beginPath();
        c.moveTo(fx,fy);
        c.lineTo(fx+Math.cos(fa)*fl, fy+Math.sin(fa)*fl);
        c.stroke();
      }

      // White blaze fur strokes
      c.strokeStyle='rgba(200,190,175,0.06)';
      for(let i=0;i<30;i++){
        const fx = cx-15+prand(i+600)*30;
        const fy = cy-20+prand(i+700)*60;
        const fl = 3+prand(i+800)*5;
        c.beginPath();
        c.moveTo(fx,fy);
        c.lineTo(fx,fy+fl);
        c.stroke();
      }

      // === SOFT LIGHTING ===
      // Top light source
      const topLight = c.createRadialGradient(cx-20,cy-60,10,cx,cy,100);
      topLight.addColorStop(0,'rgba(255,240,200,0.1)');
      topLight.addColorStop(1,'rgba(0,0,0,0)');
      c.fillStyle=topLight;
      c.fillRect(0,0,W,H);

      // Subtle warm rim light on right
      const rimG = c.createRadialGradient(cx+80,cy-20,10,cx+80,cy-20,60);
      rimG.addColorStop(0,'rgba(255,200,120,0.06)');
      rimG.addColorStop(1,'rgba(0,0,0,0)');
      c.fillStyle=rimG;
      c.fillRect(0,0,W,H);
    })();

    // Draw animated side-eye face
    (function(){
      const sc = document.getElementById('sideEyeCanvas');
      const c = sc.getContext('2d');
      const W = 300, H = 300;
      const cx = W/2, cy = 155;

      function softEll(x,y,rx,ry,color,rot){
        c.fillStyle=color;
        c.beginPath();c.ellipse(x,y,rx,ry,rot||0,0,Math.PI*2);c.fill();
      }

      function drawFace(eyeOffX, eyeOffY) {
        c.clearRect(0,0,W,H);

        // Neck
        const neckG = c.createLinearGradient(cx,cy+60,cx,cy+100);
        neckG.addColorStop(0,'#c89060');
        neckG.addColorStop(1,'#a07040');
        softEll(cx,cy+82,60,28,neckG);

        // Head shape
        const headG = c.createRadialGradient(cx,cy-10,15,cx,cy+5,90);
        headG.addColorStop(0,'#f0c080');
        headG.addColorStop(0.4,'#e0a868');
        headG.addColorStop(0.8,'#c89050');
        headG.addColorStop(1,'#a07030');
        c.fillStyle=headG;
        c.beginPath();
        c.ellipse(cx,cy,85,80,0,0,Math.PI*2);
        c.fill();

        // Ears (round, cat-like)
        for(let side=-1;side<=1;side+=2){
          const ex = cx+side*52;
          const earG = c.createRadialGradient(ex,cy-60,5,ex,cy-55,35);
          earG.addColorStop(0,'#e8a860');
          earG.addColorStop(1,'#b07830');
          c.fillStyle=earG;
          c.beginPath();
          c.moveTo(ex-side*15, cy-50);
          c.bezierCurveTo(ex-side*20, cy-100, ex+side*25, cy-105, ex+side*20, cy-55);
          c.closePath();
          c.fill();

          // Inner ear
          const earInG = c.createRadialGradient(ex+side*2,cy-70,2,ex+side*2,cy-65,18);
          earInG.addColorStop(0,'#f0b8a0');
          earInG.addColorStop(1,'#e09878');
          c.fillStyle=earInG;
          c.beginPath();
          c.moveTo(ex-side*8, cy-55);
          c.bezierCurveTo(ex-side*12, cy-92, ex+side*18, cy-95, ex+side*14, cy-58);
          c.closePath();
          c.fill();
        }

        // Muzzle area (lighter)
        const muzzG = c.createRadialGradient(cx,cy+20,5,cx,cy+20,40);
        muzzG.addColorStop(0,'#fff4e8');
        muzzG.addColorStop(0.6,'#f8e8d4');
        muzzG.addColorStop(1,'#e8d0b8');
        softEll(cx,cy+22,38,30,muzzG);

        // === EYES (animated) ===
        const eyeY = cy-12;
        const eyeSpread = 34;

        for(let side=-1;side<=1;side+=2){
          const ex = cx+eyeSpread*side;

          // Eye white - big expressive eyes
          const ewG = c.createRadialGradient(ex,eyeY,2,ex,eyeY,18);
          ewG.addColorStop(0,'#ffffff');
          ewG.addColorStop(0.8,'#f4f0ea');
          ewG.addColorStop(1,'#e0d8cc');
          c.fillStyle=ewG;
          c.beginPath();
          c.ellipse(ex, eyeY, 18, 16, 0, 0, Math.PI*2);
          c.fill();

          // Eye outline
          c.strokeStyle='#4a2a10';
          c.lineWidth=2;
          c.beginPath();
          c.ellipse(ex, eyeY, 18, 16, 0, 0, Math.PI*2);
          c.stroke();

          // Iris (shifted by eyeOffX, eyeOffY for side-eye)
          const irisX = ex + eyeOffX;
          const irisY = eyeY + eyeOffY;
          const iG = c.createRadialGradient(irisX,irisY,1,irisX,irisY,10);
          iG.addColorStop(0,'#5a3818');
          iG.addColorStop(0.5,'#3a2008');
          iG.addColorStop(1,'#2a1505');
          c.fillStyle=iG;
          c.beginPath();c.arc(irisX,irisY,10,0,Math.PI*2);c.fill();

          // Pupil
          c.fillStyle='#0a0502';
          c.beginPath();c.arc(irisX,irisY+0.5,5.5,0,Math.PI*2);c.fill();

          // Eye shine
          c.fillStyle='rgba(255,255,255,0.92)';
          c.beginPath();c.arc(irisX+3,irisY-3,3,0,Math.PI*2);c.fill();
          c.fillStyle='rgba(255,255,255,0.45)';
          c.beginPath();c.arc(irisX-2,irisY+2.5,1.5,0,Math.PI*2);c.fill();

          // Eyelid (half-closed for the side-eye look)
          c.fillStyle=headG;
          c.beginPath();
          c.ellipse(ex, eyeY-10, 20, 10, 0, 0, Math.PI*2);
          c.fill();
          // Redraw upper eye boundary
          c.strokeStyle='#4a2a10';
          c.lineWidth=2.5;
          c.beginPath();
          c.ellipse(ex, eyeY, 18, 16, 0, Math.PI+0.3, Math.PI*2-0.3);
          c.stroke();

          // Eyelashes
          c.strokeStyle='#3a1a08';
          c.lineWidth=1.5;
          c.beginPath();c.moveTo(ex+side*16,eyeY-6);c.lineTo(ex+side*21,eyeY-12);c.stroke();
          c.beginPath();c.moveTo(ex+side*13,eyeY-10);c.lineTo(ex+side*17,eyeY-16);c.stroke();
        }

        // Eyebrow on one side raised for sass
        c.strokeStyle='#5a3018';
        c.lineWidth=3;
        c.lineCap='round';
        // Left eyebrow (raised)
        c.beginPath();
        c.moveTo(cx-55, cy-38);
        c.bezierCurveTo(cx-45, cy-48, cx-25, cy-48, cx-15, cy-38);
        c.stroke();
        // Right eyebrow (flat/slightly raised)
        c.beginPath();
        c.moveTo(cx+15, cy-34);
        c.bezierCurveTo(cx+25, cy-40, cx+45, cy-40, cx+55, cy-34);
        c.stroke();

        // Nose
        const noseG = c.createRadialGradient(cx-1,cy+10,2,cx,cy+14,10);
        noseG.addColorStop(0,'#333');
        noseG.addColorStop(1,'#111');
        c.fillStyle=noseG;
        c.beginPath();
        c.moveTo(cx, cy+6);
        c.bezierCurveTo(cx-10, cy+5, cx-12, cy+14, cx-6, cy+18);
        c.bezierCurveTo(cx-2, cy+20, cx+2, cy+20, cx+6, cy+18);
        c.bezierCurveTo(cx+12, cy+14, cx+10, cy+5, cx, cy+6);
        c.fill();

        // Nose shine
        c.fillStyle='rgba(255,255,255,0.15)';
        c.beginPath();c.ellipse(cx-2,cy+10,3,2,0.3,0,Math.PI*2);c.fill();

        // Smirk (one-sided smile for sass)
        c.strokeStyle='#5a3018';
        c.lineWidth=2.5;
        c.lineCap='round';
        c.beginPath();
        c.moveTo(cx-30, cy+32);
        c.bezierCurveTo(cx-15, cy+36, cx+5, cy+36, cx+15, cy+32);
        c.bezierCurveTo(cx+25, cy+28, cx+32, cy+24, cx+35, cy+20);
        c.stroke();

        // Cheek blush
        softEll(cx-40, cy+18, 12, 8, 'rgba(255,120,120,0.12)');
        softEll(cx+42, cy+18, 12, 8, 'rgba(255,120,120,0.12)');

        // Fur texture
        const seed = 77;
        function prand(i){ return ((Math.sin(i*127.1+seed)*43758.5453)%1+1)%1; }
        c.lineWidth=0.7;
        for(let i=0;i<80;i++){
          const angle = prand(i)*Math.PI*2;
          const dist = 35+prand(i+500)*50;
          const fx = cx+Math.cos(angle)*dist;
          const fy = cy+Math.sin(angle)*dist*0.85;
          if(Math.abs(fx-cx)<30 && fy>cy) continue;
          const fl = 3+prand(i+200)*6;
          const fa = angle+Math.PI+(-0.3+prand(i+300)*0.6);
          const bright = 160+Math.floor(prand(i+400)*50);
          c.strokeStyle=`rgba(${bright},${Math.floor(bright*0.65)},${Math.floor(bright*0.35)},0.07)`;
          c.beginPath();
          c.moveTo(fx,fy);
          c.lineTo(fx+Math.cos(fa)*fl, fy+Math.sin(fa)*fl);
          c.stroke();
        }

        // Top light
        const topLight = c.createRadialGradient(cx-20,cy-60,10,cx,cy,100);
        topLight.addColorStop(0,'rgba(255,240,200,0.08)');
        topLight.addColorStop(1,'rgba(0,0,0,0)');
        c.fillStyle=topLight;
        c.fillRect(0,0,W,H);
      }

      // Animate eyes looking to the side
      let t = 0;
      function animate(){
        t += 0.025;
        // Eyes drift to the right and slightly up, then hold, then drift back
        const cycle = t % (Math.PI*2);
        let offX, offY;
        if(cycle < 1.5) {
          // Moving to side-eye position
          const p = cycle / 1.5;
          offX = 7 * p;
          offY = -2 * p;
        } else if(cycle < 4.5) {
          // Holding side-eye
          offX = 7;
          offY = -2;
        } else if(cycle < 5.5) {
          // Quick glance back to center
          const p = (cycle - 4.5) / 1.0;
          offX = 7 * (1 - p);
          offY = -2 * (1 - p);
        } else {
          // Brief center hold
          offX = 0;
          offY = 0;
        }
        drawFace(offX, offY);
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // generate random stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 3 + 1;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.animationDuration = (Math.random() * 2 + 2) + 's';
      container.appendChild(s);
    }
  </script>
</body>
</html>
