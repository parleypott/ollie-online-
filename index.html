<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollie's Universe</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #0a1628;
      color: #e8e6f0;
      font-family: 'Press Start 2P', monospace;
      -webkit-font-smoothing: none;
      image-rendering: pixelated;
      height: 100%;
      overflow-x: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 30%, rgba(30,90,255,0.15) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(30,90,255,0.03) 3px, rgba(30,90,255,0.03) 4px),
        #0a1628;
    }

    h1 {
      font-size: clamp(20px, 5vw, 64px);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4dacff;
      text-shadow:
        0 0 10px rgba(77,172,255,0.6),
        0 0 40px rgba(77,172,255,0.2),
        3px 3px 0 #0a2a5c;
      margin-bottom: 24px;
    }

    /* planet */
    .caption {
      font-size: clamp(8px, 2vw, 14px);
      color: #ff4466;
      text-shadow: 0 0 10px rgba(255,68,102,0.6), 0 0 30px rgba(255,68,102,0.2);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
      animation: caption-pulse 2s ease-in-out infinite;
    }

    @keyframes caption-pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; text-shadow: 0 0 15px rgba(255,68,102,0.8), 0 0 40px rgba(255,68,102,0.3); }
    }

    .planet-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vw, 30px);
      margin: 8px 0 36px;
    }

    .planet-wrap {
      position: relative;
      width: clamp(80px, 15vw, 140px);
      height: clamp(80px, 15vw, 140px);
      animation: float 4s ease-in-out infinite;
    }

    .dog-wrap {
      position: relative;
      width: clamp(90px, 16vw, 160px);
      height: clamp(90px, 16vw, 160px);
      animation: float 4s ease-in-out infinite;
      animation-delay: 0.5s;
    }

    .dog-wrap canvas {
      width: 100%;
      height: 100%;
    }

    .planet {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #6ec6ff 0%, #2a7cdb 40%, #0f3a7a 80%, #091e42 100%);
      box-shadow:
        0 0 20px rgba(77,172,255,0.4),
        0 0 60px rgba(77,172,255,0.15),
        inset -8px -8px 20px rgba(0,0,0,0.5);
    }

    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(75deg);
      width: 180%;
      height: 180%;
      border-radius: 50%;
      border: 3px solid rgba(77,172,255,0.3);
      box-shadow:
        0 0 8px rgba(77,172,255,0.2),
        inset 0 0 8px rgba(77,172,255,0.1);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* stars */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* buttons */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      max-width: 700px;
      position: relative;
      z-index: 1;
    }

    .game-btn {
      width: clamp(100px, 25vw, 160px);
      height: clamp(60px, 12vw, 90px);
      border: 2px solid rgba(77,172,255,0.4);
      border-radius: 8px;
      background: rgba(77,172,255,0.06);
      cursor: pointer;
      position: relative;
      animation: pulse-glow 3s ease-in-out infinite;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .game-btn:nth-child(2) { animation-delay: 0.4s; }
    .game-btn:nth-child(3) { animation-delay: 0.8s; }
    .game-btn:nth-child(4) { animation-delay: 1.2s; }
    .game-btn:nth-child(5) { animation-delay: 1.6s; }

    .game-btn:hover {
      transform: scale(1.08);
      border-color: rgba(77,172,255,0.8);
      box-shadow:
        0 0 20px rgba(77,172,255,0.4),
        0 0 40px rgba(77,172,255,0.15),
        inset 0 0 15px rgba(77,172,255,0.1);
    }

    .game-btn::after {
      content: "?";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 3vw, 28px);
      color: rgba(77,172,255,0.3);
    }

    .game-btn.has-label::after {
      content: none;
    }

    .game-btn .btn-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.8vw, 11px);
      color: #4dacff;
      line-height: 1.6;
      text-shadow: 0 0 8px rgba(77,172,255,0.4);
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow:
          0 0 8px rgba(77,172,255,0.1),
          0 0 20px rgba(77,172,255,0.05);
        border-color: rgba(77,172,255,0.3);
      }
      50% {
        box-shadow:
          0 0 15px rgba(77,172,255,0.3),
          0 0 40px rgba(77,172,255,0.1),
          inset 0 0 10px rgba(77,172,255,0.05);
        border-color: rgba(77,172,255,0.6);
      }
    }

    .page > * { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="page">
    <h1>Ollie's Universe</h1>

    <div class="caption">"The perfect smile doesn't exist"</div>

    <div class="planet-row">
      <div class="planet-wrap">
        <div class="planet"></div>
        <div class="ring"></div>
      </div>
      <div class="dog-wrap">
        <canvas id="dogCanvas" width="200" height="200"></canvas>
      </div>
    </div>

    <div class="buttons">
      <button class="game-btn has-label" onclick="location.href='pick-the-plot.html'"><span class="btn-label">Pick the<br>Plot</span></button>
      <button class="game-btn has-label" onclick="location.href='dino-run.html'"><span class="btn-label">Dino<br>Run</span></button>
      <button class="game-btn has-label" onclick="location.href='rocket-run.html'"><span class="btn-label">Rocket<br>Run</span></button>
      <button class="game-btn has-label" onclick="location.href='hamster-hunt.html'"><span class="btn-label">Hamster<br>Hunt</span></button>
      <button class="game-btn"></button>
    </div>
  </div>

  <script>
    // Draw evil corgi
    (function(){
      const dc = document.getElementById('dogCanvas');
      const c = dc.getContext('2d');
      const W = 200, H = 200;
      const cx = W/2, cy = 105;

      // Helper: ellipse shortcut
      function ell(x,y,rx,ry,color,outline){
        c.fillStyle=color;
        c.beginPath();c.ellipse(x,y,rx,ry,0,0,Math.PI*2);c.fill();
        if(outline){c.strokeStyle=outline;c.lineWidth=1.5;c.stroke();}
      }

      // === EARS (behind head) ===
      // Left ear - big pointy corgi ear
      c.fillStyle='#c07830';
      c.beginPath();
      c.moveTo(42,72);
      c.quadraticCurveTo(25,18,52,8);
      c.quadraticCurveTo(78,14,72,72);
      c.closePath();
      c.fill();
      // Left ear inner
      c.fillStyle='#ffbbaa';
      c.beginPath();
      c.moveTo(48,68);
      c.quadraticCurveTo(36,28,54,18);
      c.quadraticCurveTo(70,24,66,68);
      c.closePath();
      c.fill();
      // Left ear inner darker
      c.fillStyle='#ee9988';
      c.beginPath();
      c.moveTo(52,64);
      c.quadraticCurveTo(42,36,56,26);
      c.quadraticCurveTo(66,32,62,64);
      c.closePath();
      c.fill();

      // Right ear
      c.fillStyle='#c07830';
      c.beginPath();
      c.moveTo(158,72);
      c.quadraticCurveTo(175,18,148,8);
      c.quadraticCurveTo(122,14,128,72);
      c.closePath();
      c.fill();
      // Right ear inner
      c.fillStyle='#ffbbaa';
      c.beginPath();
      c.moveTo(152,68);
      c.quadraticCurveTo(164,28,146,18);
      c.quadraticCurveTo(130,24,134,68);
      c.closePath();
      c.fill();
      c.fillStyle='#ee9988';
      c.beginPath();
      c.moveTo(148,64);
      c.quadraticCurveTo(158,36,144,26);
      c.quadraticCurveTo(134,32,138,64);
      c.closePath();
      c.fill();

      // === HEAD (main shape) ===
      // Fur base - orange/sable
      const headGrad = c.createRadialGradient(cx,cy-5,10,cx,cy,62);
      headGrad.addColorStop(0,'#e8a050');
      headGrad.addColorStop(0.6,'#cc8030');
      headGrad.addColorStop(1,'#a06020');
      c.fillStyle=headGrad;
      c.beginPath();
      c.ellipse(cx,cy,60,55,0,0,Math.PI*2);
      c.fill();

      // Darker fur on sides
      c.fillStyle='rgba(140,80,30,0.35)';
      c.beginPath();c.ellipse(cx-42,cy-5,22,40,0.15,0,Math.PI*2);c.fill();
      c.beginPath();c.ellipse(cx+42,cy-5,22,40,-0.15,0,Math.PI*2);c.fill();

      // Forehead lighter streak
      c.fillStyle='rgba(240,190,120,0.4)';
      c.beginPath();c.ellipse(cx,cy-28,18,18,0,0,Math.PI*2);c.fill();

      // === WHITE FACE MARKINGS (corgi blaze) ===
      // White stripe down center of face
      c.fillStyle='#fff8f0';
      c.beginPath();
      c.moveTo(cx-16, cy-40);
      c.quadraticCurveTo(cx-20, cy-10, cx-22, cy+10);
      c.quadraticCurveTo(cx-24, cy+35, cx-18, cy+48);
      c.lineTo(cx+18, cy+48);
      c.quadraticCurveTo(cx+24, cy+35, cx+22, cy+10);
      c.quadraticCurveTo(cx+20, cy-10, cx+16, cy-40);
      c.closePath();
      c.fill();

      // White muzzle area
      c.fillStyle='#fff8f0';
      c.beginPath();
      c.ellipse(cx, cy+22, 30, 26, 0, 0, Math.PI*2);
      c.fill();

      // Muzzle puff - slightly raised
      c.fillStyle='#ffefe0';
      c.beginPath();
      c.ellipse(cx-10, cy+18, 16, 14, 0.1, 0, Math.PI*2);
      c.fill();
      c.beginPath();
      c.ellipse(cx+10, cy+18, 16, 14, -0.1, 0, Math.PI*2);
      c.fill();

      // === EYES - narrowed and evil ===
      const eyeY = cy-6;
      const eyeSpread = 22;

      // Eye shadow/brow area (furrowed brows)
      c.fillStyle='rgba(100,50,10,0.35)';
      c.beginPath();c.ellipse(cx-eyeSpread,eyeY-3,16,10,-0.15,0,Math.PI*2);c.fill();
      c.beginPath();c.ellipse(cx+eyeSpread,eyeY-3,16,10,0.15,0,Math.PI*2);c.fill();

      // Angry brow ridges
      c.strokeStyle='#8a4a10';
      c.lineWidth=3;
      c.lineCap='round';
      // Left brow - angled down toward center (angry)
      c.beginPath();
      c.moveTo(cx-eyeSpread-14, eyeY-14);
      c.quadraticCurveTo(cx-eyeSpread, eyeY-18, cx-eyeSpread+10, eyeY-10);
      c.stroke();
      // Right brow
      c.beginPath();
      c.moveTo(cx+eyeSpread+14, eyeY-14);
      c.quadraticCurveTo(cx+eyeSpread, eyeY-18, cx+eyeSpread-10, eyeY-10);
      c.stroke();

      // Eye whites (narrow slits - evil squint)
      for(let side=-1;side<=1;side+=2){
        const ex=cx+eyeSpread*side;
        // Eye white - narrow almond shape
        c.fillStyle='#f8f0e8';
        c.beginPath();
        c.moveTo(ex-11,eyeY);
        c.quadraticCurveTo(ex,eyeY-7,ex+11,eyeY);
        c.quadraticCurveTo(ex,eyeY+6,ex-11,eyeY);
        c.fill();

        // Iris
        const irisGrad=c.createRadialGradient(ex+side*1,eyeY,1,ex+side*1,eyeY,7);
        irisGrad.addColorStop(0,'#dd2200');
        irisGrad.addColorStop(0.5,'#cc1100');
        irisGrad.addColorStop(1,'#880000');
        c.fillStyle=irisGrad;
        c.beginPath();c.arc(ex+side*1,eyeY,6,0,Math.PI*2);c.fill();

        // Pupil
        c.fillStyle='#110000';
        c.beginPath();c.ellipse(ex+side*1,eyeY,3.5,4,0,0,Math.PI*2);c.fill();

        // Eye shine
        c.fillStyle='rgba(255,255,255,0.85)';
        c.beginPath();c.arc(ex+side*1+2.5,eyeY-2,1.8,0,Math.PI*2);c.fill();
        c.fillStyle='rgba(255,255,255,0.4)';
        c.beginPath();c.arc(ex+side*1-1.5,eyeY+1.5,1,0,Math.PI*2);c.fill();

        // Eye outline
        c.strokeStyle='#3a1a00';
        c.lineWidth=1.2;
        c.beginPath();
        c.moveTo(ex-11,eyeY);
        c.quadraticCurveTo(ex,eyeY-7,ex+11,eyeY);
        c.quadraticCurveTo(ex,eyeY+6,ex-11,eyeY);
        c.stroke();
      }

      // Red eye glow
      c.globalCompositeOperation='lighter';
      c.fillStyle='rgba(255,30,0,0.12)';
      c.beginPath();c.arc(cx-eyeSpread,eyeY,14,0,Math.PI*2);c.fill();
      c.beginPath();c.arc(cx+eyeSpread,eyeY,14,0,Math.PI*2);c.fill();
      c.globalCompositeOperation='source-over';

      // === NOSE ===
      c.fillStyle='#1a1a1a';
      c.beginPath();
      c.moveTo(cx,cy+10);
      c.quadraticCurveTo(cx-8,cy+6,cx-7,cy+10);
      c.quadraticCurveTo(cx,cy+16,cx+7,cy+10);
      c.quadraticCurveTo(cx+8,cy+6,cx,cy+10);
      c.fill();
      // Nose shine
      c.fillStyle='rgba(255,255,255,0.2)';
      c.beginPath();c.ellipse(cx-2,cy+8,2.5,1.5,0.3,0,Math.PI*2);c.fill();
      // Nose to mouth line
      c.strokeStyle='#5a3010';
      c.lineWidth=1.5;
      c.beginPath();c.moveTo(cx,cy+15);c.lineTo(cx,cy+22);c.stroke();

      // === EVIL GRIN ===
      // Mouth line - wide sinister smile curving up at edges
      c.strokeStyle='#4a2008';
      c.lineWidth=2;
      c.lineCap='round';
      c.beginPath();
      c.moveTo(cx-28,cy+22);
      c.quadraticCurveTo(cx-18,cy+20,cx,cy+24);
      c.quadraticCurveTo(cx+18,cy+20,cx+28,cy+22);
      c.stroke();

      // Corners curled up (evil smile)
      c.beginPath();
      c.moveTo(cx-28,cy+22);
      c.quadraticCurveTo(cx-32,cy+18,cx-30,cy+15);
      c.stroke();
      c.beginPath();
      c.moveTo(cx+28,cy+22);
      c.quadraticCurveTo(cx+32,cy+18,cx+30,cy+15);
      c.stroke();

      // Teeth peeking through
      c.fillStyle='#ffffff';
      // Left fang
      c.beginPath();
      c.moveTo(cx-20,cy+21);
      c.lineTo(cx-17,cy+28);
      c.lineTo(cx-14,cy+21);
      c.fill();
      // Right fang
      c.beginPath();
      c.moveTo(cx+20,cy+21);
      c.lineTo(cx+17,cy+28);
      c.lineTo(cx+14,cy+21);
      c.fill();
      // Small center teeth
      c.beginPath();
      c.moveTo(cx-5,cy+23);
      c.lineTo(cx-4,cy+27);
      c.lineTo(cx-2,cy+23);
      c.fill();
      c.beginPath();
      c.moveTo(cx+2,cy+23);
      c.lineTo(cx+4,cy+27);
      c.lineTo(cx+5,cy+23);
      c.fill();

      // === WHISKER DOTS ===
      c.fillStyle='#9a6a30';
      for(let side=-1;side<=1;side+=2){
        for(let i=0;i<3;i++){
          c.beginPath();
          c.arc(cx+side*18, cy+14+i*4, 1, 0, Math.PI*2);
          c.fill();
        }
      }

      // === CHEST FLUFF (bottom) ===
      c.fillStyle='#fff8f0';
      c.beginPath();
      c.ellipse(cx, cy+52, 34, 14, 0, 0, Math.PI);
      c.fill();
      // Fluff texture
      c.fillStyle='rgba(220,200,180,0.3)';
      for(let i=-3;i<=3;i++){
        c.beginPath();
        c.ellipse(cx+i*8, cy+50, 5, 8, 0, 0, Math.PI*2);
        c.fill();
      }

      // === FUR TEXTURE (subtle) ===
      c.strokeStyle='rgba(160,90,30,0.12)';
      c.lineWidth=0.5;
      for(let i=0;i<40;i++){
        const angle=Math.random()*Math.PI*2;
        const dist=20+Math.random()*35;
        const fx=cx+Math.cos(angle)*dist;
        const fy=cy+Math.sin(angle)*dist*0.85;
        const fl=3+Math.random()*5;
        const fa=angle+Math.PI+(-0.3+Math.random()*0.6);
        c.beginPath();
        c.moveTo(fx,fy);
        c.lineTo(fx+Math.cos(fa)*fl,fy+Math.sin(fa)*fl);
        c.stroke();
      }

      // === OUTER GLOW (evil aura) ===
      c.globalCompositeOperation='lighter';
      const glow=c.createRadialGradient(cx,cy,40,cx,cy,90);
      glow.addColorStop(0,'rgba(255,50,0,0.04)');
      glow.addColorStop(1,'rgba(255,0,0,0)');
      c.fillStyle=glow;
      c.fillRect(0,0,W,H);
      c.globalCompositeOperation='source-over';
    })();

    // generate random stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 3 + 1;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.animationDuration = (Math.random() * 2 + 2) + 's';
      container.appendChild(s);
    }
  </script>
</body>
</html>
