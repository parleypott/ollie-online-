<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollie's Universe</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #0a1628;
      color: #e8e6f0;
      font-family: 'Press Start 2P', monospace;
      -webkit-font-smoothing: none;
      image-rendering: pixelated;
      height: 100%;
      overflow-x: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 30%, rgba(30,90,255,0.15) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(30,90,255,0.03) 3px, rgba(30,90,255,0.03) 4px),
        #0a1628;
    }

    h1 {
      font-size: clamp(20px, 5vw, 64px);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4dacff;
      text-shadow:
        0 0 10px rgba(77,172,255,0.6),
        0 0 40px rgba(77,172,255,0.2),
        3px 3px 0 #0a2a5c;
      margin-bottom: 24px;
    }

    /* planet */
    .caption {
      font-size: clamp(8px, 2vw, 14px);
      color: #ff4466;
      text-shadow: 0 0 10px rgba(255,68,102,0.6), 0 0 30px rgba(255,68,102,0.2);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
      animation: caption-pulse 2s ease-in-out infinite;
    }

    @keyframes caption-pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; text-shadow: 0 0 15px rgba(255,68,102,0.8), 0 0 40px rgba(255,68,102,0.3); }
    }

    .planet-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vw, 30px);
      margin: 8px 0 36px;
    }

    .planet-wrap {
      position: relative;
      width: clamp(80px, 15vw, 140px);
      height: clamp(80px, 15vw, 140px);
      animation: float 4s ease-in-out infinite;
    }

    .dog-wrap {
      position: relative;
      width: clamp(70px, 13vw, 120px);
      height: clamp(70px, 13vw, 120px);
      animation: float 4s ease-in-out infinite;
      animation-delay: 0.5s;
    }

    .dog-wrap canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .planet {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #6ec6ff 0%, #2a7cdb 40%, #0f3a7a 80%, #091e42 100%);
      box-shadow:
        0 0 20px rgba(77,172,255,0.4),
        0 0 60px rgba(77,172,255,0.15),
        inset -8px -8px 20px rgba(0,0,0,0.5);
    }

    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(75deg);
      width: 180%;
      height: 180%;
      border-radius: 50%;
      border: 3px solid rgba(77,172,255,0.3);
      box-shadow:
        0 0 8px rgba(77,172,255,0.2),
        inset 0 0 8px rgba(77,172,255,0.1);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* stars */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* buttons */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      max-width: 700px;
      position: relative;
      z-index: 1;
    }

    .game-btn {
      width: clamp(100px, 25vw, 160px);
      height: clamp(60px, 12vw, 90px);
      border: 2px solid rgba(77,172,255,0.4);
      border-radius: 8px;
      background: rgba(77,172,255,0.06);
      cursor: pointer;
      position: relative;
      animation: pulse-glow 3s ease-in-out infinite;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .game-btn:nth-child(2) { animation-delay: 0.4s; }
    .game-btn:nth-child(3) { animation-delay: 0.8s; }
    .game-btn:nth-child(4) { animation-delay: 1.2s; }
    .game-btn:nth-child(5) { animation-delay: 1.6s; }

    .game-btn:hover {
      transform: scale(1.08);
      border-color: rgba(77,172,255,0.8);
      box-shadow:
        0 0 20px rgba(77,172,255,0.4),
        0 0 40px rgba(77,172,255,0.15),
        inset 0 0 15px rgba(77,172,255,0.1);
    }

    .game-btn::after {
      content: "?";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 3vw, 28px);
      color: rgba(77,172,255,0.3);
    }

    .game-btn.has-label::after {
      content: none;
    }

    .game-btn .btn-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.8vw, 11px);
      color: #4dacff;
      line-height: 1.6;
      text-shadow: 0 0 8px rgba(77,172,255,0.4);
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow:
          0 0 8px rgba(77,172,255,0.1),
          0 0 20px rgba(77,172,255,0.05);
        border-color: rgba(77,172,255,0.3);
      }
      50% {
        box-shadow:
          0 0 15px rgba(77,172,255,0.3),
          0 0 40px rgba(77,172,255,0.1),
          inset 0 0 10px rgba(77,172,255,0.05);
        border-color: rgba(77,172,255,0.6);
      }
    }

    .page > * { position: relative; z-index: 1; }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="page">
    <h1>Ollie's Universe</h1>

    <div class="caption">"The perfect smile doesn't exist"</div>

    <div class="planet-row">
      <div class="planet-wrap">
        <div class="planet"></div>
        <div class="ring"></div>
      </div>
      <div class="dog-wrap">
        <canvas id="dogCanvas" width="64" height="64"></canvas>
      </div>
    </div>

    <div class="buttons">
      <button class="game-btn has-label" onclick="location.href='pick-the-plot.html'"><span class="btn-label">Pick the<br>Plot</span></button>
      <button class="game-btn has-label" onclick="location.href='dino-run.html'"><span class="btn-label">Dino<br>Run</span></button>
      <button class="game-btn has-label" onclick="location.href='rocket-run.html'"><span class="btn-label">Rocket<br>Run</span></button>
      <button class="game-btn has-label" onclick="location.href='hamster-hunt.html'"><span class="btn-label">Hamster<br>Hunt</span></button>
      <button class="game-btn"></button>
    </div>
  </div>

  <script>
    // Draw evil dog pixel art
    (function(){
      const dc = document.getElementById('dogCanvas');
      const dx = dc.getContext('2d');
      const P = 2; // pixel size
      // Color palette
      const _ = null; // transparent
      const K = '#111'; // black
      const D = '#3a2a1a'; // dark brown
      const B = '#6b4e2a'; // brown
      const L = '#a07840'; // light brown
      const T = '#c4a060'; // tan
      const W = '#e8d8c0'; // white/cream
      const R = '#ff2222'; // red eyes
      const G = '#cc0000'; // dark red glow
      const P2 = '#ffaaaa'; // tongue/mouth
      const F = '#ffffff'; // fangs/teeth

      // 32x32 evil dog face
      const dog = [
        // Row 0-3: ears sticking up
        [_,_,_,_,_,_,K,K,K,_,_,_,_,_,_,_,_,_,_,_,_,_,_,K,K,K,_,_,_,_,_,_],
        [_,_,_,_,_,K,D,D,D,K,_,_,_,_,_,_,_,_,_,_,_,K,D,D,D,K,_,_,_,_,_,_],
        [_,_,_,_,K,D,B,B,B,D,K,_,_,_,_,_,_,_,_,_,K,D,B,B,B,D,K,_,_,_,_,_],
        [_,_,_,K,D,B,B,L,B,B,D,K,_,_,_,_,_,_,_,K,D,B,B,L,B,B,D,K,_,_,_,_],
        // Row 4-5: ear meets head
        [_,_,_,K,D,B,L,L,L,B,D,K,K,K,K,K,K,K,K,K,D,B,L,L,L,B,D,K,_,_,_,_],
        [_,_,_,K,D,B,L,L,B,B,D,D,D,D,D,D,D,D,D,D,D,B,B,L,L,B,D,K,_,_,_,_],
        // Row 6-9: top of head
        [_,_,_,_,K,D,B,B,B,D,D,B,B,B,B,B,B,B,B,B,B,D,D,B,B,B,D,K,_,_,_,_],
        [_,_,_,_,_,K,D,D,D,B,B,B,L,L,L,L,L,L,L,L,B,B,B,D,D,D,K,_,_,_,_,_],
        [_,_,_,_,_,_,K,K,B,B,L,L,L,L,L,L,L,L,L,L,L,L,B,B,K,K,_,_,_,_,_,_],
        [_,_,_,_,_,_,_,K,B,L,L,L,L,L,L,L,L,L,L,L,L,L,L,B,K,_,_,_,_,_,_,_],
        // Row 10-11: brow ridge
        [_,_,_,_,_,_,K,B,L,L,L,K,K,K,L,L,L,L,K,K,K,L,L,L,B,K,_,_,_,_,_,_],
        [_,_,_,_,_,_,K,B,L,L,K,K,K,K,K,L,L,K,K,K,K,K,L,L,B,K,_,_,_,_,_,_],
        // Row 12-14: eyes (red/evil)
        [_,_,_,_,_,_,K,B,L,K,K,R,R,R,K,L,L,K,R,R,R,K,K,L,B,K,_,_,_,_,_,_],
        [_,_,_,_,_,_,K,B,L,K,G,R,R,G,K,L,L,K,G,R,R,G,K,L,B,K,_,_,_,_,_,_],
        [_,_,_,_,_,_,K,B,L,K,K,R,R,K,K,L,L,K,K,R,R,K,K,L,B,K,_,_,_,_,_,_],
        // Row 15-16: under eyes / nose bridge
        [_,_,_,_,_,_,K,B,L,L,K,K,K,K,L,L,L,L,K,K,K,K,L,L,B,K,_,_,_,_,_,_],
        [_,_,_,_,_,_,K,B,L,L,L,L,L,L,L,T,T,L,L,L,L,L,L,L,B,K,_,_,_,_,_,_],
        // Row 17-18: nose
        [_,_,_,_,_,_,K,B,L,L,L,L,L,L,K,K,K,K,L,L,L,L,L,L,B,K,_,_,_,_,_,_],
        [_,_,_,_,_,_,K,B,L,L,L,L,L,K,K,K,K,K,K,L,L,L,L,L,B,K,_,_,_,_,_,_],
        // Row 19-20: snout / start of evil grin
        [_,_,_,_,_,_,K,B,L,L,L,L,L,L,K,K,K,K,L,L,L,L,L,L,B,K,_,_,_,_,_,_],
        [_,_,_,_,_,K,B,L,L,L,K,K,K,K,K,K,K,K,K,K,K,K,L,L,L,B,K,_,_,_,_,_],
        // Row 21-23: the evil grin with fangs
        [_,_,_,_,K,B,L,L,K,K,F,F,K,P2,P2,P2,P2,P2,K,F,F,K,K,L,L,B,K,_,_,_,_,_],
        [_,_,_,_,K,B,L,K,K,F,F,K,P2,P2,P2,P2,P2,P2,K,F,F,K,K,L,B,K,_,_,_,_,_],
        [_,_,_,_,K,B,L,L,K,K,K,P2,P2,P2,P2,P2,P2,P2,P2,K,K,K,L,L,B,K,_,_,_,_,_],
        // Row 24-25: chin
        [_,_,_,_,_,K,B,L,L,K,K,K,K,P2,P2,P2,P2,K,K,K,K,L,L,B,K,_,_,_,_,_,_,_],
        [_,_,_,_,_,_,K,B,L,L,L,K,K,K,K,K,K,K,K,L,L,L,B,K,_,_,_,_,_,_,_,_],
        // Row 26-28: lower jaw/neck
        [_,_,_,_,_,_,_,K,B,L,L,L,L,L,L,L,L,L,L,L,L,B,K,_,_,_,_,_,_,_,_,_],
        [_,_,_,_,_,_,_,_,K,B,B,L,L,L,L,L,L,L,L,B,B,K,_,_,_,_,_,_,_,_,_,_],
        [_,_,_,_,_,_,_,_,_,K,K,B,B,B,B,B,B,B,B,K,K,_,_,_,_,_,_,_,_,_,_,_],
        // Row 29-31: bottom
        [_,_,_,_,_,_,_,_,_,_,K,K,K,K,K,K,K,K,K,K,_,_,_,_,_,_,_,_,_,_,_,_],
        [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
        [_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_,_],
      ];

      dog.forEach((row, y) => {
        row.forEach((c, x) => {
          if(c) {
            dx.fillStyle = c;
            dx.fillRect(x*P, y*P, P, P);
          }
        });
      });

      // Add red eye glow effect
      dx.globalCompositeOperation = 'lighter';
      dx.fillStyle = 'rgba(255,0,0,0.15)';
      dx.beginPath(); dx.arc(12*P, 13*P, 4*P, 0, Math.PI*2); dx.fill();
      dx.beginPath(); dx.arc(20*P, 13*P, 4*P, 0, Math.PI*2); dx.fill();
      dx.globalCompositeOperation = 'source-over';
    })();

    // generate random stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 3 + 1;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.animationDuration = (Math.random() * 2 + 2) + 's';
      container.appendChild(s);
    }
  </script>
</body>
</html>
