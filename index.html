<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollie's Universe</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #0a1628;
      color: #e8e6f0;
      font-family: 'Press Start 2P', monospace;
      -webkit-font-smoothing: none;
      image-rendering: pixelated;
      height: 100%;
      overflow-x: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 30%, rgba(30,90,255,0.15) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(30,90,255,0.03) 3px, rgba(30,90,255,0.03) 4px),
        #0a1628;
    }

    h1 {
      font-size: clamp(20px, 5vw, 64px);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4dacff;
      text-shadow:
        0 0 10px rgba(77,172,255,0.6),
        0 0 40px rgba(77,172,255,0.2),
        3px 3px 0 #0a2a5c;
      margin-bottom: 24px;
    }

    /* planet */
    .caption {
      font-size: clamp(8px, 2vw, 14px);
      color: #ff4466;
      text-shadow: 0 0 10px rgba(255,68,102,0.6), 0 0 30px rgba(255,68,102,0.2);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
      animation: caption-pulse 2s ease-in-out infinite;
    }

    @keyframes caption-pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; text-shadow: 0 0 15px rgba(255,68,102,0.8), 0 0 40px rgba(255,68,102,0.3); }
    }

    .planet-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(12px, 3vw, 30px);
      margin: 8px 0 36px;
    }

    .planet-wrap {
      position: relative;
      width: clamp(80px, 15vw, 140px);
      height: clamp(80px, 15vw, 140px);
      animation: float 4s ease-in-out infinite;
    }

    .dog-wrap {
      position: relative;
      width: clamp(90px, 16vw, 160px);
      height: clamp(90px, 16vw, 160px);
      animation: float 4s ease-in-out infinite;
      animation-delay: 0.5s;
    }

    .dog-wrap canvas {
      width: 100%;
      height: 100%;
    }

    .sideeye-wrap {
      position: relative;
      width: clamp(90px, 16vw, 160px);
      height: clamp(90px, 16vw, 160px);
      animation: float 4s ease-in-out infinite;
      animation-delay: 1s;
    }

    .sideeye-wrap canvas {
      width: 100%;
      height: 100%;
    }

    .turret-wrap {
      position: relative;
      width: clamp(80px, 15vw, 140px);
      height: clamp(80px, 15vw, 140px);
      animation: float 4s ease-in-out infinite;
      animation-delay: 1.5s;
    }

    .turret-wrap canvas {
      width: 100%;
      height: 100%;
    }

    .turret-caption {
      font-size: clamp(5px, 1.2vw, 9px);
      color: #44ddff;
      text-shadow: 0 0 10px rgba(68,221,255,0.6), 0 0 30px rgba(68,221,255,0.3);
      text-align: center;
      letter-spacing: 0.05em;
      animation: caption-pulse 2s ease-in-out infinite;
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .sideeye-caption {
      font-size: clamp(5px, 1.2vw, 9px);
      color: #ff44ff;
      text-shadow: 0 0 10px rgba(255,68,255,0.6), 0 0 30px rgba(255,68,255,0.3);
      text-align: center;
      letter-spacing: 0.05em;
      animation: caption-pulse 2s ease-in-out infinite;
      margin-bottom: 4px;
      white-space: nowrap;
    }

    .planet {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 35%, #6ec6ff 0%, #2a7cdb 40%, #0f3a7a 80%, #091e42 100%);
      box-shadow:
        0 0 20px rgba(77,172,255,0.4),
        0 0 60px rgba(77,172,255,0.15),
        inset -8px -8px 20px rgba(0,0,0,0.5);
    }

    .ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotateX(75deg);
      width: 180%;
      height: 180%;
      border-radius: 50%;
      border: 3px solid rgba(77,172,255,0.3);
      box-shadow:
        0 0 8px rgba(77,172,255,0.2),
        inset 0 0 8px rgba(77,172,255,0.1);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    /* stars */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    /* buttons */
    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 16px;
      max-width: 700px;
      position: relative;
      z-index: 1;
    }

    .game-btn {
      width: clamp(100px, 25vw, 160px);
      height: clamp(60px, 12vw, 90px);
      border: 2px solid rgba(77,172,255,0.4);
      border-radius: 8px;
      background: rgba(77,172,255,0.06);
      cursor: pointer;
      position: relative;
      animation: pulse-glow 3s ease-in-out infinite;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .game-btn:nth-child(2) { animation-delay: 0.4s; }
    .game-btn:nth-child(3) { animation-delay: 0.8s; }
    .game-btn:nth-child(4) { animation-delay: 1.2s; }
    .game-btn:nth-child(5) { animation-delay: 1.6s; }
    .game-btn:nth-child(6) { animation-delay: 2.0s; }
    .game-btn:nth-child(7) { animation-delay: 2.4s; }

    .game-btn:hover {
      transform: scale(1.08);
      border-color: rgba(77,172,255,0.8);
      box-shadow:
        0 0 20px rgba(77,172,255,0.4),
        0 0 40px rgba(77,172,255,0.15),
        inset 0 0 15px rgba(77,172,255,0.1);
    }

    .game-btn::after {
      content: "?";
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 3vw, 28px);
      color: rgba(77,172,255,0.3);
    }

    .game-btn.has-label::after {
      content: none;
    }

    .game-btn .btn-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.8vw, 11px);
      color: #4dacff;
      line-height: 1.6;
      text-shadow: 0 0 8px rgba(77,172,255,0.4);
    }

    @keyframes pulse-glow {
      0%, 100% {
        box-shadow:
          0 0 8px rgba(77,172,255,0.1),
          0 0 20px rgba(77,172,255,0.05);
        border-color: rgba(77,172,255,0.3);
      }
      50% {
        box-shadow:
          0 0 15px rgba(77,172,255,0.3),
          0 0 40px rgba(77,172,255,0.1),
          inset 0 0 10px rgba(77,172,255,0.05);
        border-color: rgba(77,172,255,0.6);
      }
    }

    .page > * { position: relative; z-index: 1; }

    .corner-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 50;
      padding: 14px 24px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1.8vw, 12px);
      color: #ffd700;
      background: rgba(20,10,40,0.95);
      border: 3px solid #ffd700;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-decoration: none;
      text-shadow: 0 0 10px rgba(255,215,0,0.6);
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      animation: pulse-glow-gold 3s ease-in-out infinite;
    }

    .corner-btn:hover {
      transform: scale(1.08);
      border-color: rgba(255,215,0,0.8);
      box-shadow: 0 0 20px rgba(255,215,0,0.3), 0 0 40px rgba(255,215,0,0.1);
    }

    @keyframes pulse-glow-gold {
      0%, 100% {
        box-shadow: 0 0 10px rgba(255,215,0,0.3), 0 0 25px rgba(255,215,0,0.15);
      }
      50% {
        box-shadow: 0 0 20px rgba(255,215,0,0.6), 0 0 50px rgba(255,215,0,0.25);
      }
    }

    /* Video Maker Overlay */
    .vm-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 100;
      background: rgba(5,10,25,0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-y: auto;
    }

    .vm-overlay.open {
      display: flex;
    }

    .vm-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      max-width: 680px;
      width: 100%;
      position: relative;
    }

    .vm-close {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 36px;
      height: 36px;
      border: 2px solid rgba(255,68,102,0.5);
      border-radius: 50%;
      background: rgba(255,68,102,0.1);
      color: #ff4466;
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      z-index: 2;
    }

    .vm-close:hover {
      transform: scale(1.15);
      border-color: #ff4466;
      box-shadow: 0 0 15px rgba(255,68,102,0.4);
    }

    .vm-title {
      font-size: clamp(14px, 3.5vw, 32px);
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #4dacff;
      text-shadow:
        0 0 10px rgba(77,172,255,0.6),
        0 0 40px rgba(77,172,255,0.2),
        3px 3px 0 #0a2a5c;
      margin-bottom: 20px;
    }

    .vm-input-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      width: 100%;
    }

    .vm-prompt-input {
      width: 100%;
      padding: 12px 16px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.6vw, 11px);
      color: #e8e6f0;
      background: rgba(77,172,255,0.06);
      border: 2px solid rgba(77,172,255,0.4);
      border-radius: 8px;
      outline: none;
      resize: none;
      line-height: 1.8;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .vm-prompt-input::placeholder { color: rgba(77,172,255,0.3); }

    .vm-prompt-input:focus {
      border-color: rgba(77,172,255,0.8);
      box-shadow: 0 0 20px rgba(77,172,255,0.2), inset 0 0 10px rgba(77,172,255,0.05);
    }

    .vm-generate-btn {
      padding: 10px 28px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1.6vw, 12px);
      color: #0a1628;
      background: linear-gradient(180deg, #4dacff 0%, #2a8cee 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 15px rgba(77,172,255,0.3), 0 4px 0 #1a5caa;
    }

    .vm-generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px rgba(77,172,255,0.5), 0 6px 0 #1a5caa;
    }

    .vm-generate-btn:active {
      transform: translateY(2px);
      box-shadow: 0 0 10px rgba(77,172,255,0.3), 0 2px 0 #1a5caa;
    }

    .vm-generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .vm-loading {
      display: none;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.4vw, 10px);
      color: #4dacff;
      text-shadow: 0 0 8px rgba(77,172,255,0.4);
      animation: vm-pulse 1s ease-in-out infinite;
    }

    .vm-loading.visible { display: block; }

    @keyframes vm-pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .vm-video-area {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    .vm-video-area.visible { display: flex; }

    .vm-canvas {
      border: 2px solid rgba(77,172,255,0.4);
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(77,172,255,0.15), inset 0 0 30px rgba(0,0,0,0.3);
      background: #000;
      max-width: 100%;
      width: 640px;
      height: auto;
      aspect-ratio: 640 / 360;
    }

    .vm-duration {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(6px, 1.1vw, 8px);
      color: rgba(77,172,255,0.5);
    }

    .vm-extend-btn {
      display: none;
      padding: 9px 22px;
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.3vw, 10px);
      color: #ffd700;
      background: rgba(255,215,0,0.08);
      border: 2px solid rgba(255,215,0,0.4);
      border-radius: 8px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .vm-extend-btn.visible { display: inline-block; }

    .vm-extend-btn:hover {
      transform: scale(1.05);
      border-color: rgba(255,215,0,0.8);
      box-shadow: 0 0 20px rgba(255,215,0,0.3);
    }

    .vm-extend-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <!-- Video Maker Overlay -->
  <div class="vm-overlay" id="vmOverlay">
    <div class="vm-panel">
      <button class="vm-close" onclick="closeVideoMaker()">X</button>
      <div class="vm-title">Video Maker</div>
      <div class="vm-input-area">
        <textarea class="vm-prompt-input" id="vmPromptInput" rows="3" placeholder="Type what you want to see... (e.g. a spaceship flying through asteroids)"></textarea>
        <button class="vm-generate-btn" id="vmGenerateBtn" onclick="vmGenerate()">Generate Video</button>
      </div>
      <div class="vm-loading" id="vmLoading">Generating your video...</div>
      <div class="vm-video-area" id="vmVideoArea">
        <canvas class="vm-canvas" id="vmCanvas" width="640" height="360"></canvas>
        <div class="vm-duration" id="vmDuration"></div>
        <button class="vm-extend-btn" id="vmExtendBtn" onclick="vmExtend()">Extend Video</button>
      </div>
    </div>
  </div>

  <div class="page">
    <h1>Ollie's Universe</h1>

    <div class="caption">"The perfect smile doesn't exist"</div>

    <div class="planet-row">
      <div class="planet-wrap">
        <div class="planet"></div>
        <div class="ring"></div>
      </div>
      <div class="dog-wrap">
        <canvas id="dogCanvas" width="300" height="300"></canvas>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="sideeye-caption">BOMBASTIC SIDEEYE</div>
        <div class="sideeye-wrap">
          <canvas id="sideEyeCanvas" width="300" height="300"></canvas>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;">
        <div class="turret-caption">LASER DEFENSE</div>
        <div class="turret-wrap">
          <canvas id="turretCanvas" width="300" height="300"></canvas>
        </div>
      </div>
    </div>

    <div class="buttons">
      <button class="game-btn has-label" onclick="location.href='pick-the-plot.html'"><span class="btn-label">Pick the<br>Plot</span></button>
      <button class="game-btn has-label" onclick="location.href='dino-run.html'"><span class="btn-label">Dino<br>Run</span></button>
      <button class="game-btn has-label" onclick="location.href='rocket-run.html'"><span class="btn-label">Rocket<br>Run</span></button>
      <button class="game-btn has-label" onclick="location.href='hamster-hunt.html'"><span class="btn-label">Hamster<br>Hunt</span></button>
      <button class="game-btn has-label" onclick="location.href='reggie-forest.html'"><span class="btn-label">Reggie in<br>the Forest</span></button>
      <button class="game-btn has-label" onclick="location.href='laser-defense.html'"><span class="btn-label">Laser<br>Defense</span></button>
      <button class="game-btn has-label" onclick="location.href='gnome-catapult.html'"><span class="btn-label">Gnome<br>Catapult</span></button>
    </div>

    <button class="corner-btn" onclick="openVideoMaker()">Video Maker</button>
  </div>

  <script>
    // Draw photorealistic corgi with cheeky smile
    (function(){
      const dc = document.getElementById('dogCanvas');
      const c = dc.getContext('2d');
      const W = 300, H = 300;
      const cx = W/2, cy = 155;

      // Soft blur helper
      function softEll(x,y,rx,ry,color,rot){
        c.fillStyle=color;
        c.beginPath();c.ellipse(x,y,rx,ry,rot||0,0,Math.PI*2);c.fill();
      }

      // === NECK / BODY peek ===
      const neckG = c.createLinearGradient(cx,cy+60,cx,cy+100);
      neckG.addColorStop(0,'#d49540');
      neckG.addColorStop(1,'#b07828');
      softEll(cx,cy+82,70,30,neckG);

      // White chest
      const chestG = c.createRadialGradient(cx,cy+78,5,cx,cy+78,35);
      chestG.addColorStop(0,'#fffcf6');
      chestG.addColorStop(0.7,'#f5ece0');
      chestG.addColorStop(1,'#ddd0c0');
      softEll(cx,cy+78,40,22,chestG);

      // Chest fur tufts
      for(let i=-4;i<=4;i++){
        softEll(cx+i*8, cy+76, 6, 12, 'rgba(255,250,240,0.25)');
      }

      // === EARS (behind head) ===
      for(let side=-1;side<=1;side+=2){
        const ex = cx+side*50;
        // Ear outer
        const earG = c.createLinearGradient(ex,100,ex-side*10,20);
        earG.addColorStop(0,'#c48030');
        earG.addColorStop(0.5,'#d49540');
        earG.addColorStop(1,'#b87828');
        c.fillStyle=earG;
        c.beginPath();
        c.moveTo(ex-side*18, 108);
        c.bezierCurveTo(ex-side*30, 50, ex+side*5, 12, ex+side*18, 15);
        c.bezierCurveTo(ex+side*35, 18, ex+side*28, 65, ex+side*18, 108);
        c.closePath();
        c.fill();

        // Ear edge highlight
        c.strokeStyle='rgba(220,170,100,0.4)';
        c.lineWidth=2;
        c.beginPath();
        c.moveTo(ex-side*16, 105);
        c.bezierCurveTo(ex-side*28, 52, ex+side*5, 16, ex+side*16, 18);
        c.stroke();

        // Ear inner pink
        const earInG = c.createLinearGradient(ex,95,ex,30);
        earInG.addColorStop(0,'#f0b8a0');
        earInG.addColorStop(0.4,'#f2c0aa');
        earInG.addColorStop(1,'#e8a890');
        c.fillStyle=earInG;
        c.beginPath();
        c.moveTo(ex-side*10, 100);
        c.bezierCurveTo(ex-side*20, 56, ex+side*6, 26, ex+side*12, 28);
        c.bezierCurveTo(ex+side*24, 30, ex+side*20, 68, ex+side*12, 100);
        c.closePath();
        c.fill();

        // Ear inner shadow
        softEll(ex+side*2, 80, 10, 25, 'rgba(180,100,70,0.15)');
      }

      // === HEAD (main shape) ===
      // Base fur with multi-stop gradient
      const headG = c.createRadialGradient(cx,cy-10,15,cx,cy+5,90);
      headG.addColorStop(0,'#eaac58');
      headG.addColorStop(0.3,'#dca048');
      headG.addColorStop(0.6,'#cc8c38');
      headG.addColorStop(0.85,'#b87828');
      headG.addColorStop(1,'#9a6420');
      c.fillStyle=headG;
      c.beginPath();
      c.ellipse(cx,cy,88,80,0,0,Math.PI*2);
      c.fill();

      // Subtle side shading
      softEll(cx-65,cy, 30,55, 'rgba(130,70,20,0.2)', 0.1);
      softEll(cx+65,cy, 30,55, 'rgba(130,70,20,0.2)', -0.1);

      // Top of head lighter
      softEll(cx,cy-45, 40,25, 'rgba(240,190,110,0.3)');

      // Cheek fluff
      softEll(cx-55,cy+15, 28,30, 'rgba(210,160,80,0.3)');
      softEll(cx+55,cy+15, 28,30, 'rgba(210,160,80,0.3)');

      // === WHITE BLAZE (corgi marking) ===
      // Smooth white stripe
      const blazeG = c.createLinearGradient(cx,cy-65,cx,cy+70);
      blazeG.addColorStop(0,'#fff9f2');
      blazeG.addColorStop(0.5,'#fffcf8');
      blazeG.addColorStop(1,'#fff5ea');
      c.fillStyle=blazeG;
      c.beginPath();
      c.moveTo(cx-20, cy-62);
      c.bezierCurveTo(cx-26, cy-30, cx-30, cy, cx-32, cy+20);
      c.bezierCurveTo(cx-34, cy+45, cx-28, cy+68, cx, cy+72);
      c.bezierCurveTo(cx+28, cy+68, cx+34, cy+45, cx+32, cy+20);
      c.bezierCurveTo(cx+30, cy, cx+26, cy-30, cx+20, cy-62);
      c.closePath();
      c.fill();

      // Blaze soft edge blending

              c.fillStyle=obj.color; c.fillRect(obj.x-obj.width/2,baseY-obj.height,obj.width,obj.height);
              const winRows=Math.floor(obj.height/25), winCols=obj.windows;
              for(let r=0;r<winRows;r++)for(let c2=0;c2<winCols;c2++){const wx=obj.x-obj.width/2+8+c2*((obj.width-16)/Math.max(winCols-1,1)),wy=baseY-obj.height+15+r*25;const lit=Math.sin(t*0.5+r+c2+obj.x*0.1)>0;c.fillStyle=lit?'#ffdd88':'#223344';c.fillRect(wx-4,wy-5,8,10);}
              break;
            }
            case 'car': {
              const cx2=(obj.x+t*obj.speed*50)%(VW+60)-30;
              c.fillStyle=obj.color; c.beginPath(); c.roundRect(cx2-18,obj.y-10,36,14,3); c.fill();
              c.beginPath(); c.roundRect(cx2-10,obj.y-18,20,10,2); c.fill();
              c.fillStyle='#222'; c.beginPath(); c.arc(cx2-10,obj.y+4,4,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(cx2+10,obj.y+4,4,0,Math.PI*2); c.fill();
              c.fillStyle='#ffff88'; c.beginPath(); c.arc(cx2+18,obj.y-4,2,0,Math.PI*2); c.fill();
              break;
            }
            case 'cloud': {
              const cx2=(obj.x+t*obj.speed*20)%(VW+200)-100;
              c.fillStyle='rgba(255,255,255,0.15)'; c.beginPath(); c.arc(cx2,obj.y,obj.size,0,Math.PI*2); c.arc(cx2+obj.size*0.6,obj.y-obj.size*0.2,obj.size*0.7,0,Math.PI*2); c.arc(cx2-obj.size*0.5,obj.y+obj.size*0.1,obj.size*0.6,0,Math.PI*2); c.fill();
              break;
            }
            case 'flyer': {
              const fx=(obj.x+t*obj.speed*40)%(VW+100)-50, fy=obj.y+Math.sin(t*1.5)*20;
              c.fillStyle=obj.color; c.beginPath(); c.ellipse(fx,fy,12,6,0,0,Math.PI*2); c.fill();
              const wingUp=Math.sin(t*8)*12; c.strokeStyle=obj.color; c.lineWidth=3; c.lineCap='round';
              c.beginPath(); c.moveTo(fx-5,fy); c.quadraticCurveTo(fx-15,fy-10+wingUp,fx-22,fy-5+wingUp); c.stroke();
              c.beginPath(); c.moveTo(fx+5,fy); c.quadraticCurveTo(fx+15,fy-10+wingUp,fx+22,fy-5+wingUp); c.stroke();
              break;
            }
            case 'moon': {
              const moonGlow=c.createRadialGradient(obj.x,obj.y,20,obj.x,obj.y,80); moonGlow.addColorStop(0,'rgba(255,255,200,0.15)'); moonGlow.addColorStop(1,'rgba(0,0,0,0)');
              c.fillStyle=moonGlow; c.beginPath(); c.arc(obj.x,obj.y,80,0,Math.PI*2); c.fill();
              c.fillStyle='#eee8cc'; c.beginPath(); c.arc(obj.x,obj.y,35,0,Math.PI*2); c.fill();
              c.fillStyle='rgba(0,0,0,0.08)'; c.beginPath(); c.arc(obj.x-10,obj.y-8,8,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(obj.x+12,obj.y+5,6,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(obj.x-5,obj.y+15,5,0,Math.PI*2); c.fill();
              break;
            }
            case 'ghost': {
              const gx=obj.x+Math.sin(t*obj.speed+obj.phase)*50, gy=obj.y+Math.cos(t*obj.speed*0.7+obj.phase)*20, gs=obj.size;
              c.globalAlpha=0.5+Math.sin(t*2+obj.phase)*0.2; c.fillStyle='#eeeeff';
              c.beginPath(); c.arc(gx,gy-gs*0.2,gs*0.7,Math.PI,0); c.lineTo(gx+gs*0.7,gy+gs*0.5);
              for(let w=0;w<4;w++){const wx2=gx+gs*0.7-(w+1)*(gs*1.4/4);c.lineTo(wx2,gy+gs*0.5+(w%2===0?-5:5));}
              c.closePath(); c.fill();
              c.fillStyle='#222'; c.beginPath(); c.arc(gx-5,gy-gs*0.2,3,0,Math.PI*2); c.fill(); c.beginPath(); c.arc(gx+5,gy-gs*0.2,3,0,Math.PI*2); c.fill();
              c.beginPath(); c.arc(gx,gy+2,4,0,Math.PI); c.fill();
              break;
            }
            case 'bat': {
              const bx=(obj.x+t*obj.speed*30)%(VW+40)-20, by=obj.y+Math.sin(t*2+obj.wingPhase)*15, wingAng=Math.sin(t*10+obj.wingPhase)*0.5;
              c.fillStyle='#220033'; c.beginPath(); c.ellipse(bx,by,5,3,0,0,Math.PI*2); c.fill();
              c.beginPath(); c.moveTo(bx-4,by); c.quadraticCurveTo(bx-15,by-12+wingAng*15,bx-20,by-2+wingAng*10); c.lineTo(bx-4,by+2); c.closePath(); c.fill();
              c.beginPath(); c.moveTo(bx+4,by); c.quadraticCurveTo(bx+15,by-12+wingAng*15,bx+20,by-2+wingAng*10); c.lineTo(bx+4,by+2); c.closePath(); c.fill();
              break;
            }
          }
          c.restore();
        }

        // Overlay text at start
        if (t < 2) {
          c.save(); c.globalAlpha=Math.min(1,2-t); c.fillStyle='#fff'; c.font='14px "Press Start 2P"'; c.textAlign='center';
          const words=vmPrompt.split(' '); let lines=[],line='';
          for(const w of words){if((line+' '+w).length>30){lines.push(line);line=w;}else{line=line?line+' '+w:w;}}
          if(line)lines.push(line);
          lines.forEach((l,i)=>{c.fillText(l,VW/2,VH/2-(lines.length*10)+i*22);});
          c.restore();
        }
      }

      function vmAnimate() {
        if(!vmRunning) return;
        const elapsed = (Date.now()-vmStartTime)/1000;
        if(elapsed >= vmDuration) {
          drawFrame(vmDuration, vmScene);
          vmRunning = false;
          document.getElementById('vmExtendBtn').classList.add('visible');
          document.getElementById('vmDuration').textContent = 'Duration: '+vmDuration+'s';
          return;
        }
        drawFrame(elapsed, vmScene);
        document.getElementById('vmDuration').textContent = elapsed.toFixed(1)+'s / '+vmDuration+'s';
        vmAnimFrame = requestAnimationFrame(vmAnimate);
      }

      window.openVideoMaker = function() {
        document.getElementById('vmOverlay').classList.add('open');
        document.getElementById('vmPromptInput').focus();
      };

      window.closeVideoMaker = function() {
        if(vmAnimFrame) cancelAnimationFrame(vmAnimFrame);
        vmRunning = false;
        document.getElementById('vmOverlay').classList.remove('open');
        document.getElementById('vmVideoArea').classList.remove('visible');
        document.getElementById('vmExtendBtn').classList.remove('visible');
        document.getElementById('vmLoading').classList.remove('visible');
        document.getElementById('vmGenerateBtn').disabled = false;
      };

      window.vmGenerate = function() {
        const input = document.getElementById('vmPromptInput').value.trim();
        if(!input) return;
        vmPrompt = input;
        vmExtensions = 0;
        vmDuration = 5;
        if(vmAnimFrame) cancelAnimationFrame(vmAnimFrame);
        vmRunning = false;

        const btn = document.getElementById('vmGenerateBtn');
        const loading = document.getElementById('vmLoading');
        const videoArea = document.getElementById('vmVideoArea');
        const extendBtn = document.getElementById('vmExtendBtn');

        btn.disabled = true;
        extendBtn.classList.remove('visible');
        videoArea.classList.remove('visible');
        loading.classList.add('visible');

        setTimeout(function() {
          loading.classList.remove('visible');
          videoArea.classList.add('visible');
          btn.disabled = false;
          const seed = hashStr(input);
          vmScene = buildScene(input, seed);
          vmStartTime = Date.now();
          vmRunning = true;
          vmAnimate();
        }, 1500);
      };

      window.vmExtend = function() {
        if(!vmScene) return;
        vmExtensions++;
        vmDuration += 5;
        document.getElementById('vmExtendBtn').classList.remove('visible');

        const seed = hashStr(vmPrompt) + vmExtensions;
        const rand = seededRandom(seed);
        const type = vmScene.type;
        const colors = vmScene.colors;

        if(type==='space'){for(let i=0;i<4;i++)vmScene.objects.push({type:'asteroid',x:VW+rand()*VW,y:rand()*VH,size:rand()*25+10,speed:rand()*3+1,rotation:rand()*Math.PI*2,rotSpeed:(rand()-0.5)*0.05,color:'#'+Math.floor(rand()*0x444444+0x666666).toString(16)});}
        else if(type==='ocean'){const fc=['#ff6644','#44ccff','#ffcc22','#ff44aa','#44ff88'];for(let i=0;i<3;i++)vmScene.objects.push({type:'fish',x:rand()*VW,y:rand()*VH*0.7+VH*0.15,size:rand()*15+8,speed:(rand()-0.5)*2,wobble:rand()*Math.PI*2,color:fc[Math.floor(rand()*fc.length)]});for(let i=0;i<5;i++)vmScene.objects.push({type:'bubble',x:rand()*VW,y:VH+rand()*VH,size:rand()*8+3,speed:rand()*1.5+0.5,wobbleSpeed:rand()*2+1});}
        else if(type==='party'){const cc=['#ff4488','#44ff88','#ffdd44','#44ddff','#ff8844','#aa44ff'];for(let i=0;i<15;i++)vmScene.objects.push({type:'confetti',x:rand()*VW,y:rand()*VH-VH,size:rand()*8+3,speed:rand()*2+0.5,wobble:rand()*Math.PI*2,rotation:rand()*Math.PI*2,rotSpeed:(rand()-0.5)*0.1,color:cc[Math.floor(rand()*cc.length)]});}
        else if(type==='snow'){for(let i=0;i<10;i++)vmScene.objects.push({type:'snowflake',x:rand()*VW,y:rand()*VH-VH,size:rand()*5+2,speed:rand()*1.5+0.3,wobble:rand()*Math.PI*2,wobbleSpeed:rand()*2+0.5});}
        else if(type==='fire'){for(let i=0;i<10;i++)vmScene.objects.push({type:'flame',x:rand()*VW,y:VH,size:rand()*20+5,speed:rand()*3+1,life:rand(),color:rand()>0.5?'#ff6622':'#ffaa00'});}
        else if(type==='night'){for(let i=0;i<3;i++)vmScene.objects.push({type:'ghost',x:rand()*VW,y:rand()*VH*0.6+VH*0.1,size:rand()*20+15,speed:rand()*1+0.3,phase:rand()*Math.PI*2});}
        else if(type==='forest'){for(let i=0;i<5;i++)vmScene.objects.push({type:'firefly',x:rand()*VW,y:rand()*VH,speed:rand()*0.5+0.2,phase:rand()*Math.PI*2,color:'#ffee44'});}
        else{for(let i=0;i<10;i++)vmScene.objects.push({type:'bgParticle',x:rand()*VW,y:rand()*VH,size:rand()*3+0.5,speed:rand()*0.5+0.1,brightness:rand(),color:colors.particles});}

        vmStartTime = Date.now() - (vmDuration-5)*1000;
        vmRunning = true;
        vmAnimate();
      };

      // Enter to generate
      document.getElementById('vmPromptInput').addEventListener('keydown', function(e) {
        if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();vmGenerate();}
      });

      // Escape to close
      document.addEventListener('keydown', function(e) {
        if(e.key==='Escape' && document.getElementById('vmOverlay').classList.contains('open')) closeVideoMaker();
      });

      // Click backdrop to close
      document.getElementById('vmOverlay').addEventListener('click', function(e) {
        if(e.target === this) closeVideoMaker();
      });
    })();

    // generate random stars
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 3 + 1;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.animationDuration = (Math.random() * 2 + 2) + 's';
      container.appendChild(s);
    }
  </script>
</body>
</html>
