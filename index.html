<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ollie Online</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #0a1628;
      color: #e8e6f0;
      font-family: 'Press Start 2P', monospace;
      -webkit-font-smoothing: none;
      image-rendering: pixelated;
      height: 100%;
      overflow: hidden;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 50%, rgba(30,90,255,0.15) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(30,90,255,0.03) 3px, rgba(30,90,255,0.03) 4px),
        #0a1628;
    }

    h1 {
      font-size: clamp(24px, 6vw, 72px);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.6;
      text-transform: uppercase;
      color: #4dacff;
      text-shadow:
        0 0 10px rgba(77,172,255,0.6),
        0 0 40px rgba(77,172,255,0.2),
        3px 3px 0 #0a2a5c;
    }

    h1 .yeet {
      display: block;
      font-size: clamp(36px, 10vw, 120px);
      color: #fff;
      text-shadow:
        0 0 20px rgba(255,255,255,0.8),
        0 0 60px rgba(77,172,255,0.5),
        4px 4px 0 #1a3a7c;
      margin: 0.3em 0;
    }

    .blink {
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      50% { opacity: 0; }
    }

    .cursor {
      display: inline-block;
      width: clamp(12px, 3vw, 36px);
      height: clamp(24px, 6vw, 72px);
      background: #4dacff;
      vertical-align: middle;
      margin-left: 8px;
      animation: blink 1s step-end infinite;
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>I'm 11 foot 11<br>and I will<br><span class="yeet">YEET</span>you to uranus</h1><span class="cursor"></span>
  </div>
</body>
</html>
