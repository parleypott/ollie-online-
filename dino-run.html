<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dino Run - Ollie's Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a1628;
    color: #e8e6f0;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
  }

  .back-link {
    position: fixed; top: 16px; left: 16px;
    color: #888; text-decoration: none; font-size: 10px; z-index: 100;
    font-family: 'Press Start 2P', monospace;
  }
  .back-link:hover { color: #4dacff; }

  h1 {
    font-size: clamp(18px, 4vw, 36px);
    color: #4dacff;
    text-shadow: 0 0 10px rgba(77,172,255,0.6), 3px 3px 0 #0a2a5c;
    margin-bottom: 16px;
  }

  #gameCanvas {
    border: 2px solid rgba(77,172,255,0.4);
    border-radius: 8px;
    display: block;
    max-width: 95vw;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(77,172,255,0.15);
  }

  .controls {
    margin-top: 16px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .ctrl-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 10px 16px;
    border: 2px solid rgba(77,172,255,0.4);
    border-radius: 6px;
    background: rgba(77,172,255,0.08);
    color: #4dacff;
    cursor: pointer;
    transition: all 0.2s;
  }

  .ctrl-btn:hover, .ctrl-btn.active {
    border-color: #4dacff;
    background: rgba(77,172,255,0.2);
    box-shadow: 0 0 12px rgba(77,172,255,0.3);
  }

  .hint {
    margin-top: 12px;
    font-size: 8px;
    color: #555;
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back</a>
<h1>DINO RUN</h1>
<canvas id="gameCanvas" width="800" height="300"></canvas>
<div class="controls">
  <button class="ctrl-btn active" onclick="setSetting('desert')">Desert</button>
  <button class="ctrl-btn" onclick="setSetting('moon')">Moon</button>
  <button class="ctrl-btn" onclick="setSetting('medieval')">Medieval</button>
</div>
<p class="hint">SPACE / TAP to jump &bull; Double jump allowed!</p>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 300;

// --- Settings ---
const SETTINGS = {
  desert: {
    sky: ['#f4a460','#e8874a','#d2691e'],
    ground: '#c2a04c',
    groundLine: '#a0822a',
    gravity: 0.6,
    bgElements: 'cacti',
    obstacleColor: '#5c4033',
    dinoColor: '#2e7d32',
    label: 'Desert',
    particleColor: '#d2b48c',
  },
  moon: {
    sky: ['#0a0a2e','#111144','#1a1a5c'],
    ground: '#888',
    groundLine: '#666',
    gravity: 0.3,
    bgElements: 'craters',
    obstacleColor: '#aaa',
    dinoColor: '#66bb6a',
    label: 'Moon',
    particleColor: '#bbb',
  },
  medieval: {
    sky: ['#2d5016','#3a6b1e','#4a8528'],
    ground: '#5a7a3a',
    groundLine: '#4a6a2a',
    gravity: 0.55,
    bgElements: 'castles',
    obstacleColor: '#6d4c41',
    dinoColor: '#388e3c',
    label: 'Medieval',
    particleColor: '#7a9a5a',
  }
};

let currentSetting = 'desert';
let setting = SETTINGS.desert;

// --- Game State ---
let gameState = 'menu'; // menu, playing, dead
let score = 0;
let highScores = JSON.parse(localStorage.getItem('dino_hi') || '{"desert":0,"moon":0,"medieval":0}');
let speed = 5;
let frameCount = 0;
let screenShake = 0;

// Dino
const DINO_W = 40, DINO_H = 44;
const GROUND_Y = H - 50;
let dino = { x: 80, y: GROUND_Y - DINO_H, vy: 0, jumps: 0, maxJumps: 2, grounded: true, legFrame: 0 };

// Obstacles
let obstacles = [];
let nextObstacleIn = 60;

// Particles
let particles = [];

// Background elements
let bgElements = [];

// Stars (for moon)
let stars = [];
for (let i = 0; i < 60; i++) stars.push({ x: Math.random()*W, y: Math.random()*(GROUND_Y-30), s: Math.random()*2+1, b: Math.random() });

// Clouds / BG scrolling
let bgScroll = 0;

// --- Input ---
let jumpPressed = false;

function onJump() {
  if (gameState === 'menu') {
    startGame();
    return;
  }
  if (gameState === 'dead') {
    startGame();
    return;
  }
  if (dino.jumps < dino.maxJumps) {
    dino.vy = setting.gravity < 0.4 ? -10 : -12;
    dino.jumps++;
    dino.grounded = false;
    // Jump particles
    for (let i = 0; i < 5; i++) {
      particles.push({
        x: dino.x + DINO_W/2, y: dino.y + DINO_H,
        vx: (Math.random()-0.5)*3, vy: Math.random()*2+1,
        life: 20, color: setting.particleColor
      });
    }
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); if (!jumpPressed) { jumpPressed = true; onJump(); } }
});
document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') jumpPressed = false;
});
canvas.addEventListener('click', onJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); onJump(); }, { passive: false });

function setSetting(name) {
  currentSetting = name;
  setting = SETTINGS[name];
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.ctrl-btn').forEach(b => { if (b.textContent.toLowerCase() === name) b.classList.add('active'); });
  bgElements = [];
  if (gameState !== 'playing') gameState = 'menu';
}

// --- Game Logic ---
function startGame() {
  gameState = 'playing';
  score = 0;
  speed = 5;
  frameCount = 0;
  dino.y = GROUND_Y - DINO_H;
  dino.vy = 0;
  dino.jumps = 0;
  dino.grounded = true;
  obstacles = [];
  particles = [];
  bgElements = [];
  nextObstacleIn = 80;
  screenShake = 0;
}

function spawnObstacle() {
  const types = currentSetting === 'desert'
    ? ['cactus_s','cactus_t','rock']
    : currentSetting === 'moon'
    ? ['rock','crystal','crater_rock']
    : ['barrel','fence','shield'];

  const type = types[Math.floor(Math.random()*types.length)];
  let w, h;
  if (type === 'cactus_s' || type === 'rock' || type === 'barrel') { w = 20; h = 34; }
  else if (type === 'cactus_t' || type === 'crystal' || type === 'fence') { w = 16; h = 44; }
  else { w = 30; h = 28; }

  obstacles.push({ x: W + 20, y: GROUND_Y - h, w, h, type });
  // Random next gap, gets tighter as speed increases
  nextObstacleIn = Math.max(35, Math.floor(80 - speed * 2 + Math.random() * 50));
}

function update() {
  if (gameState !== 'playing') return;

  frameCount++;
  if (frameCount % 5 === 0) score++;
  if (frameCount % 300 === 0) speed = Math.min(14, speed + 0.5);

  // Dino physics
  dino.vy += setting.gravity;
  dino.y += dino.vy;
  if (dino.y >= GROUND_Y - DINO_H) {
    dino.y = GROUND_Y - DINO_H;
    dino.vy = 0;
    dino.jumps = 0;
    dino.grounded = true;
  }

  // Leg animation
  if (dino.grounded) dino.legFrame = (dino.legFrame + 0.2) % 2;

  // Obstacles
  nextObstacleIn--;
  if (nextObstacleIn <= 0) spawnObstacle();

  obstacles.forEach(o => o.x -= speed);
  obstacles = obstacles.filter(o => o.x + o.w > -20);

  // Collision (with slight padding for fairness)
  const pad = 6;
  for (const o of obstacles) {
    if (dino.x + DINO_W - pad > o.x + pad &&
        dino.x + pad < o.x + o.w - pad &&
        dino.y + DINO_H - pad > o.y + pad) {
      die();
      return;
    }
  }

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  particles = particles.filter(p => p.life > 0);

  // BG scroll
  bgScroll = (bgScroll + speed * 0.3) % W;

  // Spawn bg elements occasionally
  if (Math.random() < 0.01) {
    if (currentSetting === 'desert') {
      bgElements.push({ x: W + 20, y: GROUND_Y - 15 - Math.random()*40, type: 'bush', s: Math.random()*8+6 });
    } else if (currentSetting === 'moon') {
      bgElements.push({ x: W + 20, y: GROUND_Y - 5 - Math.random()*10, type: 'crater', s: Math.random()*15+8 });
    } else {
      bgElements.push({ x: W + 20, y: GROUND_Y - 40 - Math.random()*60, type: 'tower', s: Math.random()*20+15 });
    }
  }
  bgElements.forEach(e => e.x -= speed * 0.4);
  bgElements = bgElements.filter(e => e.x > -50);

  // Screen shake decay
  if (screenShake > 0) screenShake *= 0.9;
}

function die() {
  gameState = 'dead';
  screenShake = 8;
  if (score > (highScores[currentSetting] || 0)) {
    highScores[currentSetting] = score;
    localStorage.setItem('dino_hi', JSON.stringify(highScores));
  }
  // Death particles
  for (let i = 0; i < 15; i++) {
    particles.push({
      x: dino.x + DINO_W/2, y: dino.y + DINO_H/2,
      vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6,
      life: 30 + Math.random()*20, color: '#ff6b6b'
    });
  }
}

// --- Drawing ---
function drawSky() {
  const s = setting.sky;
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, s[0]);
  grad.addColorStop(0.5, s[1]);
  grad.addColorStop(1, s[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);
}

function drawGround() {
  ctx.fillStyle = setting.ground;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  // Ground line detail
  ctx.strokeStyle = setting.groundLine;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  ctx.lineTo(W, GROUND_Y);
  ctx.stroke();
  // Ground texture
  ctx.fillStyle = setting.groundLine;
  for (let i = 0; i < 20; i++) {
    const gx = ((i * 47 + 13) - bgScroll * 2) % W;
    ctx.fillRect(gx, GROUND_Y + 8 + (i%3)*6, 3 + (i%4), 2);
  }
}

function drawStars() {
  if (currentSetting !== 'moon') return;
  stars.forEach(s => {
    const b = 0.4 + Math.sin(frameCount * 0.02 + s.b * 10) * 0.3;
    ctx.fillStyle = `rgba(255,255,255,${b})`;
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), Math.ceil(s.s), Math.ceil(s.s));
  });
  // Moon in sky
  ctx.fillStyle = '#ddd';
  ctx.beginPath();
  ctx.arc(650, 60, 30, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#bbb';
  ctx.beginPath();
  ctx.arc(640, 55, 6, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(660, 65, 4, 0, Math.PI * 2);
  ctx.fill();
}

function drawDesertBg() {
  // Sun
  ctx.fillStyle = '#ffcc33';
  ctx.beginPath();
  ctx.arc(650, 70, 35, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ffe066';
  ctx.beginPath();
  ctx.arc(650, 70, 28, 0, Math.PI * 2);
  ctx.fill();
  // Dunes in background
  ctx.fillStyle = '#d4a54a';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  for (let x = 0; x <= W; x += 50) {
    ctx.lineTo(x, GROUND_Y - 10 - Math.sin((x + bgScroll) * 0.01) * 15);
  }
  ctx.lineTo(W, GROUND_Y);
  ctx.fill();
}

function drawMedievalBg() {
  // Distant mountains
  ctx.fillStyle = '#3a5a20';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  for (let x = 0; x <= W; x += 80) {
    ctx.lineTo(x, GROUND_Y - 30 - Math.sin((x + bgScroll * 0.5) * 0.008) * 40);
  }
  ctx.lineTo(W, GROUND_Y);
  ctx.fill();
}

function drawBgElements() {
  bgElements.forEach(e => {
    ctx.fillStyle = currentSetting === 'desert' ? '#8a7a3a'
      : currentSetting === 'moon' ? '#666'
      : '#5a4a3a';
    if (e.type === 'bush') {
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.s, 0, Math.PI * 2);
      ctx.fill();
    } else if (e.type === 'crater') {
      ctx.strokeStyle = '#555';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(e.x, e.y + 5, e.s, e.s * 0.4, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else if (e.type === 'tower') {
      ctx.fillRect(e.x, e.y, e.s * 0.5, GROUND_Y - e.y);
      // Battlements
      ctx.fillRect(e.x - 3, e.y, 4, 6);
      ctx.fillRect(e.x + e.s * 0.5 - 1, e.y, 4, 6);
      // Window
      ctx.fillStyle = '#ffd700';
      ctx.fillRect(e.x + e.s * 0.15, e.y + (GROUND_Y - e.y) * 0.3, 3, 4);
    }
  });
}

function drawDino() {
  const c = setting.dinoColor;
  const x = Math.floor(dino.x);
  const y = Math.floor(dino.y);

  // Body
  ctx.fillStyle = c;
  ctx.fillRect(x + 8, y + 6, 22, 20);

  // Head
  ctx.fillRect(x + 22, y, 18, 16);

  // Eye
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + 32, y + 4, 5, 5);
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 34, y + 5, 3, 3);

  // Mouth
  ctx.fillStyle = c;
  ctx.fillRect(x + 34, y + 12, 8, 3);

  // Jaw line
  ctx.fillStyle = darken(c, 30);
  ctx.fillRect(x + 34, y + 14, 6, 1);

  // Tail
  ctx.fillStyle = c;
  ctx.fillRect(x, y + 10, 10, 6);
  ctx.fillRect(x - 4, y + 8, 6, 5);

  // Arms
  ctx.fillStyle = darken(c, 20);
  ctx.fillRect(x + 20, y + 18, 4, 8);

  // Legs (animated)
  ctx.fillStyle = darken(c, 15);
  if (!dino.grounded) {
    // Tucked legs in air
    ctx.fillRect(x + 10, y + 26, 6, 10);
    ctx.fillRect(x + 20, y + 26, 6, 10);
  } else {
    const f = Math.floor(dino.legFrame);
    if (f === 0) {
      ctx.fillRect(x + 10, y + 26, 6, 14);
      ctx.fillRect(x + 22, y + 26, 6, 10);
    } else {
      ctx.fillRect(x + 10, y + 26, 6, 10);
      ctx.fillRect(x + 22, y + 26, 6, 14);
    }
  }

  // Spines on back
  ctx.fillStyle = darken(c, 25);
  ctx.fillRect(x + 12, y + 2, 4, 5);
  ctx.fillRect(x + 18, y + 3, 4, 4);
  ctx.fillRect(x + 24, y - 1, 3, 3);
}

function darken(hex, amt) {
  let r = parseInt(hex.slice(1,3),16) - amt;
  let g = parseInt(hex.slice(3,5),16) - amt;
  let b = parseInt(hex.slice(5,7),16) - amt;
  r = Math.max(0, r); g = Math.max(0, g); b = Math.max(0, b);
  return `rgb(${r},${g},${b})`;
}

function drawObstacle(o) {
  const c = setting.obstacleColor;
  ctx.fillStyle = c;

  if (o.type === 'cactus_s' || o.type === 'barrel' || o.type === 'rock') {
    // Short obstacle
    ctx.fillRect(o.x, o.y, o.w, o.h);
    if (o.type === 'cactus_s') {
      ctx.fillRect(o.x - 4, o.y + 8, 5, 3);
      ctx.fillRect(o.x + o.w - 1, o.y + 14, 5, 3);
      // Spines
      ctx.fillStyle = darken(c, -30);
      ctx.fillRect(o.x + o.w/2 - 1, o.y - 3, 2, 4);
    } else if (o.type === 'barrel') {
      ctx.fillStyle = darken(c, -20);
      ctx.fillRect(o.x, o.y + 5, o.w, 2);
      ctx.fillRect(o.x, o.y + o.h - 7, o.w, 2);
    } else if (o.type === 'rock') {
      ctx.fillStyle = darken(c, 15);
      ctx.fillRect(o.x + 3, o.y + 3, o.w - 6, o.h - 6);
    }
  } else if (o.type === 'cactus_t' || o.type === 'crystal' || o.type === 'fence') {
    // Tall obstacle
    ctx.fillRect(o.x, o.y, o.w, o.h);
    if (o.type === 'cactus_t') {
      ctx.fillRect(o.x - 5, o.y + 10, 6, 3);
      ctx.fillRect(o.x + o.w - 1, o.y + 20, 6, 3);
      ctx.fillStyle = darken(c, -30);
      ctx.fillRect(o.x + o.w/2 - 1, o.y - 4, 2, 5);
    } else if (o.type === 'crystal') {
      // Crystal shape
      ctx.fillStyle = '#88ccff';
      ctx.beginPath();
      ctx.moveTo(o.x + o.w/2, o.y);
      ctx.lineTo(o.x + o.w, o.y + o.h);
      ctx.lineTo(o.x, o.y + o.h);
      ctx.fill();
      ctx.fillStyle = '#aaddff';
      ctx.beginPath();
      ctx.moveTo(o.x + o.w/2, o.y);
      ctx.lineTo(o.x + o.w * 0.7, o.y + o.h);
      ctx.lineTo(o.x + o.w * 0.3, o.y + o.h * 0.5);
      ctx.fill();
    } else if (o.type === 'fence') {
      ctx.fillRect(o.x - 2, o.y + 5, o.w + 4, 3);
      ctx.fillRect(o.x - 2, o.y + o.h - 8, o.w + 4, 3);
      // Pointed top
      ctx.beginPath();
      ctx.moveTo(o.x, o.y + 2);
      ctx.lineTo(o.x + o.w/2, o.y - 4);
      ctx.lineTo(o.x + o.w, o.y + 2);
      ctx.fill();
    }
  } else {
    // Wide obstacle
    ctx.fillRect(o.x, o.y, o.w, o.h);
    ctx.fillStyle = darken(c, 15);
    ctx.fillRect(o.x + 4, o.y + 4, o.w - 8, o.h - 8);
    if (o.type === 'shield') {
      ctx.fillStyle = '#cc3333';
      ctx.fillRect(o.x + o.w/2 - 3, o.y + 6, 6, o.h - 12);
      ctx.fillRect(o.x + 4, o.y + o.h/2 - 2, o.w - 8, 4);
    }
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 3, 3);
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  ctx.fillStyle = '#fff';
  ctx.font = '14px "Press Start 2P"';
  ctx.textAlign = 'right';
  ctx.fillText(`${String(score).padStart(5, '0')}`, W - 20, 30);

  ctx.fillStyle = '#888';
  ctx.font = '9px "Press Start 2P"';
  ctx.fillText(`HI ${String(highScores[currentSetting] || 0).padStart(5, '0')}`, W - 20, 48);

  // Speed indicator
  ctx.fillStyle = '#4dacff';
  ctx.textAlign = 'left';
  ctx.font = '8px "Press Start 2P"';
  ctx.fillText(setting.label.toUpperCase(), 15, 25);

  // Speed bar
  const barW = 60;
  const filled = ((speed - 5) / 9) * barW;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(15, 32, barW, 6);
  ctx.fillStyle = speed > 10 ? '#ff6b6b' : '#4dacff';
  ctx.fillRect(15, 32, filled, 6);
}

function drawMenu() {
  drawSky();
  if (currentSetting === 'moon') drawStars();
  else if (currentSetting === 'desert') drawDesertBg();
  else drawMedievalBg();
  drawGround();
  drawBgElements();

  // Draw static dino
  dino.y = GROUND_Y - DINO_H;
  dino.legFrame = 0;
  drawDino();

  ctx.fillStyle = '#fff';
  ctx.font = '18px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('DINO RUN', W/2, H/2 - 30);

  ctx.font = '10px "Press Start 2P"';
  ctx.fillStyle = '#aaa';
  ctx.fillText('PRESS SPACE OR TAP TO START', W/2, H/2 + 10);

  ctx.font = '8px "Press Start 2P"';
  ctx.fillStyle = '#666';
  ctx.fillText(`Setting: ${setting.label}`, W/2, H/2 + 40);
}

function drawDead() {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff6b6b';
  ctx.font = '18px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2 - 30);

  ctx.fillStyle = '#fff';
  ctx.font = '12px "Press Start 2P"';
  ctx.fillText(`Score: ${score}`, W/2, H/2 + 5);

  if (score >= (highScores[currentSetting] || 0) && score > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = '10px "Press Start 2P"';
    ctx.fillText('NEW HIGH SCORE!', W/2, H/2 + 30);
  }

  ctx.fillStyle = '#888';
  ctx.font = '9px "Press Start 2P"';
  ctx.fillText('TAP OR SPACE TO RETRY', W/2, H/2 + 55);
}

// --- Main Loop ---
function gameLoop() {
  // Shake offset
  const sx = gameState === 'dead' && screenShake > 0.5 ? (Math.random()-0.5) * screenShake : 0;
  const sy = gameState === 'dead' && screenShake > 0.5 ? (Math.random()-0.5) * screenShake : 0;

  ctx.save();
  ctx.translate(sx, sy);

  update();

  if (gameState === 'menu') {
    drawMenu();
  } else {
    drawSky();
    if (currentSetting === 'moon') drawStars();
    else if (currentSetting === 'desert') drawDesertBg();
    else drawMedievalBg();
    drawBgElements();
    drawGround();
    obstacles.forEach(drawObstacle);
    drawDino();
    drawParticles();
    drawHUD();
    if (gameState === 'dead') {
      // Keep updating particles for death effect
      particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
      particles = particles.filter(p => p.life > 0);
      if (screenShake > 0) screenShake *= 0.9;
      drawDead();
    }
  }

  ctx.restore();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
