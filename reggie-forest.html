<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reggie in the Forest - Ollie's Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a1628;
    color: #e8e6f0;
    font-family: 'Press Start 2P', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
  }

  .back-link {
    position: fixed; top: 16px; left: 16px;
    color: #888; text-decoration: none; font-size: 10px; z-index: 100;
    font-family: 'Press Start 2P', monospace;
  }
  .back-link:hover { color: #4dacff; }

  h1 {
    font-size: clamp(14px, 3vw, 28px);
    color: #6abf6a;
    text-shadow: 0 0 10px rgba(106,191,106,0.6), 3px 3px 0 #1a3a1a;
    margin-bottom: 12px;
  }

  #gameCanvas {
    border: 2px solid rgba(106,191,106,0.4);
    border-radius: 8px;
    display: block;
    max-width: 95vw;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(106,191,106,0.15);
  }

  .hint {
    margin-top: 12px;
    font-size: 8px;
    color: #555;
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back</a>
<h1>REGGIE IN THE FOREST</h1>
<canvas id="gameCanvas" width="1100" height="500"></canvas>
<p class="hint">ARROWS / WASD to move &bull; SPACE / UP to jump &bull; Jump on enemies!</p>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = 1100, H = 500;

// ===== SAVE DATA =====
let saveData = JSON.parse(localStorage.getItem('rf_save') || '{"unlocked":1}');
function save() { localStorage.setItem('rf_save', JSON.stringify(saveData)); }

// ===== GAME STATES =====
let state = 'levelselect'; // levelselect, playing, dead, victory
let currentLevel = 1;
let frameCount = 0;

// ===== INPUT =====
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (state === 'levelselect' && e.code === 'Space') return;
  if ((state === 'dead' || state === 'victory') && e.code === 'Space') {
    if (state === 'victory') {
      if (currentLevel < 10) {
        currentLevel++;
        if (currentLevel > saveData.unlocked) { saveData.unlocked = currentLevel; save(); }
      }
      state = 'levelselect';
    } else {
      loadLevel(currentLevel);
    }
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('click', e => {
  if (state === 'levelselect') {
    handleLevelSelectClick(e);
  } else if (state === 'dead') {
    loadLevel(currentLevel);
  } else if (state === 'victory') {
    if (currentLevel < 10) {
      currentLevel++;
      if (currentLevel > saveData.unlocked) { saveData.unlocked = currentLevel; save(); }
    }
    state = 'levelselect';
  }
});

// ===== PLAYER =====
const P_W = 32, P_H = 24;
const SCALE = 2;
const PW = P_W * SCALE, PH = P_H * SCALE;
let player = {
  x: 60, y: 0, vx: 0, vy: 0,
  hp: 3, maxHp: 3,
  grounded: false, facing: 1,
  animFrame: 0, animTimer: 0,
  invincible: 0, // invincibility frames after hit
  lastSafeX: 60, lastSafeY: 0,
  tailWag: 0
};

// ===== CAMERA =====
let camX = 0;

// ===== LEVEL DATA =====
let platforms = [];
let enemies = [];
let pickups = [];
let decorations = [];
let levelEnd = 0;
let levelWidth = 0;

// ===== PARTICLES =====
let particles = [];

function addParticle(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random()-0.5)*spread, vy: -Math.random()*spread*0.8,
      life: 20+Math.random()*15, color, size: 2+Math.random()*2
    });
  }
}

// ===== LEVEL GENERATION =====
function generateLevel(lvl) {
  const plats = [];
  const ens = [];
  const picks = [];
  const decos = [];

  const difficulty = lvl; // 1-10
  const baseLen = 2500 + lvl * 600;

  // Ground segments with gaps
  let gx = 0;
  const groundY = H - 60;
  const segments = [];

  while (gx < baseLen) {
    const segW = 200 + Math.random() * 300;
    const h = groundY + (Math.random()-0.5) * 20 * Math.min(difficulty, 5);
    segments.push({ x: gx, y: Math.min(h, groundY + 10), w: segW });
    plats.push({ x: gx, y: Math.min(h, groundY + 10), w: segW, h: 80, type: 'ground' });

    gx += segW;

    // Gap (creek or just space)
    if (gx < baseLen - 300 && Math.random() < 0.3 + difficulty * 0.03) {
      const gapW = 80 + Math.random() * 40 + difficulty * 5;
      // Creek decoration
      decos.push({ x: gx, y: groundY + 10, w: gapW, type: 'creek' });
      gx += gapW;
    } else {
      gx += 10; // small join
    }
  }

  // Floating platforms
  const numFloating = 5 + Math.floor(difficulty * 1.5);
  for (let i = 0; i < numFloating; i++) {
    const px = 300 + Math.random() * (baseLen - 400);
    const py = groundY - 100 - Math.random() * 140;
    const pw = 80 + Math.random() * 100;
    const ptype = Math.random() < 0.5 ? 'log' : 'rock';
    plats.push({ x: px, y: py, w: pw, h: 20, type: ptype });
  }

  // Enemies
  const numEnemies = 3 + Math.floor(difficulty * 1.8);
  for (let i = 0; i < numEnemies; i++) {
    const seg = segments[Math.floor(Math.random() * segments.length)];
    if (!seg) continue;
    const ex = seg.x + 60 + Math.random() * (seg.w - 120);
    const etype = ['fox','raccoon','squirrel'][Math.floor(Math.random()*3)];
    let ew = 28, eh = 20;
    if (etype === 'raccoon') { ew = 32; eh = 24; }
    if (etype === 'squirrel') { ew = 18; eh = 16; }
    ens.push({
      x: ex, y: seg.y - eh * SCALE, w: ew * SCALE, h: eh * SCALE,
      type: etype, vx: (0.5 + Math.random() * 0.5 + difficulty * 0.1) * (Math.random()<0.5?1:-1),
      originX: ex, range: 60 + Math.random() * 80,
      alive: true, animFrame: 0
    });
  }

  // Pickups
  const numPickups = 4 + Math.floor(difficulty * 0.5);
  for (let i = 0; i < numPickups; i++) {
    const seg = segments[Math.floor(Math.random() * segments.length)];
    if (!seg) continue;
    const px = seg.x + 40 + Math.random() * (seg.w - 80);
    const ptype = Math.random() < 0.85 ? 'drumstick' : 'jamon';
    picks.push({
      x: px, y: seg.y - 50 - Math.random() * 40,
      type: ptype, collected: false, bobOffset: Math.random() * Math.PI * 2
    });
  }

  // Obstacles on ground (logs, mud, mossy rocks)
  const numObstacles = 2 + Math.floor(difficulty * 0.8);
  for (let i = 0; i < numObstacles; i++) {
    const seg = segments[Math.floor(Math.random() * segments.length)];
    if (!seg) continue;
    const ox = seg.x + 60 + Math.random() * (seg.w - 120);
    const otype = ['fallen_log','mud','mossy_rock'][Math.floor(Math.random()*3)];
    let ow = 60, oh = 16;
    if (otype === 'mossy_rock') { ow = 40; oh = 30; }
    if (otype === 'mud') { ow = 80; oh = 8; }
    plats.push({ x: ox, y: seg.y - oh, w: ow, h: oh, type: otype, solid: otype !== 'mud' });
  }

  // Decorations: trees, bushes, flowers
  for (let dx = 0; dx < baseLen; dx += 100 + Math.random() * 150) {
    if (Math.random() < 0.7) {
      decos.push({ x: dx, y: groundY - 10, type: 'tree', size: 0.7 + Math.random() * 0.6 });
    }
    if (Math.random() < 0.5) {
      decos.push({ x: dx + 30, y: groundY, type: 'bush' });
    }
    if (Math.random() < 0.3) {
      decos.push({ x: dx + 60, y: groundY, type: 'flower', color: ['#ff6b6b','#ffaa44','#aa66ff','#ff69b4'][Math.floor(Math.random()*4)] });
    }
  }

  return { platforms: plats, enemies: ens, pickups: picks, decorations: decos, width: baseLen };
}

function loadLevel(lvl) {
  currentLevel = lvl;
  const data = generateLevel(lvl);
  platforms = data.platforms;
  enemies = data.enemies;
  pickups = data.pickups;
  decorations = data.decorations;
  levelWidth = data.width;
  levelEnd = data.width - 60;

  player.x = 60;
  player.y = 200;
  player.vx = 0;
  player.vy = 0;
  player.hp = 3;
  player.grounded = false;
  player.invincible = 0;
  player.facing = 1;
  player.lastSafeX = 60;
  player.lastSafeY = 200;
  camX = 0;
  particles = [];
  state = 'playing';
  frameCount = 0;
}

// ===== PHYSICS =====
const GRAVITY = 0.55;
const JUMP_FORCE = -11;
const MOVE_SPEED = 4;
const MAX_VX = 5;
const FRICTION = 0.85;

function update() {
  if (state !== 'playing') return;
  frameCount++;

  // Input
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1;
  if (keys['ArrowRight'] || keys['KeyD']) moveX = 1;

  if (moveX !== 0) player.facing = moveX;
  player.vx += moveX * MOVE_SPEED * 0.3;
  player.vx *= FRICTION;
  if (Math.abs(player.vx) < 0.1) player.vx = 0;
  if (player.vx > MAX_VX) player.vx = MAX_VX;
  if (player.vx < -MAX_VX) player.vx = -MAX_VX;

  // Jump
  if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.grounded) {
    player.vy = JUMP_FORCE;
    player.grounded = false;
    addParticle(player.x + PW/2, player.y + PH, '#8B7355', 4, 3);
  }

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > 12) player.vy = 12;

  // Move X
  player.x += player.vx;
  if (player.x < 0) player.x = 0;
  if (player.x > levelWidth - PW) player.x = levelWidth - PW;

  // Collide X
  player.grounded = false;
  for (const p of platforms) {
    if (p.type === 'mud' || p.type === 'creek') continue;
    if (rectOverlap(player.x, player.y + 4, PW, PH - 8, p.x, p.y, p.w, p.h)) {
      if (player.vx > 0) player.x = p.x - PW;
      else if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }

  // Move Y
  player.y += player.vy;

  // Collide Y
  for (const p of platforms) {
    if (p.type === 'mud') continue;
    if (p.type === 'creek') continue;
    if (rectOverlap(player.x + 4, player.y, PW - 8, PH, p.x, p.y, p.w, p.h)) {
      if (player.vy > 0) {
        player.y = p.y - PH;
        player.vy = 0;
        player.grounded = true;
        player.lastSafeX = player.x;
        player.lastSafeY = player.y;
      } else if (player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Check mud slowdown
  for (const p of platforms) {
    if (p.type === 'mud' && rectOverlap(player.x, player.y + PH - 4, PW, 4, p.x, p.y, p.w, p.h)) {
      player.vx *= 0.6;
    }
  }

  // Fall off screen
  if (player.y > H + 100) {
    takeDamage();
    player.x = player.lastSafeX;
    player.y = player.lastSafeY - 20;
    player.vy = 0;
    player.vx = 0;
  }

  // Invincibility timer
  if (player.invincible > 0) player.invincible--;

  // Animation
  if (Math.abs(player.vx) > 0.5 && player.grounded) {
    player.animTimer += Math.abs(player.vx) * 0.15;
    if (player.animTimer >= 1) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }
  } else if (player.grounded) {
    player.animFrame = 0;
  }
  player.tailWag += 0.15;

  // Enemy update
  for (const e of enemies) {
    if (!e.alive) continue;
    e.x += e.vx;
    if (e.type === 'squirrel') {
      // Erratic: change direction randomly
      if (Math.random() < 0.02) e.vx = -e.vx;
    }
    if (Math.abs(e.x - e.originX) > e.range) e.vx = -e.vx;
    e.animFrame = (e.animFrame + 0.1) % 2;

    // Player collision
    if (player.invincible <= 0 && e.alive) {
      if (rectOverlap(player.x + 6, player.y + 6, PW - 12, PH - 6, e.x, e.y, e.w, e.h)) {
        // Check if stomping from above
        if (player.vy > 0 && player.y + PH < e.y + e.h * 0.6) {
          // Stomp enemy
          e.alive = false;
          player.vy = JUMP_FORCE * 0.6;
          addParticle(e.x + e.w/2, e.y + e.h/2, '#ffaa44', 8, 4);
        } else {
          takeDamage();
        }
      }
    }
  }

  // Pickup collection
  for (const pk of pickups) {
    if (pk.collected) continue;
    const pkW = 24, pkH = 24;
    const bobY = pk.y + Math.sin(frameCount * 0.05 + pk.bobOffset) * 6;
    if (rectOverlap(player.x, player.y, PW, PH, pk.x - pkW/2, bobY - pkH/2, pkW, pkH)) {
      pk.collected = true;
      if (pk.type === 'drumstick') {
        player.hp = Math.min(player.maxHp, player.hp + 1);
      } else {
        player.hp = player.maxHp;
      }
      addParticle(pk.x, bobY, '#ffd700', 10, 5);
    }
  }

  // Level complete check
  if (player.x + PW >= levelEnd) {
    state = 'victory';
    if (currentLevel >= saveData.unlocked && currentLevel < 10) {
      saveData.unlocked = currentLevel + 1;
      save();
    }
  }

  // Camera
  const targetCam = player.x - W * 0.35;
  camX += (targetCam - camX) * 0.1;
  if (camX < 0) camX = 0;
  if (camX > levelWidth - W) camX = levelWidth - W;

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
  }
  particles = particles.filter(p => p.life > 0);
}

function takeDamage() {
  if (player.invincible > 0) return;
  player.hp--;
  player.invincible = 90; // 1.5 seconds at 60fps
  addParticle(player.x + PW/2, player.y + PH/2, '#ff4444', 8, 4);
  if (player.hp <= 0) {
    state = 'dead';
  }
}

function rectOverlap(x1,y1,w1,h1, x2,y2,w2,h2) {
  return x1 < x2+w2 && x1+w1 > x2 && y1 < y2+h2 && y1+h1 > y2;
}

// ===== DRAWING =====

// Color palette
const SKY_TOP = '#87CEEB';
const SKY_BOT = '#B8D8BA';
const BARK_BROWN = '#5C3A1E';
const LEAF_GREEN = '#2D5A27';
const LEAF_LIGHT = '#4A8C3F';
const DIRT_BROWN = '#6B4226';
const GRASS_GREEN = '#3A7D2C';
const MOSS_GRAY = '#7A8B6F';

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, SKY_TOP);
  grad.addColorStop(0.6, SKY_BOT);
  grad.addColorStop(1, '#8BAF7B');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Dappled light spots
  ctx.fillStyle = 'rgba(255,255,200,0.08)';
  for (let i = 0; i < 15; i++) {
    const lx = ((i * 137 + 50) % (W + 200)) - camX * 0.05;
    const ly = 30 + (i * 73) % 200;
    const lr = 20 + (i * 11) % 30;
    ctx.beginPath();
    ctx.arc(((lx % W) + W) % W, ly, lr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawParallaxTrees() {
  // Far layer
  ctx.fillStyle = '#3D6B35';
  for (let i = 0; i < 20; i++) {
    const tx = (i * 180 - camX * 0.15) % (W + 400) - 100;
    const th = 180 + (i * 37 % 80);
    const tw = 50 + (i * 19 % 30);
    ctx.fillRect(tx + tw/2 - 6, H - 60 - th + 40, 12, th - 40);
    ctx.beginPath();
    ctx.moveTo(tx, H - 60 - th + 80);
    ctx.lineTo(tx + tw/2, H - 60 - th);
    ctx.lineTo(tx + tw, H - 60 - th + 80);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(tx + 5, H - 60 - th + 50);
    ctx.lineTo(tx + tw/2, H - 60 - th - 20);
    ctx.lineTo(tx + tw - 5, H - 60 - th + 50);
    ctx.fill();
  }

  // Mid layer
  ctx.fillStyle = '#2D5A27';
  for (let i = 0; i < 14; i++) {
    const tx = (i * 220 + 90 - camX * 0.35) % (W + 500) - 150;
    const th = 200 + (i * 43 % 100);
    const tw = 60 + (i * 23 % 40);
    ctx.fillStyle = BARK_BROWN;
    ctx.fillRect(tx + tw/2 - 8, H - 60 - th + 60, 16, th - 50);
    ctx.fillStyle = '#2D5A27';
    ctx.beginPath();
    ctx.moveTo(tx, H - 60 - th + 100);
    ctx.lineTo(tx + tw/2, H - 60 - th + 10);
    ctx.lineTo(tx + tw, H - 60 - th + 100);
    ctx.fill();
    ctx.fillStyle = LEAF_LIGHT;
    ctx.beginPath();
    ctx.moveTo(tx + 8, H - 60 - th + 60);
    ctx.lineTo(tx + tw/2, H - 60 - th);
    ctx.lineTo(tx + tw - 8, H - 60 - th + 60);
    ctx.fill();
  }
}

function drawCanopy() {
  // Top canopy with light gaps
  ctx.fillStyle = 'rgba(30,70,20,0.4)';
  for (let i = 0; i < 25; i++) {
    const cx2 = (i * 160 - camX * 0.08) % (W + 300) - 100;
    const cr = 40 + (i * 17 % 30);
    ctx.beginPath();
    ctx.arc(cx2, -5 + (i % 3) * 15, cr, 0, Math.PI * 2);
    ctx.fill();
  }

  // Hanging leaves
  ctx.fillStyle = 'rgba(40,90,30,0.25)';
  for (let i = 0; i < 20; i++) {
    const lx = (i * 130 - camX * 0.1) % (W + 300) - 80;
    const ly = 20 + (i * 31 % 40);
    const lh = 15 + (i * 13 % 20);
    ctx.beginPath();
    ctx.ellipse(lx, ly, 8, lh, 0.2 * (i % 3 - 1), 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPlatform(p) {
  const x = Math.floor(p.x - camX);
  const y = Math.floor(p.y);

  if (p.type === 'ground') {
    // Dirt fill
    ctx.fillStyle = DIRT_BROWN;
    ctx.fillRect(x, y, p.w, p.h);
    // Grass top
    ctx.fillStyle = GRASS_GREEN;
    ctx.fillRect(x, y, p.w, 6);
    // Grass tufts
    ctx.fillStyle = '#4A9C38';
    for (let gx = 0; gx < p.w; gx += 8 + (gx * 7 % 5)) {
      ctx.fillRect(x + gx, y - 3, 3, 5);
      ctx.fillRect(x + gx + 3, y - 1, 2, 3);
    }
    // Dirt texture
    ctx.fillStyle = 'rgba(90,50,20,0.3)';
    for (let dx = 0; dx < p.w; dx += 15 + (dx * 3 % 10)) {
      ctx.fillRect(x + dx, y + 10 + (dx % 7) * 3, 4, 2);
    }
  } else if (p.type === 'log') {
    // Fallen log platform
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(x, y, p.w, p.h);
    ctx.fillStyle = '#5A3518';
    ctx.fillRect(x, y + p.h - 4, p.w, 4);
    // Bark rings on ends
    ctx.fillStyle = '#7B5236';
    ctx.fillRect(x, y, 4, p.h);
    ctx.fillRect(x + p.w - 4, y, 4, p.h);
    // Bark lines
    ctx.fillStyle = 'rgba(50,25,10,0.3)';
    for (let lx = 10; lx < p.w - 10; lx += 12) {
      ctx.fillRect(x + lx, y + 2, 1, p.h - 4);
    }
    // Moss spots
    ctx.fillStyle = MOSS_GRAY;
    ctx.fillRect(x + 10, y, 15, 3);
    ctx.fillRect(x + p.w - 30, y, 12, 3);
  } else if (p.type === 'rock') {
    // Mossy rock platform
    ctx.fillStyle = '#808080';
    ctx.fillRect(x + 2, y + 4, p.w - 4, p.h - 4);
    ctx.fillStyle = '#909090';
    ctx.fillRect(x, y, p.w, p.h - 4);
    // Moss on top
    ctx.fillStyle = MOSS_GRAY;
    ctx.fillRect(x, y, p.w, 5);
    ctx.fillStyle = '#8AAA7A';
    for (let mx = 0; mx < p.w; mx += 7) {
      ctx.fillRect(x + mx, y - 1, 3, 3);
    }
  } else if (p.type === 'fallen_log') {
    // Obstacle log lying on ground
    ctx.fillStyle = '#5A3518';
    ctx.fillRect(x, y, p.w, p.h);
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(x + 2, y + 2, p.w - 4, p.h - 6);
    // End circles
    ctx.fillStyle = '#7B5236';
    ctx.beginPath();
    ctx.arc(x + 2, y + p.h/2, p.h/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + p.w - 2, y + p.h/2, p.h/2, 0, Math.PI * 2);
    ctx.fill();
  } else if (p.type === 'mossy_rock') {
    // Big mossy boulder
    ctx.fillStyle = '#707070';
    ctx.beginPath();
    ctx.moveTo(x + 5, y + p.h);
    ctx.lineTo(x, y + p.h * 0.5);
    ctx.lineTo(x + p.w * 0.3, y);
    ctx.lineTo(x + p.w * 0.7, y + 2);
    ctx.lineTo(x + p.w, y + p.h * 0.4);
    ctx.lineTo(x + p.w - 3, y + p.h);
    ctx.fill();
    ctx.fillStyle = MOSS_GRAY;
    ctx.fillRect(x + 5, y, p.w - 10, 6);
  } else if (p.type === 'mud') {
    // Mud puddle
    ctx.fillStyle = '#5A4020';
    ctx.beginPath();
    ctx.ellipse(x + p.w/2, y + p.h/2, p.w/2, p.h/2 + 2, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(80,60,30,0.5)';
    ctx.beginPath();
    ctx.ellipse(x + p.w/2 - 5, y + p.h/2 - 1, p.w/3, p.h/3, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawDecoration(d) {
  const x = Math.floor(d.x - camX);
  const y = Math.floor(d.y);

  if (d.type === 'creek') {
    // Blue water in gap
    ctx.fillStyle = '#4A90B8';
    ctx.fillRect(x, y, d.w, 50);
    // Water surface shine
    ctx.fillStyle = 'rgba(100,180,220,0.4)';
    ctx.fillRect(x + 5, y + 2, d.w - 10, 3);
    // Ripples
    ctx.strokeStyle = 'rgba(150,210,240,0.3)';
    ctx.lineWidth = 1;
    const ripOffset = (frameCount * 0.5) % 20;
    for (let rx = 0; rx < d.w; rx += 20) {
      ctx.beginPath();
      ctx.arc(x + rx + ripOffset, y + 15, 6, 0, Math.PI);
      ctx.stroke();
    }
  } else if (d.type === 'tree') {
    // Background tree (decorative, drawn behind gameplay)
    const s = d.size;
    ctx.fillStyle = '#4A3020';
    ctx.fillRect(x + 10 * s, y - 80 * s, 10 * s, 80 * s);
    ctx.fillStyle = LEAF_GREEN;
    ctx.beginPath();
    ctx.arc(x + 15 * s, y - 80 * s, 25 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = LEAF_LIGHT;
    ctx.beginPath();
    ctx.arc(x + 12 * s, y - 85 * s, 15 * s, 0, Math.PI * 2);
    ctx.fill();
  } else if (d.type === 'bush') {
    ctx.fillStyle = '#3A6B2A';
    ctx.beginPath();
    ctx.arc(x, y - 6, 12, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4A8B3A';
    ctx.beginPath();
    ctx.arc(x - 5, y - 8, 8, 0, Math.PI * 2);
    ctx.fill();
  } else if (d.type === 'flower') {
    ctx.fillStyle = '#2A5A1A';
    ctx.fillRect(x, y - 10, 2, 10);
    ctx.fillStyle = d.color;
    ctx.beginPath();
    ctx.arc(x + 1, y - 12, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(x + 1, y - 12, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawReggie() {
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

  const x = Math.floor(player.x - camX);
  const y = Math.floor(player.y);
  const f = player.facing;
  const s = SCALE;

  ctx.save();
  if (f < 0) {
    ctx.translate(x + PW, 0);
    ctx.scale(-1, 1);
    ctx.translate(0, 0);
  } else {
    ctx.translate(x, 0);
  }

  // Body - brown top
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(4*s, (6)*s + y, 24*s, 10*s);

  // Body - white belly
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(4*s, (13)*s + y, 24*s, 6*s);

  // Head
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(22*s, (2)*s + y, 10*s, 12*s);

  // White face blaze
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(25*s, (3)*s + y, 4*s, 10*s);

  // Muzzle
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(28*s, (8)*s + y, 4*s, 5*s);

  // Nose
  ctx.fillStyle = '#222';
  ctx.fillRect(30*s, (8)*s + y, 2*s, 2*s);

  // Eye
  ctx.fillStyle = '#fff';
  ctx.fillRect(27*s, (4)*s + y, 3*s, 3*s);
  ctx.fillStyle = '#2a1505';
  ctx.fillRect(28*s, (5)*s + y, 2*s, 2*s);

  // Floppy ear
  ctx.fillStyle = '#6B3F1F';
  ctx.fillRect(22*s, (4)*s + y, 4*s, 10*s);

  // Tail
  const tailWag = Math.sin(player.tailWag) * 3 * s;
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(0, (7)*s + y + tailWag, 5*s, 3*s);

  // Legs
  ctx.fillStyle = '#7A4E2C';
  if (!player.grounded) {
    // Spread eagle jump
    // Front legs
    ctx.fillRect(20*s, (18)*s + y, 4*s, 6*s);
    ctx.fillRect(24*s, (16)*s + y, 4*s, 4*s);
    // Back legs
    ctx.fillRect(4*s, (18)*s + y, 4*s, 6*s);
    ctx.fillRect(0*s, (16)*s + y, 4*s, 4*s);
  } else {
    // Walk cycle
    const frame = player.animFrame;
    const legOffsets = [
      [0, 4, 0, 4],   // frame 0: all down
      [-2, 6, 2, 2],  // frame 1
      [0, 4, 0, 4],   // frame 2
      [2, 2, -2, 6],  // frame 3
    ];
    const lo = legOffsets[frame] || legOffsets[0];
    // Front legs
    ctx.fillRect(20*s, (18 + lo[0])*s + y, 4*s, (4 + lo[1])*s);
    ctx.fillRect(23*s, (18 + lo[2])*s + y, 4*s, (4 + lo[3])*s);
    // Back legs
    ctx.fillRect(5*s, (18 + lo[2])*s + y, 4*s, (4 + lo[3])*s);
    ctx.fillRect(8*s, (18 + lo[0])*s + y, 4*s, (4 + lo[1])*s);

    // Paws (white)
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(20*s, (18 + lo[0] + 2 + lo[1])*s + y, 4*s, 2*s);
    ctx.fillRect(23*s, (18 + lo[2] + 2 + lo[3])*s + y, 4*s, 2*s);
    ctx.fillRect(5*s, (18 + lo[2] + 2 + lo[3])*s + y, 4*s, 2*s);
    ctx.fillRect(8*s, (18 + lo[0] + 2 + lo[1])*s + y, 4*s, 2*s);
  }

  ctx.restore();
}

function drawEnemy(e) {
  if (!e.alive) return;
  const x = Math.floor(e.x - camX);
  const y = Math.floor(e.y);
  const f = Math.floor(e.animFrame);

  if (e.type === 'fox') {
    // Orange fox
    ctx.fillStyle = '#D4652A';
    ctx.fillRect(x + 4, y + 4, e.w - 8, e.h - 12);
    // Head
    ctx.fillStyle = '#D4652A';
    ctx.fillRect(x + e.w - 20, y, 16, 16);
    // White belly
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(x + 8, y + e.h - 14, e.w - 20, 6);
    // Eye
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(x + e.w - 10, y + 4, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + e.w - 9, y + 5, 2, 2);
    // Ear
    ctx.fillStyle = '#B84A1A';
    ctx.fillRect(x + e.w - 18, y - 4, 6, 8);
    // Tail
    ctx.fillStyle = '#D4652A';
    ctx.fillRect(x - 2, y + 6, 10, 6);
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(x - 2, y + 10, 6, 3);
    // Legs
    ctx.fillStyle = '#222';
    if (f === 0) {
      ctx.fillRect(x + 10, y + e.h - 8, 4, 8);
      ctx.fillRect(x + e.w - 16, y + e.h - 6, 4, 6);
    } else {
      ctx.fillRect(x + 10, y + e.h - 6, 4, 6);
      ctx.fillRect(x + e.w - 16, y + e.h - 8, 4, 8);
    }
  } else if (e.type === 'raccoon') {
    // Gray raccoon
    ctx.fillStyle = '#808080';
    ctx.fillRect(x + 4, y + 4, e.w - 8, e.h - 12);
    // Head
    ctx.fillStyle = '#707070';
    ctx.fillRect(x + e.w - 24, y, 20, 18);
    // Mask
    ctx.fillStyle = '#333';
    ctx.fillRect(x + e.w - 20, y + 4, 14, 6);
    // Eyes
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + e.w - 18, y + 5, 4, 4);
    ctx.fillRect(x + e.w - 12, y + 5, 4, 4);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + e.w - 17, y + 6, 2, 2);
    ctx.fillRect(x + e.w - 11, y + 6, 2, 2);
    // Striped tail
    ctx.fillStyle = '#808080';
    ctx.fillRect(x - 4, y + 4, 12, 8);
    ctx.fillStyle = '#333';
    ctx.fillRect(x - 2, y + 4, 3, 8);
    ctx.fillRect(x + 4, y + 4, 3, 8);
    // Legs
    ctx.fillStyle = '#555';
    ctx.fillRect(x + 8, y + e.h - 8, 4, 8);
    ctx.fillRect(x + e.w - 14, y + e.h - 8, 4, 8);
  } else if (e.type === 'squirrel') {
    // Small brown squirrel
    ctx.fillStyle = '#8B6240';
    ctx.fillRect(x + 2, y + 2, e.w - 4, e.h - 6);
    // Head
    ctx.fillRect(x + e.w - 12, y, 10, 10);
    // Eye
    ctx.fillStyle = '#000';
    ctx.fillRect(x + e.w - 6, y + 3, 2, 2);
    // Fluffy tail
    ctx.fillStyle = '#9B7250';
    ctx.fillRect(x - 4, y - 6, 8, 12);
    ctx.fillRect(x - 6, y - 8, 6, 6);
    // Legs
    ctx.fillStyle = '#6B4220';
    ctx.fillRect(x + 4, y + e.h - 6, 3, 6);
    ctx.fillRect(x + e.w - 8, y + e.h - 6, 3, 6);
  }
}

function drawPickup(pk) {
  if (pk.collected) return;
  const bobY = pk.y + Math.sin(frameCount * 0.05 + pk.bobOffset) * 6;
  const x = Math.floor(pk.x - camX);
  const y = Math.floor(bobY);

  // Sparkle
  if (frameCount % 20 < 10) {
    ctx.fillStyle = 'rgba(255,215,0,0.5)';
    ctx.fillRect(x - 2, y - 2, 2, 2);
    ctx.fillRect(x + 10, y + 10, 2, 2);
    ctx.fillRect(x + 12, y - 4, 2, 2);
  }

  if (pk.type === 'drumstick') {
    // Cartoon drumstick
    // Bone end
    ctx.fillStyle = '#F5F0E0';
    ctx.fillRect(x - 6, y - 2, 8, 6);
    ctx.beginPath();
    ctx.arc(x - 6, y + 1, 4, 0, Math.PI * 2);
    ctx.fill();
    // Meat
    ctx.fillStyle = '#C07030';
    ctx.fillRect(x, y - 4, 14, 10);
    ctx.beginPath();
    ctx.arc(x + 14, y + 1, 6, 0, Math.PI * 2);
    ctx.fill();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillRect(x + 6, y - 2, 4, 3);
  } else {
    // Jamon iberico leg on stand
    // Stand
    ctx.fillStyle = '#654321';
    ctx.fillRect(x, y + 8, 2, 10);
    ctx.fillRect(x + 14, y + 8, 2, 10);
    ctx.fillRect(x - 2, y + 16, 20, 3);
    // Ham
    ctx.fillStyle = '#8B2020';
    ctx.fillRect(x - 2, y - 6, 20, 14);
    ctx.fillStyle = '#A03030';
    ctx.fillRect(x, y - 4, 16, 10);
    // Fat marbling
    ctx.fillStyle = '#F0D0B0';
    ctx.fillRect(x + 4, y - 2, 3, 2);
    ctx.fillRect(x + 10, y, 2, 3);
    // Hoof end
    ctx.fillStyle = '#3A2010';
    ctx.fillRect(x + 16, y - 4, 4, 8);
  }
}

function drawHUD() {
  // Hearts
  for (let i = 0; i < player.maxHp; i++) {
    const hx = 15 + i * 30;
    if (i < player.hp) {
      ctx.fillStyle = '#FF4444';
    } else {
      ctx.fillStyle = '#444';
    }
    drawHeart(hx, 18, 10);
  }

  // Level indicator
  ctx.fillStyle = '#fff';
  ctx.font = '10px "Press Start 2P"';
  ctx.textAlign = 'right';
  ctx.fillText('LV ' + currentLevel, W - 15, 25);

  // Progress bar
  const progress = Math.min(1, player.x / levelEnd);
  const barW = 120;
  const barX = W - 15 - barW;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(barX, 32, barW, 8);
  ctx.fillStyle = '#6abf6a';
  ctx.fillRect(barX, 32, barW * progress, 8);
  // Reggie icon on progress bar
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(barX + barW * progress - 4, 29, 8, 6);
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(barX + barW * progress - 2, 34, 4, 3);
}

function drawHeart(x, y, size) {
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.3);
  ctx.bezierCurveTo(x, y, x + size/2, y, x + size/2, y + size * 0.3);
  ctx.bezierCurveTo(x + size/2, y, x + size, y, x + size, y + size * 0.3);
  ctx.bezierCurveTo(x + size, y + size * 0.6, x + size/2, y + size, x + size/2, y + size);
  ctx.bezierCurveTo(x + size/2, y + size, x, y + size * 0.6, x, y + size * 0.3);
  ctx.fill();
}

function drawParticles2() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 30);
    ctx.fillStyle = p.color;
    const px = p.x - camX;
    ctx.fillRect(Math.floor(px), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#6abf6a';
  ctx.font = '22px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL COMPLETE!', W/2, H/2 - 30);

  ctx.fillStyle = '#fff';
  ctx.font = '11px "Press Start 2P"';
  if (currentLevel < 10) {
    ctx.fillText('PRESS SPACE / TAP FOR NEXT LEVEL', W/2, H/2 + 20);
  } else {
    ctx.fillStyle = '#ffd700';
    ctx.fillText('YOU BEAT THE GAME!', W/2, H/2 + 10);
    ctx.fillStyle = '#aaa';
    ctx.font = '9px "Press Start 2P"';
    ctx.fillText('PRESS SPACE / TAP FOR LEVEL SELECT', W/2, H/2 + 40);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff6b6b';
  ctx.font = '22px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2 - 20);

  ctx.fillStyle = '#aaa';
  ctx.font = '10px "Press Start 2P"';
  ctx.fillText('PRESS SPACE / TAP TO RETRY', W/2, H/2 + 20);
}

// ===== LEVEL SELECT =====
let levelSelectHover = -1;

function drawLevelSelect() {
  // Forest-themed background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1A3A1A');
  grad.addColorStop(1, '#0A1A0A');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Background trees
  ctx.fillStyle = '#143014';
  for (let i = 0; i < 12; i++) {
    const tx = i * 100 + 20;
    ctx.beginPath();
    ctx.moveTo(tx, H);
    ctx.lineTo(tx + 25, H - 150 - (i % 3) * 40);
    ctx.lineTo(tx + 50, H);
    ctx.fill();
  }

  ctx.fillStyle = '#6abf6a';
  ctx.font = '20px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('REGGIE IN THE FOREST', W/2, 60);

  ctx.font = '10px "Press Start 2P"';
  ctx.fillStyle = '#888';
  ctx.fillText('SELECT A LEVEL', W/2, 90);

  // Level buttons - 2 rows of 5
  const btnW = 140, btnH = 80, gap = 20;
  const startX = (W - (5 * btnW + 4 * gap)) / 2;
  const startY = 130;

  for (let i = 0; i < 10; i++) {
    const col = i % 5;
    const row = Math.floor(i / 5);
    const bx = startX + col * (btnW + gap);
    const by = startY + row * (btnH + gap);
    const lvl = i + 1;
    const unlocked = lvl <= saveData.unlocked;

    // Button bg
    if (unlocked) {
      ctx.fillStyle = levelSelectHover === i ? 'rgba(106,191,106,0.25)' : 'rgba(106,191,106,0.1)';
    } else {
      ctx.fillStyle = 'rgba(80,80,80,0.15)';
    }
    ctx.fillRect(bx, by, btnW, btnH);

    // Border
    ctx.strokeStyle = unlocked ? 'rgba(106,191,106,0.5)' : 'rgba(80,80,80,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, btnW, btnH);

    // Level number
    ctx.fillStyle = unlocked ? '#6abf6a' : '#555';
    ctx.font = '16px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText(String(lvl), bx + btnW/2, by + 35);

    // Lock icon or forest name
    if (!unlocked) {
      ctx.fillStyle = '#555';
      ctx.font = '10px "Press Start 2P"';
      ctx.fillText('LOCKED', bx + btnW/2, by + 58);
    } else {
      const names = ['Meadow', 'Brook', 'Thicket', 'Valley', 'Ridge',
                     'Hollow', 'Rapids', 'Canopy', 'Summit', 'Deep Woods'];
      ctx.fillStyle = '#4a8a4a';
      ctx.font = '7px "Press Start 2P"';
      ctx.fillText(names[i], bx + btnW/2, by + 58);
    }
  }

  // Draw mini Reggie at bottom
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(W/2 - 20, H - 70, 40, 20);
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(W/2 - 20, H - 56, 40, 10);
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(W/2 + 12, H - 78, 16, 18);
  ctx.fillStyle = '#222';
  ctx.fillRect(W/2 + 22, H - 76, 4, 3);
  // Tail wag
  const tw = Math.sin(frameCount * 0.1) * 4;
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(W/2 - 26 + tw, H - 66, 8, 5);

  ctx.fillStyle = '#555';
  ctx.font = '8px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('CLICK A LEVEL TO START', W/2, H - 25);
}

function handleLevelSelectClick(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const btnW = 140, btnH = 80, gap = 20;
  const startX = (W - (5 * btnW + 4 * gap)) / 2;
  const startY = 130;

  for (let i = 0; i < 10; i++) {
    const col = i % 5;
    const row = Math.floor(i / 5);
    const bx = startX + col * (btnW + gap);
    const by = startY + row * (btnH + gap);
    const lvl = i + 1;

    if (mx >= bx && mx <= bx + btnW && my >= by && my <= by + btnH) {
      if (lvl <= saveData.unlocked) {
        loadLevel(lvl);
      }
      return;
    }
  }
}

// Track mouse for hover
canvas.addEventListener('mousemove', e => {
  if (state !== 'levelselect') { levelSelectHover = -1; return; }
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const btnW = 140, btnH = 80, gap = 20;
  const startX = (W - (5 * btnW + 4 * gap)) / 2;
  const startY = 130;
  levelSelectHover = -1;

  for (let i = 0; i < 10; i++) {
    const col = i % 5;
    const row = Math.floor(i / 5);
    const bx = startX + col * (btnW + gap);
    const by = startY + row * (btnH + gap);
    if (mx >= bx && mx <= bx + btnW && my >= by && my <= by + btnH) {
      if (i + 1 <= saveData.unlocked) levelSelectHover = i;
      break;
    }
  }
});

// ===== MAIN LOOP =====
function gameLoop() {
  frameCount++;

  if (state === 'levelselect') {
    drawLevelSelect();
  } else {
    update();

    drawSky();
    drawParallaxTrees();

    // Draw decorations behind platforms
    for (const d of decorations) {
      if (d.x - camX > -200 && d.x - camX < W + 200) {
        drawDecoration(d);
      }
    }

    // Draw platforms
    for (const p of platforms) {
      if (p.x + p.w - camX > -50 && p.x - camX < W + 50) {
        drawPlatform(p);
      }
    }

    // Draw enemies
    for (const e of enemies) {
      if (e.x - camX > -100 && e.x - camX < W + 100) {
        drawEnemy(e);
      }
    }

    // Draw pickups
    for (const pk of pickups) {
      if (pk.x - camX > -50 && pk.x - camX < W + 50) {
        drawPickup(pk);
      }
    }

    // Draw player
    drawReggie();

    // Canopy overlay
    drawCanopy();

    // Particles
    drawParticles2();

    // HUD
    drawHUD();

    // Overlays
    if (state === 'victory') drawLevelComplete();
    if (state === 'dead') drawGameOver();
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
