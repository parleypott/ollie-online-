<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reggie in the Forest - Ollie's Universe</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #0a1628;
    color: #e8e6f0;
    font-family: 'Press Start 2P', monospace;
    width: 100%;
    height: 100%;
    overflow: hidden;
    -webkit-font-smoothing: none;
    image-rendering: pixelated;
  }

  .back-link {
    position: fixed; top: 12px; left: 12px;
    color: #888; text-decoration: none; font-size: 10px; z-index: 100;
    font-family: 'Press Start 2P', monospace;
  }
  .back-link:hover { color: #6abf6a; }

  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: pointer;
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">&larr; Back</a>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Dynamic fullscreen sizing
let W, H, GROUND_Y;
function resize() {
  const dpr = 1; // keep pixel art crisp
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  GROUND_Y = H - 80;
}
resize();
window.addEventListener('resize', resize);

// ===== SAVE DATA =====
let saveData = JSON.parse(localStorage.getItem('rf_save') || '{"unlocked":1}');
function save() { localStorage.setItem('rf_save', JSON.stringify(saveData)); }

// ===== GAME STATES =====
let state = 'levelselect';
let currentLevel = 1;
let frameCount = 0;

// ===== INPUT =====
const keys = {};
let jumpHeld = false;
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (state === 'levelselect' && e.code === 'Space') return;
  if ((state === 'dead' || state === 'victory') && e.code === 'Space') {
    if (state === 'victory') {
      if (currentLevel < 10) {
        currentLevel++;
        if (currentLevel > saveData.unlocked) { saveData.unlocked = currentLevel; save(); }
      }
      state = 'levelselect';
    } else {
      loadLevel(currentLevel);
    }
  }
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') jumpHeld = false;
});

canvas.addEventListener('click', e => {
  if (state === 'levelselect') {
    handleLevelSelectClick(e);
  } else if (state === 'dead') {
    loadLevel(currentLevel);
  } else if (state === 'victory') {
    if (currentLevel < 10) {
      currentLevel++;
      if (currentLevel > saveData.unlocked) { saveData.unlocked = currentLevel; save(); }
    }
    state = 'levelselect';
  }
});

// ===== PLAYER =====
const SCALE = 3;
const P_W = 32, P_H = 24;
const PW = P_W * SCALE, PH = P_H * SCALE;
let player = {
  x: 100, y: 0, vx: 0, vy: 0,
  hp: 3, maxHp: 3,
  grounded: false, facing: 1,
  animFrame: 0, animTimer: 0,
  invincible: 0,
  lastSafeX: 100, lastSafeY: 0,
  tailWag: 0
};

// ===== CAMERA =====
let camX = 0;

// ===== LEVEL DATA =====
let platforms = [];
let enemies = [];
let pickups = [];
let decorations = [];
let levelEnd = 0;
let levelWidth = 0;

// ===== PARTICLES =====
let particles = [];

function addParticle(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random()-0.5)*spread, vy: -Math.random()*spread*0.7,
      life: 25+Math.random()*15, color, size: 3+Math.random()*3
    });
  }
}

// ===== PHYSICS =====
const GRAVITY = 0.32;
const JUMP_FORCE = -13.5;
const MOVE_SPEED = 4.5;
const MAX_VX = 5.5;
const FRICTION = 0.88;

// ===== LEVEL GENERATION =====
function generateLevel(lvl) {
  const plats = [];
  const ens = [];
  const picks = [];
  const decos = [];

  const difficulty = lvl;
  const baseLen = 4000 + lvl * 900;

  // Ground segments with gaps
  let gx = 0;
  const segments = [];

  while (gx < baseLen) {
    const segW = 350 + Math.random() * 450;
    const h = GROUND_Y + (Math.random()-0.5) * 15 * Math.min(difficulty, 5);
    segments.push({ x: gx, y: Math.min(h, GROUND_Y + 10), w: segW });
    plats.push({ x: gx, y: Math.min(h, GROUND_Y + 10), w: segW, h: 120, type: 'ground' });

    gx += segW;

    // Gap (creek or just space)
    if (gx < baseLen - 500 && Math.random() < 0.25 + difficulty * 0.02) {
      const gapW = 120 + Math.random() * 60 + difficulty * 5;
      decos.push({ x: gx, y: GROUND_Y + 10, w: gapW, type: 'creek' });
      gx += gapW;
    } else {
      gx += 15;
    }
  }

  // Floating platforms
  const numFloating = 6 + Math.floor(difficulty * 1.5);
  for (let i = 0; i < numFloating; i++) {
    const px = 400 + Math.random() * (baseLen - 600);
    const py = GROUND_Y - 140 - Math.random() * 180;
    const pw = 120 + Math.random() * 140;
    const ptype = Math.random() < 0.5 ? 'log' : 'rock';
    plats.push({ x: px, y: py, w: pw, h: 24, type: ptype });
  }

  // Enemies - more spread out
  const numEnemies = 3 + Math.floor(difficulty * 1.5);
  for (let i = 0; i < numEnemies; i++) {
    const seg = segments[Math.floor(Math.random() * segments.length)];
    if (!seg || seg.w < 200) continue;
    const ex = seg.x + 100 + Math.random() * (seg.w - 200);
    const etype = ['fox','raccoon','squirrel'][Math.floor(Math.random()*3)];
    let ew = 36, eh = 26;
    if (etype === 'raccoon') { ew = 42; eh = 30; }
    if (etype === 'squirrel') { ew = 24; eh = 20; }
    ens.push({
      x: ex, y: seg.y - eh * SCALE, w: ew * SCALE, h: eh * SCALE,
      type: etype, vx: (0.4 + Math.random() * 0.4 + difficulty * 0.08) * (Math.random()<0.5?1:-1),
      originX: ex, range: 80 + Math.random() * 120,
      alive: true, animFrame: 0
    });
  }

  // Pickups - more generous
  const numPickups = 5 + Math.floor(difficulty * 0.6);
  for (let i = 0; i < numPickups; i++) {
    const seg = segments[Math.floor(Math.random() * segments.length)];
    if (!seg) continue;
    const px = seg.x + 60 + Math.random() * (seg.w - 120);
    const ptype = Math.random() < 0.82 ? 'drumstick' : 'jamon';
    picks.push({
      x: px, y: seg.y - 70 - Math.random() * 50,
      type: ptype, collected: false, bobOffset: Math.random() * Math.PI * 2
    });
  }

  // Ground obstacles - more spread
  const numObstacles = 2 + Math.floor(difficulty * 0.6);
  for (let i = 0; i < numObstacles; i++) {
    const seg = segments[Math.floor(Math.random() * segments.length)];
    if (!seg || seg.w < 200) continue;
    const ox = seg.x + 100 + Math.random() * (seg.w - 200);
    const otype = ['fallen_log','mud','mossy_rock'][Math.floor(Math.random()*3)];
    let ow = 80, oh = 20;
    if (otype === 'mossy_rock') { ow = 55; oh = 40; }
    if (otype === 'mud') { ow = 110; oh = 10; }
    plats.push({ x: ox, y: seg.y - oh, w: ow, h: oh, type: otype, solid: otype !== 'mud' });
  }

  // Decorations: trees, bushes, flowers - spread wider
  for (let dx = 0; dx < baseLen; dx += 150 + Math.random() * 200) {
    if (Math.random() < 0.7) {
      decos.push({ x: dx, y: GROUND_Y - 10, type: 'tree', size: 0.8 + Math.random() * 0.7 });
    }
    if (Math.random() < 0.5) {
      decos.push({ x: dx + 50, y: GROUND_Y, type: 'bush' });
    }
    if (Math.random() < 0.3) {
      decos.push({ x: dx + 90, y: GROUND_Y, type: 'flower', color: ['#ff6b6b','#ffaa44','#aa66ff','#ff69b4'][Math.floor(Math.random()*4)] });
    }
  }

  return { platforms: plats, enemies: ens, pickups: picks, decorations: decos, width: baseLen };
}

function loadLevel(lvl) {
  currentLevel = lvl;
  const data = generateLevel(lvl);
  platforms = data.platforms;
  enemies = data.enemies;
  pickups = data.pickups;
  decorations = data.decorations;
  levelWidth = data.width;
  levelEnd = data.width - 80;

  player.x = 100;
  player.y = 200;
  player.vx = 0;
  player.vy = 0;
  player.hp = 3;
  player.grounded = false;
  player.invincible = 0;
  player.facing = 1;
  player.lastSafeX = 100;
  player.lastSafeY = 200;
  camX = 0;
  particles = [];
  jumpHeld = false;
  state = 'playing';
  frameCount = 0;
}

function update() {
  if (state !== 'playing') return;
  frameCount++;

  // Input
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) moveX = -1;
  if (keys['ArrowRight'] || keys['KeyD']) moveX = 1;

  if (moveX !== 0) player.facing = moveX;
  player.vx += moveX * MOVE_SPEED * 0.25;
  player.vx *= FRICTION;
  if (Math.abs(player.vx) < 0.1) player.vx = 0;
  if (player.vx > MAX_VX) player.vx = MAX_VX;
  if (player.vx < -MAX_VX) player.vx = -MAX_VX;

  // Jump - only on initial press
  const jumpKey = keys['Space'] || keys['ArrowUp'] || keys['KeyW'];
  if (jumpKey && !jumpHeld && player.grounded) {
    player.vy = JUMP_FORCE;
    player.grounded = false;
    jumpHeld = true;
    addParticle(player.x + PW/2, player.y + PH, '#8B7355', 5, 3);
  }
  if (!jumpKey) jumpHeld = false;

  // Variable jump height - release early for short hop
  if (!jumpKey && player.vy < -3) {
    player.vy *= 0.88;
  }

  // Gravity
  player.vy += GRAVITY;
  if (player.vy > 10) player.vy = 10;

  // Move X
  player.x += player.vx;
  if (player.x < 0) player.x = 0;
  if (player.x > levelWidth - PW) player.x = levelWidth - PW;

  // Collide X
  player.grounded = false;
  for (const p of platforms) {
    if (p.type === 'mud' || p.type === 'creek') continue;
    if (rectOverlap(player.x, player.y + 6, PW, PH - 12, p.x, p.y, p.w, p.h)) {
      if (player.vx > 0) player.x = p.x - PW;
      else if (player.vx < 0) player.x = p.x + p.w;
      player.vx = 0;
    }
  }

  // Move Y
  player.y += player.vy;

  // Collide Y
  for (const p of platforms) {
    if (p.type === 'mud' || p.type === 'creek') continue;
    if (rectOverlap(player.x + 6, player.y, PW - 12, PH, p.x, p.y, p.w, p.h)) {
      if (player.vy > 0) {
        player.y = p.y - PH;
        player.vy = 0;
        player.grounded = true;
        player.lastSafeX = player.x;
        player.lastSafeY = player.y;
      } else if (player.vy < 0) {
        player.y = p.y + p.h;
        player.vy = 0;
      }
    }
  }

  // Mud slowdown
  for (const p of platforms) {
    if (p.type === 'mud' && rectOverlap(player.x, player.y + PH - 6, PW, 6, p.x, p.y, p.w, p.h)) {
      player.vx *= 0.6;
    }
  }

  // Fall off screen
  if (player.y > H + 150) {
    takeDamage();
    player.x = player.lastSafeX;
    player.y = player.lastSafeY - 30;
    player.vy = 0;
    player.vx = 0;
  }

  if (player.invincible > 0) player.invincible--;

  // Animation
  if (Math.abs(player.vx) > 0.5 && player.grounded) {
    player.animTimer += Math.abs(player.vx) * 0.12;
    if (player.animTimer >= 1) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }
  } else if (player.grounded) {
    player.animFrame = 0;
  }
  player.tailWag += 0.15;

  // Enemy update
  for (const e of enemies) {
    if (!e.alive) continue;
    e.x += e.vx;
    if (e.type === 'squirrel' && Math.random() < 0.015) e.vx = -e.vx;
    if (Math.abs(e.x - e.originX) > e.range) e.vx = -e.vx;
    e.animFrame = (e.animFrame + 0.08) % 2;

    if (player.invincible <= 0 && e.alive) {
      if (rectOverlap(player.x + 8, player.y + 8, PW - 16, PH - 8, e.x, e.y, e.w, e.h)) {
        if (player.vy > 0 && player.y + PH < e.y + e.h * 0.6) {
          e.alive = false;
          player.vy = JUMP_FORCE * 0.55;
          addParticle(e.x + e.w/2, e.y + e.h/2, '#ffaa44', 10, 5);
        } else {
          takeDamage();
        }
      }
    }
  }

  // Pickup collection
  for (const pk of pickups) {
    if (pk.collected) continue;
    const pkW = 32, pkH = 32;
    const bobY = pk.y + Math.sin(frameCount * 0.04 + pk.bobOffset) * 8;
    if (rectOverlap(player.x, player.y, PW, PH, pk.x - pkW/2, bobY - pkH/2, pkW, pkH)) {
      pk.collected = true;
      if (pk.type === 'drumstick') {
        player.hp = Math.min(player.maxHp, player.hp + 1);
      } else {
        player.hp = player.maxHp;
      }
      addParticle(pk.x, bobY, '#ffd700', 12, 6);
    }
  }

  // Level complete
  if (player.x + PW >= levelEnd) {
    state = 'victory';
    if (currentLevel >= saveData.unlocked && currentLevel < 10) {
      saveData.unlocked = currentLevel + 1;
      save();
    }
  }

  // Camera - smooth follow
  const targetCam = player.x - W * 0.35;
  camX += (targetCam - camX) * 0.08;
  if (camX < 0) camX = 0;
  if (camX > levelWidth - W) camX = levelWidth - W;

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--;
  }
  particles = particles.filter(p => p.life > 0);
}

function takeDamage() {
  if (player.invincible > 0) return;
  player.hp--;
  player.invincible = 90;
  addParticle(player.x + PW/2, player.y + PH/2, '#ff4444', 10, 5);
  if (player.hp <= 0) state = 'dead';
}

function rectOverlap(x1,y1,w1,h1, x2,y2,w2,h2) {
  return x1 < x2+w2 && x1+w1 > x2 && y1 < y2+h2 && y1+h1 > y2;
}

// ===== DRAWING =====
const SKY_TOP = '#87CEEB';
const SKY_BOT = '#B8D8BA';
const BARK_BROWN = '#5C3A1E';
const LEAF_GREEN = '#2D5A27';
const LEAF_LIGHT = '#4A8C3F';
const DIRT_BROWN = '#6B4226';
const GRASS_GREEN = '#3A7D2C';
const MOSS_GRAY = '#7A8B6F';

function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#6BB5D9');
  grad.addColorStop(0.4, SKY_TOP);
  grad.addColorStop(0.7, SKY_BOT);
  grad.addColorStop(1, '#8BAF7B');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Sun glow
  ctx.fillStyle = 'rgba(255,255,200,0.12)';
  ctx.beginPath();
  ctx.arc(W * 0.75, 80, 60, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,220,0.06)';
  ctx.beginPath();
  ctx.arc(W * 0.75, 80, 120, 0, Math.PI * 2);
  ctx.fill();

  // Dappled light spots
  ctx.fillStyle = 'rgba(255,255,200,0.06)';
  for (let i = 0; i < 20; i++) {
    const lx = ((i * 173 + 50) % (W + 300)) - camX * 0.02;
    const ly = 40 + (i * 73) % (H * 0.4);
    const lr = 25 + (i * 11) % 40;
    ctx.beginPath();
    ctx.arc(((lx % (W+100)) + W+100) % (W+100) - 50, ly, lr, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawFarTrees() {
  // Very far layer - misty, barely moves
  ctx.fillStyle = 'rgba(80,130,70,0.35)';
  for (let i = 0; i < 25; i++) {
    const tx = ((i * 200) - camX * 0.03) % (W + 500) - 100;
    const th = 250 + (i * 41 % 120);
    const tw = 60 + (i * 19 % 40);
    ctx.beginPath();
    ctx.moveTo(tx, GROUND_Y + 20);
    ctx.lineTo(tx + tw/2, GROUND_Y - th);
    ctx.lineTo(tx + tw, GROUND_Y + 20);
    ctx.fill();
  }

  // Misty overlay on far layer
  const mist = ctx.createLinearGradient(0, GROUND_Y - 200, 0, GROUND_Y + 20);
  mist.addColorStop(0, 'rgba(180,210,180,0)');
  mist.addColorStop(1, 'rgba(180,210,180,0.2)');
  ctx.fillStyle = mist;
  ctx.fillRect(0, GROUND_Y - 200, W, 220);
}

function drawMidTrees() {
  // Mid-far layer
  ctx.fillStyle = '#3D6B35';
  for (let i = 0; i < 18; i++) {
    const tx = ((i * 240 + 80) - camX * 0.1) % (W + 600) - 150;
    const th = 220 + (i * 37 % 100);
    const tw = 55 + (i * 23 % 35);
    // Trunk
    ctx.fillStyle = '#4A3020';
    ctx.fillRect(tx + tw/2 - 5, GROUND_Y - th + 60, 10, th - 50);
    // Foliage layers
    ctx.fillStyle = '#3D6B35';
    ctx.beginPath();
    ctx.moveTo(tx - 5, GROUND_Y - th + 110);
    ctx.lineTo(tx + tw/2, GROUND_Y - th + 20);
    ctx.lineTo(tx + tw + 5, GROUND_Y - th + 110);
    ctx.fill();
    ctx.fillStyle = '#4A8C3F';
    ctx.beginPath();
    ctx.moveTo(tx + 5, GROUND_Y - th + 70);
    ctx.lineTo(tx + tw/2, GROUND_Y - th);
    ctx.lineTo(tx + tw - 5, GROUND_Y - th + 70);
    ctx.fill();
  }
}

function drawNearTrees() {
  // Near background layer - moves noticeably
  for (let i = 0; i < 12; i++) {
    const tx = ((i * 300 + 150) - camX * 0.3) % (W + 700) - 200;
    const th = 280 + (i * 47 % 130);
    const tw = 70 + (i * 29 % 50);
    // Trunk with detail
    ctx.fillStyle = BARK_BROWN;
    ctx.fillRect(tx + tw/2 - 10, GROUND_Y - th + 80, 20, th - 60);
    ctx.fillStyle = '#4A2810';
    ctx.fillRect(tx + tw/2 - 10, GROUND_Y - th + 80, 4, th - 60);
    // Foliage - multiple layers
    ctx.fillStyle = '#2D5A27';
    ctx.beginPath();
    ctx.arc(tx + tw/2, GROUND_Y - th + 60, tw * 0.55, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = LEAF_LIGHT;
    ctx.beginPath();
    ctx.arc(tx + tw/2 - 10, GROUND_Y - th + 45, tw * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#358A2D';
    ctx.beginPath();
    ctx.arc(tx + tw/2 + 12, GROUND_Y - th + 55, tw * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawCanopy() {
  // Top canopy overlay - moves very slowly
  ctx.fillStyle = 'rgba(25,60,18,0.3)';
  for (let i = 0; i < 30; i++) {
    const cx2 = (i * 180 - camX * 0.04) % (W + 400) - 120;
    const cr = 50 + (i * 17 % 40);
    ctx.beginPath();
    ctx.arc(cx2, -10 + (i % 4) * 18, cr, 0, Math.PI * 2);
    ctx.fill();
  }
  // Hanging leaves
  ctx.fillStyle = 'rgba(35,80,25,0.2)';
  for (let i = 0; i < 25; i++) {
    const lx = (i * 150 - camX * 0.05) % (W + 400) - 100;
    const ly = 25 + (i * 31 % 50);
    const lh = 18 + (i * 13 % 25);
    ctx.beginPath();
    ctx.ellipse(lx, ly, 10, lh, 0.2 * (i % 3 - 1), 0, Math.PI * 2);
    ctx.fill();
  }
  // Light rays through canopy
  ctx.fillStyle = 'rgba(255,255,200,0.03)';
  for (let i = 0; i < 8; i++) {
    const rx = (i * 250 + 100 - camX * 0.03) % (W + 300) - 50;
    ctx.beginPath();
    ctx.moveTo(rx, 0);
    ctx.lineTo(rx - 30, H * 0.6);
    ctx.lineTo(rx + 30, H * 0.6);
    ctx.closePath();
    ctx.fill();
  }
}

function drawPlatform(p) {
  const x = Math.floor(p.x - camX);
  const y = Math.floor(p.y);

  if (p.type === 'ground') {
    ctx.fillStyle = DIRT_BROWN;
    ctx.fillRect(x, y, p.w, p.h);
    // Darker dirt bottom
    ctx.fillStyle = '#5A3518';
    ctx.fillRect(x, y + 20, p.w, p.h - 20);
    // Grass top
    ctx.fillStyle = GRASS_GREEN;
    ctx.fillRect(x, y, p.w, 8);
    // Grass tufts
    ctx.fillStyle = '#4A9C38';
    for (let gx = 0; gx < p.w; gx += 10 + (gx * 7 % 6)) {
      ctx.fillRect(x + gx, y - 5, 4, 8);
      ctx.fillRect(x + gx + 4, y - 2, 3, 5);
    }
    // Dirt texture
    ctx.fillStyle = 'rgba(90,50,20,0.3)';
    for (let dx = 0; dx < p.w; dx += 18 + (dx * 3 % 12)) {
      ctx.fillRect(x + dx, y + 14 + (dx % 7) * 4, 5, 3);
    }
    // Small rocks in dirt
    ctx.fillStyle = 'rgba(120,100,80,0.25)';
    for (let dx = 0; dx < p.w; dx += 40 + (dx * 7 % 25)) {
      ctx.fillRect(x + dx, y + 25 + (dx % 5) * 6, 6, 4);
    }
  } else if (p.type === 'log') {
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(x, y, p.w, p.h);
    ctx.fillStyle = '#5A3518';
    ctx.fillRect(x, y + p.h - 5, p.w, 5);
    ctx.fillStyle = '#7B5236';
    ctx.fillRect(x, y, 6, p.h);
    ctx.fillRect(x + p.w - 6, y, 6, p.h);
    // Bark texture
    ctx.fillStyle = 'rgba(50,25,10,0.25)';
    for (let lx = 14; lx < p.w - 14; lx += 14) {
      ctx.fillRect(x + lx, y + 3, 1, p.h - 6);
    }
    // Moss
    ctx.fillStyle = MOSS_GRAY;
    ctx.fillRect(x + 12, y, 20, 4);
    ctx.fillRect(x + p.w - 40, y, 18, 4);
  } else if (p.type === 'rock') {
    ctx.fillStyle = '#808080';
    ctx.fillRect(x + 3, y + 5, p.w - 6, p.h - 5);
    ctx.fillStyle = '#909090';
    ctx.fillRect(x, y, p.w, p.h - 5);
    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(x + 4, y + 2, p.w - 8, 4);
    // Moss
    ctx.fillStyle = MOSS_GRAY;
    ctx.fillRect(x, y, p.w, 6);
    ctx.fillStyle = '#8AAA7A';
    for (let mx = 0; mx < p.w; mx += 8) {
      ctx.fillRect(x + mx, y - 2, 4, 4);
    }
  } else if (p.type === 'fallen_log') {
    ctx.fillStyle = '#5A3518';
    ctx.fillRect(x, y, p.w, p.h);
    ctx.fillStyle = '#6B4226';
    ctx.fillRect(x + 3, y + 3, p.w - 6, p.h - 8);
    ctx.fillStyle = '#7B5236';
    ctx.beginPath();
    ctx.arc(x + 3, y + p.h/2, p.h/2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + p.w - 3, y + p.h/2, p.h/2, 0, Math.PI * 2);
    ctx.fill();
    // Ring detail on ends
    ctx.strokeStyle = 'rgba(90,50,20,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x + p.w - 3, y + p.h/2, p.h/3, 0, Math.PI * 2);
    ctx.stroke();
  } else if (p.type === 'mossy_rock') {
    ctx.fillStyle = '#707070';
    ctx.beginPath();
    ctx.moveTo(x + 5, y + p.h);
    ctx.lineTo(x, y + p.h * 0.5);
    ctx.lineTo(x + p.w * 0.3, y);
    ctx.lineTo(x + p.w * 0.7, y + 2);
    ctx.lineTo(x + p.w, y + p.h * 0.4);
    ctx.lineTo(x + p.w - 3, y + p.h);
    ctx.fill();
    ctx.fillStyle = MOSS_GRAY;
    ctx.fillRect(x + 6, y, p.w - 12, 8);
    ctx.fillStyle = '#8AAA7A';
    ctx.fillRect(x + 10, y - 2, 8, 4);
  } else if (p.type === 'mud') {
    ctx.fillStyle = '#5A4020';
    ctx.beginPath();
    ctx.ellipse(x + p.w/2, y + p.h/2, p.w/2, p.h/2 + 3, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(80,60,30,0.5)';
    ctx.beginPath();
    ctx.ellipse(x + p.w/2 - 8, y + p.h/2 - 1, p.w/3, p.h/3, 0, 0, Math.PI * 2);
    ctx.fill();
    // Mud shine
    ctx.fillStyle = 'rgba(100,80,50,0.3)';
    ctx.beginPath();
    ctx.ellipse(x + p.w/2 + 10, y + p.h/2 - 2, p.w/5, p.h/4, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawDecoration(d) {
  const x = Math.floor(d.x - camX);
  const y = Math.floor(d.y);

  if (d.type === 'creek') {
    ctx.fillStyle = '#3A7CA8';
    ctx.fillRect(x, y, d.w, 70);
    // Deeper water
    ctx.fillStyle = '#2A6090';
    ctx.fillRect(x + 8, y + 15, d.w - 16, 40);
    // Surface shine
    ctx.fillStyle = 'rgba(120,200,240,0.35)';
    ctx.fillRect(x + 8, y + 3, d.w - 16, 4);
    // Ripples
    ctx.strokeStyle = 'rgba(150,210,240,0.25)';
    ctx.lineWidth = 1;
    const ripOffset = (frameCount * 0.4) % 25;
    for (let rx = 0; rx < d.w; rx += 25) {
      ctx.beginPath();
      ctx.arc(x + rx + ripOffset, y + 20, 8, 0, Math.PI);
      ctx.stroke();
    }
  } else if (d.type === 'tree') {
    const s = d.size;
    ctx.fillStyle = '#4A3020';
    ctx.fillRect(x + 12 * s, y - 100 * s, 12 * s, 100 * s);
    ctx.fillStyle = LEAF_GREEN;
    ctx.beginPath();
    ctx.arc(x + 18 * s, y - 100 * s, 30 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = LEAF_LIGHT;
    ctx.beginPath();
    ctx.arc(x + 14 * s, y - 108 * s, 18 * s, 0, Math.PI * 2);
    ctx.fill();
  } else if (d.type === 'bush') {
    ctx.fillStyle = '#3A6B2A';
    ctx.beginPath();
    ctx.arc(x, y - 8, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#4A8B3A';
    ctx.beginPath();
    ctx.arc(x - 7, y - 10, 10, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + 8, y - 9, 9, 0, Math.PI * 2);
    ctx.fill();
  } else if (d.type === 'flower') {
    ctx.fillStyle = '#2A5A1A';
    ctx.fillRect(x, y - 14, 2, 14);
    ctx.fillStyle = d.color;
    ctx.beginPath();
    ctx.arc(x + 1, y - 16, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(x + 1, y - 16, 2, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ===== DRAW REGGIE (3x scale, enhanced) =====
function drawReggie() {
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) return;

  const x = Math.floor(player.x - camX);
  const y = Math.floor(player.y);
  const f = player.facing;
  const s = SCALE;

  ctx.save();
  if (f < 0) {
    ctx.translate(x + PW, y);
    ctx.scale(-1, 1);
  } else {
    ctx.translate(x, y);
  }

  // Shadow under dog
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(PW/2, PH + 3, PW * 0.4, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tail (behind body)
  const tailWag = Math.sin(player.tailWag) * 3 * s;
  // Tail base brown
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(0, 5*s + tailWag, 4*s, 3*s);
  // Tail tip white
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(-1*s, 5*s + tailWag, 3*s, 4*s);
  ctx.fillStyle = '#E8E0D0';
  ctx.fillRect(-1*s, 8*s + tailWag, 2*s, 1*s);

  // Back legs (behind body)
  ctx.fillStyle = '#6B3F1F';
  if (!player.grounded) {
    ctx.fillRect(4*s, 18*s, 4*s, 5*s);
    ctx.fillRect(0*s, 16*s, 4*s, 4*s);
    ctx.fillStyle = '#E8E0D0';
    ctx.fillRect(4*s, 22*s, 4*s, 2*s);
    ctx.fillRect(0*s, 19*s, 4*s, 2*s);
  } else {
    const frame = player.animFrame;
    const lo = [[0,4,0,4],[-2,6,2,2],[0,4,0,4],[2,2,-2,6]][frame] || [0,4,0,4];
    ctx.fillRect(5*s, (18+lo[2])*s, 4*s, (4+lo[3])*s);
    ctx.fillRect(9*s, (18+lo[0])*s, 4*s, (4+lo[1])*s);
    ctx.fillStyle = '#E8E0D0';
    ctx.fillRect(5*s, (18+lo[2]+2+lo[3])*s, 4*s, 2*s);
    ctx.fillRect(9*s, (18+lo[0]+2+lo[1])*s, 4*s, 2*s);
  }

  // Body - brown back with gradient feel
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(4*s, 6*s, 24*s, 5*s);
  // Mid-body warm tone
  ctx.fillStyle = '#9A6D4A';
  ctx.fillRect(6*s, 7*s, 20*s, 3*s);
  // Body darker underside of brown
  ctx.fillStyle = '#7A4E2C';
  ctx.fillRect(4*s, 11*s, 24*s, 2*s);

  // White belly/chest
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(4*s, 13*s, 24*s, 6*s);
  // Belly highlight
  ctx.fillStyle = '#FFFDF8';
  ctx.fillRect(8*s, 14*s, 16*s, 3*s);
  // Belly shadow
  ctx.fillStyle = '#E8E0D0';
  ctx.fillRect(6*s, 18*s, 20*s, 1*s);

  // Front legs (in front of body)
  ctx.fillStyle = '#7A4E2C';
  if (!player.grounded) {
    ctx.fillRect(21*s, 18*s, 4*s, 5*s);
    ctx.fillRect(26*s, 16*s, 4*s, 4*s);
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(21*s, 22*s, 4*s, 2*s);
    ctx.fillRect(26*s, 19*s, 4*s, 2*s);
  } else {
    const frame = player.animFrame;
    const lo = [[0,4,0,4],[-2,6,2,2],[0,4,0,4],[2,2,-2,6]][frame] || [0,4,0,4];
    ctx.fillRect(20*s, (18+lo[0])*s, 4*s, (4+lo[1])*s);
    ctx.fillRect(24*s, (18+lo[2])*s, 4*s, (4+lo[3])*s);
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(20*s, (18+lo[0]+2+lo[1])*s, 4*s, 2*s);
    ctx.fillRect(24*s, (18+lo[2]+2+lo[3])*s, 4*s, 2*s);
  }

  // Neck
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(24*s, 4*s, 4*s, 8*s);

  // Head
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(22*s, 0*s, 11*s, 13*s);
  // Head top highlight
  ctx.fillStyle = '#9A6D4A';
  ctx.fillRect(23*s, 1*s, 9*s, 3*s);
  // Head bottom shadow
  ctx.fillStyle = '#7A4E2C';
  ctx.fillRect(22*s, 11*s, 11*s, 2*s);

  // Floppy ear (hangs down from back of head)
  ctx.fillStyle = '#6B3F1F';
  ctx.fillRect(21*s, 3*s, 4*s, 13*s);
  // Ear highlight
  ctx.fillStyle = '#7A4E2C';
  ctx.fillRect(22*s, 4*s, 2*s, 10*s);
  // Ear tip rounded
  ctx.fillStyle = '#5A2E0E';
  ctx.fillRect(21*s, 14*s, 4*s, 2*s);
  ctx.fillRect(22*s, 15*s, 2*s, 1*s);

  // White face blaze
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(25*s, 1*s, 5*s, 12*s);
  // Blaze highlight
  ctx.fillStyle = '#FFFDF8';
  ctx.fillRect(26*s, 2*s, 3*s, 8*s);

  // Muzzle
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(29*s, 6*s, 5*s, 7*s);
  // Muzzle puff
  ctx.fillStyle = '#FFFDF8';
  ctx.fillRect(29*s, 7*s, 4*s, 4*s);
  // Muzzle shadow
  ctx.fillStyle = '#E0D8CC';
  ctx.fillRect(29*s, 11*s, 5*s, 2*s);

  // Nose - larger, rounded look
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(31*s, 6*s, 3*s, 3*s);
  ctx.fillRect(30*s, 7*s, 1*s, 1*s);
  // Nose shine
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillRect(32*s, 6*s, 1*s, 1*s);

  // Mouth / smile
  ctx.fillStyle = '#6B3F1F';
  ctx.fillRect(31*s, 9*s, 2*s, 1*s);
  ctx.fillRect(30*s, 10*s, 1*s, 1*s);
  // Tongue peek when idle
  if (player.grounded && Math.abs(player.vx) < 0.5) {
    ctx.fillStyle = '#E06060';
    ctx.fillRect(31*s, 10*s, 2*s, 2*s);
    ctx.fillStyle = '#C04848';
    ctx.fillRect(31*s, 11*s, 2*s, 1*s);
  }

  // Eye white
  ctx.fillStyle = '#fff';
  ctx.fillRect(27*s, 3*s, 4*s, 4*s);
  // Iris
  ctx.fillStyle = '#4A2810';
  ctx.fillRect(28*s, 3*s, 3*s, 4*s);
  // Pupil
  ctx.fillStyle = '#000';
  ctx.fillRect(29*s, 4*s, 2*s, 2*s);
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.fillRect(30*s, 3*s, 1*s, 1*s);
  // Eye lower lid
  ctx.fillStyle = 'rgba(100,60,30,0.2)';
  ctx.fillRect(27*s, 6*s, 4*s, 1*s);

  // Eyebrow hint
  ctx.fillStyle = '#7A4E2C';
  ctx.fillRect(27*s, 2*s, 5*s, 1*s);

  // Collar (fun detail)
  ctx.fillStyle = '#CC3333';
  ctx.fillRect(24*s, 12*s, 6*s, 2*s);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(27*s, 12*s, 2*s, 2*s);

  ctx.restore();
}

// ===== DRAW ENEMIES (3x scale, more detail) =====
function drawEnemy(e) {
  if (!e.alive) return;
  const x = Math.floor(e.x - camX);
  const y = Math.floor(e.y);
  const f = Math.floor(e.animFrame);
  const facing = e.vx > 0 ? 1 : -1;

  ctx.save();
  if (facing < 0) {
    ctx.translate(x + e.w, y);
    ctx.scale(-1, 1);
  } else {
    ctx.translate(x, y);
  }

  const w = e.w, h = e.h;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(w/2, h + 2, w * 0.35, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  if (e.type === 'fox') {
    // Bushy tail (behind body)
    ctx.fillStyle = '#D4652A';
    ctx.fillRect(-w*0.1, h*0.1, w*0.22, h*0.25);
    ctx.fillStyle = '#E07838';
    ctx.fillRect(-w*0.06, h*0.12, w*0.14, h*0.18);
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(-w*0.12, h*0.22, w*0.12, h*0.14);

    // Body
    ctx.fillStyle = '#D4652A';
    ctx.fillRect(w*0.1, h*0.18, w*0.72, h*0.42);
    // Back highlight
    ctx.fillStyle = '#E07838';
    ctx.fillRect(w*0.15, h*0.2, w*0.6, h*0.12);
    // Darker underside
    ctx.fillStyle = '#B84A1A';
    ctx.fillRect(w*0.1, h*0.48, w*0.72, h*0.12);
    // White belly
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(w*0.15, h*0.5, w*0.55, h*0.1);

    // Legs
    ctx.fillStyle = '#2a2a2a';
    const legOff = f === 0 ? [0.35, 0.3] : [0.3, 0.35];
    ctx.fillRect(w*0.18, h*0.6, w*0.08, h*legOff[0]);
    ctx.fillRect(w*0.32, h*0.6, w*0.07, h*legOff[1]);
    ctx.fillRect(w*0.58, h*0.6, w*0.07, h*legOff[1]);
    ctx.fillRect(w*0.7, h*0.6, w*0.08, h*legOff[0]);

    // Head
    ctx.fillStyle = '#D4652A';
    ctx.fillRect(w*0.62, h*0.02, w*0.32, h*0.4);
    // Head highlight
    ctx.fillStyle = '#E07838';
    ctx.fillRect(w*0.65, h*0.04, w*0.25, h*0.12);
    // Pointed snout
    ctx.fillStyle = '#E07838';
    ctx.fillRect(w*0.85, h*0.12, w*0.15, h*0.22);
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(w*0.88, h*0.18, w*0.12, h*0.14);
    // White cheek
    ctx.fillStyle = '#F5F0E8';
    ctx.fillRect(w*0.68, h*0.22, w*0.18, h*0.14);
    // Nose
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(w*0.95, h*0.15, w*0.05, h*0.08);
    // Eye
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(w*0.76, h*0.08, w*0.1, h*0.12);
    ctx.fillStyle = '#000';
    ctx.fillRect(w*0.78, h*0.1, w*0.06, h*0.08);
    ctx.fillStyle = '#fff';
    ctx.fillRect(w*0.81, h*0.08, w*0.02, h*0.04);
    // Ears - tall pointed
    ctx.fillStyle = '#B84A1A';
    ctx.fillRect(w*0.64, -h*0.14, w*0.1, h*0.22);
    ctx.fillRect(w*0.78, -h*0.1, w*0.09, h*0.18);
    ctx.fillStyle = '#D4652A';
    ctx.fillRect(w*0.66, -h*0.08, w*0.06, h*0.12);
    ctx.fillRect(w*0.8, -h*0.04, w*0.05, h*0.1);
    // Inner ear
    ctx.fillStyle = '#222';
    ctx.fillRect(w*0.67, -h*0.04, w*0.04, h*0.08);
    ctx.fillRect(w*0.81, -h*0.01, w*0.03, h*0.06);
  } else if (e.type === 'raccoon') {
    // Striped tail (behind)
    ctx.fillStyle = '#808080';
    ctx.fillRect(-w*0.12, h*0.08, w*0.24, h*0.22);
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(-w*0.1, h*0.08, w*0.06, h*0.22);
    ctx.fillRect(-w*0.0, h*0.08, w*0.06, h*0.22);
    ctx.fillStyle = '#909090';
    ctx.fillRect(-w*0.04, h*0.08, w*0.06, h*0.22);
    // Tail tip
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(-w*0.14, h*0.1, w*0.06, h*0.16);

    // Body
    ctx.fillStyle = '#808080';
    ctx.fillRect(w*0.08, h*0.18, w*0.76, h*0.42);
    // Back darker
    ctx.fillStyle = '#606060';
    ctx.fillRect(w*0.15, h*0.18, w*0.6, h*0.1);
    // Belly lighter
    ctx.fillStyle = '#A0A0A0';
    ctx.fillRect(w*0.12, h*0.48, w*0.65, h*0.12);

    // Legs
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(w*0.15, h*0.6, w*0.08, h*0.35);
    ctx.fillRect(w*0.3, h*0.6, w*0.07, h*0.32);
    ctx.fillRect(w*0.55, h*0.6, w*0.07, h*0.33);
    ctx.fillRect(w*0.7, h*0.6, w*0.08, h*0.35);
    // Paws
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(w*0.14, h*0.9, w*0.1, h*0.06);
    ctx.fillRect(w*0.69, h*0.9, w*0.1, h*0.06);

    // Head - rounder
    ctx.fillStyle = '#707070';
    ctx.fillRect(w*0.6, h*0.0, w*0.34, h*0.38);
    // Head highlight
    ctx.fillStyle = '#808080';
    ctx.fillRect(w*0.64, h*0.02, w*0.26, h*0.1);
    // Face mask - iconic raccoon feature
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(w*0.62, h*0.08, w*0.32, h*0.14);
    // Mask white border
    ctx.fillStyle = '#C0C0C0';
    ctx.fillRect(w*0.62, h*0.06, w*0.32, h*0.03);
    ctx.fillRect(w*0.62, h*0.21, w*0.32, h*0.03);
    // Eyes - bright in dark mask
    ctx.fillStyle = '#fff';
    ctx.fillRect(w*0.66, h*0.09, w*0.1, h*0.12);
    ctx.fillRect(w*0.8, h*0.09, w*0.1, h*0.12);
    ctx.fillStyle = '#000';
    ctx.fillRect(w*0.69, h*0.11, w*0.06, h*0.08);
    ctx.fillRect(w*0.83, h*0.11, w*0.06, h*0.08);
    ctx.fillStyle = '#fff';
    ctx.fillRect(w*0.71, h*0.1, w*0.02, h*0.03);
    ctx.fillRect(w*0.85, h*0.1, w*0.02, h*0.03);
    // Snout
    ctx.fillStyle = '#909090';
    ctx.fillRect(w*0.85, h*0.18, w*0.12, h*0.12);
    ctx.fillStyle = '#222';
    ctx.fillRect(w*0.92, h*0.2, w*0.05, h*0.05);
    // Whiskers
    ctx.fillStyle = '#C0C0C0';
    ctx.fillRect(w*0.75, h*0.24, w*0.18, h*0.04);
    // Ears - rounded
    ctx.fillStyle = '#606060';
    ctx.fillRect(w*0.64, -h*0.08, w*0.1, h*0.14);
    ctx.fillRect(w*0.82, -h*0.06, w*0.1, h*0.12);
    ctx.fillStyle = '#808080';
    ctx.fillRect(w*0.66, -h*0.04, w*0.06, h*0.08);
    ctx.fillRect(w*0.84, -h*0.02, w*0.06, h*0.06);
  } else if (e.type === 'squirrel') {
    // Big fluffy tail (behind) - signature feature
    ctx.fillStyle = '#9B7250';
    ctx.fillRect(-w*0.15, -h*0.1, w*0.25, h*0.4);
    ctx.fillStyle = '#B08860';
    ctx.fillRect(-w*0.1, -h*0.05, w*0.15, h*0.28);
    ctx.fillStyle = '#C4A070';
    ctx.fillRect(-w*0.08, h*0.0, w*0.1, h*0.15);
    // Tail curve top
    ctx.fillStyle = '#8B6240';
    ctx.fillRect(-w*0.18, -h*0.2, w*0.2, h*0.15);

    // Body
    ctx.fillStyle = '#8B6240';
    ctx.fillRect(w*0.1, h*0.2, w*0.65, h*0.38);
    // Back highlight
    ctx.fillStyle = '#9B7250';
    ctx.fillRect(w*0.15, h*0.22, w*0.55, h*0.1);
    // Belly
    ctx.fillStyle = '#C4A070';
    ctx.fillRect(w*0.18, h*0.42, w*0.45, h*0.14);

    // Legs
    ctx.fillStyle = '#6B4220';
    ctx.fillRect(w*0.18, h*0.58, w*0.08, h*0.35);
    ctx.fillRect(w*0.58, h*0.58, w*0.08, h*0.35);
    // Back legs thicker
    ctx.fillRect(w*0.3, h*0.55, w*0.07, h*0.3);
    // Tiny paws
    ctx.fillStyle = '#8B6240';
    ctx.fillRect(w*0.5, h*0.35, w*0.12, h*0.08);

    // Head
    ctx.fillStyle = '#8B6240';
    ctx.fillRect(w*0.6, h*0.02, w*0.32, h*0.32);
    // Head highlight
    ctx.fillStyle = '#9B7250';
    ctx.fillRect(w*0.64, h*0.04, w*0.24, h*0.08);
    // White cheek
    ctx.fillStyle = '#C4A070';
    ctx.fillRect(w*0.65, h*0.18, w*0.2, h*0.1);
    // Eye - big and cute
    ctx.fillStyle = '#000';
    ctx.fillRect(w*0.76, h*0.06, w*0.12, h*0.14);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(w*0.78, h*0.08, w*0.08, h*0.1);
    ctx.fillStyle = '#fff';
    ctx.fillRect(w*0.82, h*0.06, w*0.04, h*0.05);
    ctx.fillRect(w*0.78, h*0.14, w*0.02, h*0.03);
    // Nose
    ctx.fillStyle = '#4a2a10';
    ctx.fillRect(w*0.88, h*0.15, w*0.06, h*0.06);
    // Ears - rounded tufts
    ctx.fillStyle = '#7A5230';
    ctx.fillRect(w*0.64, -h*0.1, w*0.1, h*0.16);
    ctx.fillRect(w*0.8, -h*0.12, w*0.09, h*0.18);
    // Ear tufts
    ctx.fillStyle = '#C4A070';
    ctx.fillRect(w*0.66, -h*0.12, w*0.04, h*0.06);
    ctx.fillRect(w*0.82, -h*0.14, w*0.04, h*0.06);
  }

  ctx.restore();
}

function drawPickup(pk) {
  if (pk.collected) return;
  const bobY = pk.y + Math.sin(frameCount * 0.04 + pk.bobOffset) * 8;
  const x = Math.floor(pk.x - camX);
  const y = Math.floor(bobY);

  // Sparkle
  ctx.fillStyle = 'rgba(255,215,0,0.6)';
  const sp = frameCount * 0.1;
  ctx.fillRect(x + Math.cos(sp) * 16, y + Math.sin(sp) * 12, 3, 3);
  ctx.fillRect(x + Math.cos(sp + 2) * 14, y + Math.sin(sp + 2) * 10, 2, 2);
  ctx.fillRect(x + Math.cos(sp + 4) * 18, y + Math.sin(sp + 4) * 14, 3, 3);

  if (pk.type === 'drumstick') {
    // Bone end
    ctx.fillStyle = '#F5F0E0';
    ctx.fillRect(x - 10, y - 3, 12, 8);
    ctx.beginPath();
    ctx.arc(x - 10, y + 1, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x - 7, y - 3, 4, 0, Math.PI * 2);
    ctx.fill();
    // Meat
    ctx.fillStyle = '#C07030';
    ctx.fillRect(x, y - 6, 18, 14);
    ctx.beginPath();
    ctx.arc(x + 18, y + 1, 8, 0, Math.PI * 2);
    ctx.fill();
    // Shine
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(x + 6, y - 3, 6, 4);
    // Crispy skin
    ctx.fillStyle = '#A05820';
    ctx.fillRect(x + 2, y - 6, 16, 3);
  } else {
    // Jamon iberico
    ctx.fillStyle = '#654321';
    ctx.fillRect(x - 2, y + 10, 3, 14);
    ctx.fillRect(x + 18, y + 10, 3, 14);
    ctx.fillRect(x - 4, y + 22, 26, 4);
    // Ham body
    ctx.fillStyle = '#8B2020';
    ctx.fillRect(x - 4, y - 8, 26, 18);
    ctx.fillStyle = '#A03030';
    ctx.fillRect(x - 2, y - 6, 22, 14);
    // Fat/marbling
    ctx.fillStyle = '#F0D0B0';
    ctx.fillRect(x + 4, y - 3, 4, 3);
    ctx.fillRect(x + 12, y, 3, 4);
    ctx.fillRect(x + 2, y + 3, 3, 2);
    // Hoof
    ctx.fillStyle = '#3A2010';
    ctx.fillRect(x + 20, y - 5, 6, 12);
    // Gold highlight (rare item glow)
    ctx.fillStyle = 'rgba(255,215,0,0.15)';
    ctx.beginPath();
    ctx.arc(x + 10, y + 4, 20, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawHUD() {
  // Hearts
  for (let i = 0; i < player.maxHp; i++) {
    const hx = 20 + i * 38;
    ctx.fillStyle = i < player.hp ? '#FF4444' : '#444';
    drawHeart(hx, 22, 14);
    if (i < player.hp) {
      ctx.fillStyle = 'rgba(255,100,100,0.3)';
      drawHeart(hx, 22, 14);
    }
  }

  // Level indicator
  ctx.fillStyle = '#fff';
  ctx.font = '12px "Press Start 2P"';
  ctx.textAlign = 'right';
  ctx.fillText('LV ' + currentLevel, W - 20, 30);

  // Progress bar
  const progress = Math.min(1, player.x / levelEnd);
  const barW = 160;
  const barX = W - 20 - barW;
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(barX, 40, barW, 10);
  ctx.fillStyle = '#6abf6a';
  ctx.fillRect(barX, 40, barW * progress, 10);
  ctx.strokeStyle = 'rgba(106,191,106,0.4)';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, 40, barW, 10);
  // Reggie icon on bar
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(barX + barW * progress - 5, 36, 10, 8);
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(barX + barW * progress - 3, 43, 6, 4);

  // Controls hint (faded)
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.font = '8px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('ARROWS/WASD move \u2022 SPACE jump \u2022 Jump on enemies!', W/2, H - 12);
}

function drawHeart(x, y, size) {
  ctx.beginPath();
  ctx.moveTo(x, y + size * 0.3);
  ctx.bezierCurveTo(x, y, x + size/2, y, x + size/2, y + size * 0.3);
  ctx.bezierCurveTo(x + size/2, y, x + size, y, x + size, y + size * 0.3);
  ctx.bezierCurveTo(x + size, y + size * 0.6, x + size/2, y + size, x + size/2, y + size);
  ctx.bezierCurveTo(x + size/2, y + size, x, y + size * 0.6, x, y + size * 0.3);
  ctx.fill();
}

function drawParticlesAll() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life / 30);
    ctx.fillStyle = p.color;
    const px = p.x - camX;
    ctx.fillRect(Math.floor(px), Math.floor(p.y), Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
}

function drawLevelComplete() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#6abf6a';
  ctx.font = `${Math.min(32, W * 0.03)}px "Press Start 2P"`;
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL COMPLETE!', W/2, H/2 - 40);

  ctx.fillStyle = '#fff';
  ctx.font = `${Math.min(14, W * 0.012)}px "Press Start 2P"`;
  if (currentLevel < 10) {
    ctx.fillText('PRESS SPACE / TAP FOR NEXT LEVEL', W/2, H/2 + 20);
  } else {
    ctx.fillStyle = '#ffd700';
    ctx.fillText('YOU BEAT THE GAME!', W/2, H/2 + 10);
    ctx.fillStyle = '#aaa';
    ctx.font = `${Math.min(11, W * 0.01)}px "Press Start 2P"`;
    ctx.fillText('PRESS SPACE / TAP FOR LEVEL SELECT', W/2, H/2 + 45);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#ff6b6b';
  ctx.font = `${Math.min(32, W * 0.03)}px "Press Start 2P"`;
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W/2, H/2 - 20);

  ctx.fillStyle = '#aaa';
  ctx.font = `${Math.min(12, W * 0.011)}px "Press Start 2P"`;
  ctx.fillText('PRESS SPACE / TAP TO RETRY', W/2, H/2 + 25);
}

// ===== LEVEL SELECT =====
let levelSelectHover = -1;

function getLevelSelectLayout() {
  const btnW = Math.min(160, (W - 160) / 5);
  const btnH = Math.min(90, (H - 300) / 2);
  const gap = Math.min(24, btnW * 0.15);
  const startX = (W - (5 * btnW + 4 * gap)) / 2;
  const startY = H * 0.28;
  return { btnW, btnH, gap, startX, startY };
}

function drawLevelSelect() {
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1A3A1A');
  grad.addColorStop(1, '#0A1A0A');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Background trees
  ctx.fillStyle = '#143014';
  for (let i = 0; i < Math.ceil(W / 90); i++) {
    const tx = i * 90 + 20;
    ctx.beginPath();
    ctx.moveTo(tx, H);
    ctx.lineTo(tx + 30, H - 180 - (i % 3) * 50);
    ctx.lineTo(tx + 60, H);
    ctx.fill();
  }

  ctx.fillStyle = '#6abf6a';
  ctx.font = `${Math.min(24, W * 0.02)}px "Press Start 2P"`;
  ctx.textAlign = 'center';
  ctx.fillText('REGGIE IN THE FOREST', W/2, H * 0.1);

  ctx.font = `${Math.min(12, W * 0.01)}px "Press Start 2P"`;
  ctx.fillStyle = '#888';
  ctx.fillText('SELECT A LEVEL', W/2, H * 0.17);

  const { btnW, btnH, gap, startX, startY } = getLevelSelectLayout();

  for (let i = 0; i < 10; i++) {
    const col = i % 5;
    const row = Math.floor(i / 5);
    const bx = startX + col * (btnW + gap);
    const by = startY + row * (btnH + gap);
    const lvl = i + 1;
    const unlocked = lvl <= saveData.unlocked;

    ctx.fillStyle = unlocked
      ? (levelSelectHover === i ? 'rgba(106,191,106,0.25)' : 'rgba(106,191,106,0.1)')
      : 'rgba(80,80,80,0.15)';
    ctx.fillRect(bx, by, btnW, btnH);

    ctx.strokeStyle = unlocked ? 'rgba(106,191,106,0.5)' : 'rgba(80,80,80,0.3)';
    ctx.lineWidth = 2;
    ctx.strokeRect(bx, by, btnW, btnH);

    ctx.fillStyle = unlocked ? '#6abf6a' : '#555';
    ctx.font = `${Math.min(18, btnW * 0.12)}px "Press Start 2P"`;
    ctx.textAlign = 'center';
    ctx.fillText(String(lvl), bx + btnW/2, by + btnH * 0.45);

    if (!unlocked) {
      ctx.fillStyle = '#555';
      ctx.font = `${Math.min(10, btnW * 0.07)}px "Press Start 2P"`;
      ctx.fillText('LOCKED', bx + btnW/2, by + btnH * 0.75);
    } else {
      const names = ['Meadow', 'Brook', 'Thicket', 'Valley', 'Ridge',
                     'Hollow', 'Rapids', 'Canopy', 'Summit', 'Deep Woods'];
      ctx.fillStyle = '#4a8a4a';
      ctx.font = `${Math.min(8, btnW * 0.055)}px "Press Start 2P"`;
      ctx.fillText(names[i], bx + btnW/2, by + btnH * 0.75);
    }
  }

  // Mini Reggie
  const ry = H * 0.82;
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(W/2 - 24, ry, 48, 24);
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(W/2 - 24, ry + 14, 48, 12);
  ctx.fillStyle = '#8B5E3C';
  ctx.fillRect(W/2 + 16, ry - 10, 20, 22);
  ctx.fillStyle = '#222';
  ctx.fillRect(W/2 + 28, ry - 6, 5, 4);
  const tw = Math.sin(frameCount * 0.1) * 5;
  ctx.fillStyle = '#F5F0E8';
  ctx.fillRect(W/2 - 32 + tw, ry + 4, 10, 6);

  ctx.fillStyle = '#555';
  ctx.font = `${Math.min(10, W * 0.008)}px "Press Start 2P"`;
  ctx.textAlign = 'center';
  ctx.fillText('CLICK A LEVEL TO START', W/2, H * 0.95);
}

function handleLevelSelectClick(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const { btnW, btnH, gap, startX, startY } = getLevelSelectLayout();

  for (let i = 0; i < 10; i++) {
    const col = i % 5;
    const row = Math.floor(i / 5);
    const bx = startX + col * (btnW + gap);
    const by = startY + row * (btnH + gap);
    if (mx >= bx && mx <= bx + btnW && my >= by && my <= by + btnH) {
      if (i + 1 <= saveData.unlocked) loadLevel(i + 1);
      return;
    }
  }
}

canvas.addEventListener('mousemove', e => {
  if (state !== 'levelselect') { levelSelectHover = -1; return; }
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const mx = (e.clientX - rect.left) * scaleX;
  const my = (e.clientY - rect.top) * scaleY;

  const { btnW, btnH, gap, startX, startY } = getLevelSelectLayout();
  levelSelectHover = -1;

  for (let i = 0; i < 10; i++) {
    const col = i % 5;
    const row = Math.floor(i / 5);
    const bx = startX + col * (btnW + gap);
    const by = startY + row * (btnH + gap);
    if (mx >= bx && mx <= bx + btnW && my >= by && my <= by + btnH) {
      if (i + 1 <= saveData.unlocked) levelSelectHover = i;
      break;
    }
  }
});

// ===== MAIN LOOP =====
function gameLoop() {
  frameCount++;

  if (state === 'levelselect') {
    drawLevelSelect();
  } else {
    update();

    drawSky();
    drawFarTrees();
    drawMidTrees();
    drawNearTrees();

    // Decorations behind platforms
    for (const d of decorations) {
      if (d.x - camX > -300 && d.x - camX < W + 300) drawDecoration(d);
    }

    // Platforms
    for (const p of platforms) {
      if (p.x + p.w - camX > -50 && p.x - camX < W + 50) drawPlatform(p);
    }

    // Enemies
    for (const e of enemies) {
      if (e.x - camX > -150 && e.x - camX < W + 150) drawEnemy(e);
    }

    // Pickups
    for (const pk of pickups) {
      if (pk.x - camX > -50 && pk.x - camX < W + 50) drawPickup(pk);
    }

    drawReggie();
    drawCanopy();
    drawParticlesAll();
    drawHUD();

    if (state === 'victory') drawLevelComplete();
    if (state === 'dead') drawGameOver();
  }

  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
