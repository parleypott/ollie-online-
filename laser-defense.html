<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Laser Defense</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: #0a1628;
      overflow: hidden;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    canvas { display: block; }
    .back-link {
      position: fixed;
      top: 12px;
      left: 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: #4dacff;
      text-decoration: none;
      text-shadow: 0 0 8px rgba(77,172,255,0.4);
      z-index: 10;
      padding: 6px 10px;
      border: 1px solid rgba(77,172,255,0.3);
      border-radius: 4px;
      background: rgba(10,22,40,0.8);
      transition: border-color 0.2s;
    }
    .back-link:hover {
      border-color: rgba(77,172,255,0.8);
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">&larr; Back</a>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- Resize ---
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // --- Constants ---
    const FONT = "'Press Start 2P', monospace";
    const MAX_WAVE = 100;
    const MAX_HP = 3;
    const FIRE_COOLDOWN = 200;
    const BEAM_DURATION = 80;
    const MAX_ENEMIES_ALIVE = 80;
    const SPAWN_MARGIN = 60;

    // Enemy type definitions
    const ENEMY_TYPES = {
      basic:    { color: '#44ff66', radius: 14, hp: 1,  speed: 1.0, points: 10,  glow: '#44ff66', name: 'basic' },
      fast:     { color: '#ffdd44', radius: 10, hp: 1,  speed: 2.0, points: 15,  glow: '#ffdd44', name: 'fast' },
      armored:  { color: '#ff4444', radius: 18, hp: 2,  speed: 0.8, points: 25,  glow: '#ff4444', name: 'armored' },
      shielded: { color: '#cc44ff', radius: 16, hp: 3,  speed: 0.7, points: 35,  glow: '#cc44ff', name: 'shielded' },
      zigzag:   { color: '#44ffff', radius: 12, hp: 1,  speed: 1.5, points: 20,  glow: '#44ffff', name: 'zigzag' },
      boss:     { color: '#ff8800', radius: 36, hp: 10, speed: 0.4, points: 200, glow: '#ffaa44', name: 'boss' },
    };

    // --- Game State ---
    let state = 'title'; // title, playing, waveAnnounce, paused, gameover, victory
    let hp = MAX_HP;
    let score = 0;
    let highScore = parseInt(localStorage.getItem('ld_save')) || 0;
    let wave = 0;
    let enemiesRemaining = 0;
    let enemies = [];
    let particles = [];
    let beams = [];
    let stars = [];
    let aimAngle = 0;
    let lastFireTime = 0;
    let waveAnnounceDuration = 0;
    let wavePauseDuration = 0;
    let screenShake = 0;
    let damageFlash = 0;
    let starOffset = 0;
    let spawnQueue = 0;
    let spawnTimer = 0;
    let touchActive = false;
    let globalTick = 0;

    // Mouse/touch position
    let mouseX = 0;
    let mouseY = 0;

    // --- Stars background ---
    function initStars() {
      stars = [];
      for (let i = 0; i < 200; i++) {
        stars.push({
          x: Math.random(),
          y: Math.random(),
          size: Math.random() * 2 + 0.5,
          brightness: Math.random() * 0.7 + 0.3,
          speed: Math.random() * 0.02 + 0.005,
        });
      }
    }
    initStars();

    // --- Center position ---
    function cx() { return canvas.width / 2; }
    function cy() { return canvas.height / 2; }

    // --- Input ---
    canvas.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      aimAngle = Math.atan2(mouseY - cy(), mouseX - cx());
    });

    canvas.addEventListener('mousedown', e => {
      if (state === 'title') { startGame(); return; }
      if (state === 'gameover' || state === 'victory') { state = 'title'; return; }
      if (state === 'playing') fireLaser();
    });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      mouseX = t.clientX;
      mouseY = t.clientY;
      aimAngle = Math.atan2(mouseY - cy(), mouseX - cx());
      touchActive = true;
      if (state === 'title') { startGame(); return; }
      if (state === 'gameover' || state === 'victory') { state = 'title'; return; }
      if (state === 'playing') fireLaser();
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      mouseX = t.clientX;
      mouseY = t.clientY;
      aimAngle = Math.atan2(mouseY - cy(), mouseX - cx());
      if (state === 'playing' && touchActive) fireLaser();
    }, { passive: false });

    canvas.addEventListener('touchend', e => {
      e.preventDefault();
      touchActive = false;
    }, { passive: false });

    // --- Fire Laser ---
    function fireLaser() {
      const now = performance.now();
      if (now - lastFireTime < FIRE_COOLDOWN) return;
      lastFireTime = now;

      const bx = cx();
      const by = cy();
      const barrelLen = 30;
      const startX = bx + Math.cos(aimAngle) * barrelLen;
      const startY = by + Math.sin(aimAngle) * barrelLen;

      // Raycast: find nearest enemy along the beam
      const beamLen = Math.max(canvas.width, canvas.height) * 1.5;
      const endX = bx + Math.cos(aimAngle) * beamLen;
      const endY = by + Math.sin(aimAngle) * beamLen;

      let hitEnemy = null;
      let hitDist = Infinity;

      for (const enemy of enemies) {
        const dist = lineCircleIntersect(startX, startY, endX, endY, enemy.x, enemy.y, enemy.radius);
        if (dist !== null && dist < hitDist) {
          hitDist = dist;
          hitEnemy = enemy;
        }
      }

      let beamEndX, beamEndY;
      if (hitEnemy) {
        beamEndX = startX + Math.cos(aimAngle) * hitDist;
        beamEndY = startY + Math.sin(aimAngle) * hitDist;
        hitEnemy.hp--;
        hitEnemy.flashTimer = 8;
        if (hitEnemy.hp <= 0) {
          score += hitEnemy.points;
          spawnExplosion(hitEnemy.x, hitEnemy.y, hitEnemy.color, hitEnemy.radius);
          enemies.splice(enemies.indexOf(hitEnemy), 1);
          enemiesRemaining--;
        }
      } else {
        beamEndX = endX;
        beamEndY = endY;
      }

      beams.push({
        x1: startX, y1: startY,
        x2: beamEndX, y2: beamEndY,
        life: BEAM_DURATION,
        maxLife: BEAM_DURATION,
        color: '#44ddff',
      });
    }

    // --- Line-Circle Intersection ---
    function lineCircleIntersect(x1, y1, x2, y2, cx, cy, r) {
      const dx = x2 - x1;
      const dy = y2 - y1;
      const fx = x1 - cx;
      const fy = y1 - cy;
      const a = dx * dx + dy * dy;
      const b = 2 * (fx * dx + fy * dy);
      const c = fx * fx + fy * fy - r * r;
      let disc = b * b - 4 * a * c;
      if (disc < 0) return null;
      disc = Math.sqrt(disc);
      const t1 = (-b - disc) / (2 * a);
      const t2 = (-b + disc) / (2 * a);
      if (t1 >= 0 && t1 <= 1) return t1 * Math.sqrt(a);
      if (t2 >= 0 && t2 <= 1) return t2 * Math.sqrt(a);
      return null;
    }

    // --- Particles ---
    function spawnExplosion(x, y, color, size) {
      const count = Math.min(size * 2, 30);
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 4 + 1;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 30 + Math.random() * 20,
          maxLife: 50,
          size: Math.random() * 3 + 1,
          color,
        });
      }
    }

    // --- Spawn Enemies ---
    function getEnemyTypesForWave(w) {
      const types = ['basic'];
      if (w >= 10) types.push('fast');
      if (w >= 20) types.push('armored');
      if (w >= 30) types.push('shielded');
      if (w >= 40) types.push('zigzag');
      return types;
    }

    function spawnEnemy(type) {
      const def = ENEMY_TYPES[type];
      const W = canvas.width;
      const H = canvas.height;
      // Random edge position
      const side = Math.floor(Math.random() * 4);
      let x, y;
      switch (side) {
        case 0: x = Math.random() * W; y = -SPAWN_MARGIN; break;           // top
        case 1: x = W + SPAWN_MARGIN; y = Math.random() * H; break;        // right
        case 2: x = Math.random() * W; y = H + SPAWN_MARGIN; break;        // bottom
        case 3: x = -SPAWN_MARGIN; y = Math.random() * H; break;           // left
      }

      const speedScale = 1 + wave * 0.01;
      enemies.push({
        x, y,
        hp: def.hp,
        maxHp: def.hp,
        radius: def.radius,
        speed: def.speed * speedScale * (0.9 + Math.random() * 0.2),
        color: def.color,
        glow: def.glow,
        points: def.points,
        type: def.name,
        flashTimer: 0,
        angle: 0,
        zigTimer: Math.random() * Math.PI * 2,
        spawnAngle: Math.random() * Math.PI * 2,
        trailHistory: [],
      });
    }

    function startWave(w) {
      wave = w;
      const count = Math.min(3 + Math.floor(w * 0.8), 83);
      const isBossWave = w % 10 === 0 && w > 0;
      spawnQueue = count;
      if (isBossWave) spawnQueue++;
      enemiesRemaining = spawnQueue;
      spawnTimer = 0;

      // Spawn boss immediately on boss waves
      if (isBossWave && w >= 50) {
        spawnEnemy('boss');
        spawnQueue--;
      }
    }

    // --- Game Flow ---
    function startGame() {
      state = 'waveAnnounce';
      hp = MAX_HP;
      score = 0;
      wave = 0;
      enemies = [];
      particles = [];
      beams = [];
      waveAnnounceDuration = 90;
      startWave(1);
    }

    // --- Update ---
    let lastTime = 0;
    function update(dt) {
      globalTick++;
      starOffset += 0.0002;

      if (state === 'waveAnnounce') {
        waveAnnounceDuration--;
        if (waveAnnounceDuration <= 0) {
          state = 'playing';
        }
        return;
      }

      if (state !== 'playing') return;

      // Spawn enemies from queue
      if (spawnQueue > 0) {
        spawnTimer -= dt;
        if (spawnTimer <= 0) {
          if (enemies.length < MAX_ENEMIES_ALIVE) {
            const types = getEnemyTypesForWave(wave);
            const type = types[Math.floor(Math.random() * types.length)];
            spawnEnemy(type);
            spawnQueue--;
          }
          spawnTimer = Math.max(100, 600 - wave * 5);
        }
      }

      // Update enemies
      const centerX = cx();
      const centerY = cy();
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        const dx = centerX - e.x;
        const dy = centerY - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if (e.flashTimer > 0) e.flashTimer--;

        // Store trail history for zigzag/fast before moving
        if (e.type === 'zigzag' || e.type === 'fast') {
          e.trailHistory.push({ x: e.x, y: e.y });
          if (e.trailHistory.length > 5) e.trailHistory.shift();
        }

        if (e.type === 'zigzag') {
          e.zigTimer += 0.08;
          const perpX = -dy / dist;
          const perpY = dx / dist;
          const zigAmt = Math.sin(e.zigTimer) * 3;
          e.x += (dx / dist) * e.speed + perpX * zigAmt;
          e.y += (dy / dist) * e.speed + perpY * zigAmt;
        } else {
          e.x += (dx / dist) * e.speed;
          e.y += (dy / dist) * e.speed;
        }

        // Check if enemy reached turret
        if (dist < 28 + e.radius) {
          enemies.splice(i, 1);
          enemiesRemaining--;
          hp--;
          screenShake = 12;
          damageFlash = 10;
          spawnExplosion(e.x, e.y, '#ff2244', 20);
          if (hp <= 0) {
            state = 'gameover';
            if (score > highScore) {
              highScore = score;
              localStorage.setItem('ld_save', highScore);
            }
          }
        }
      }

      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vx *= 0.96;
        p.vy *= 0.96;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Update beams
      for (let i = beams.length - 1; i >= 0; i--) {
        beams[i].life--;
        if (beams[i].life <= 0) beams.splice(i, 1);
      }

      // Screen shake decay
      if (screenShake > 0) screenShake *= 0.85;
      if (screenShake < 0.5) screenShake = 0;
      if (damageFlash > 0) damageFlash--;

      // Check wave complete
      if (enemiesRemaining <= 0 && spawnQueue <= 0 && enemies.length === 0) {
        if (wave >= MAX_WAVE) {
          state = 'victory';
          if (score > highScore) {
            highScore = score;
            localStorage.setItem('ld_save', highScore);
          }
        } else {
          wavePauseDuration = 60;
          state = 'wavePause';
        }
      }
    }

    // Wave pause state (brief pause between waves)
    function updateWavePause() {
      if (state !== 'wavePause') return;
      wavePauseDuration--;
      if (wavePauseDuration <= 0) {
        startWave(wave + 1);
        waveAnnounceDuration = 90;
        state = 'waveAnnounce';
      }
    }

    // --- Draw ---
    function draw() {
      const W = canvas.width;
      const H = canvas.height;

      // Apply screen shake
      ctx.save();
      if (screenShake > 0) {
        const sx = (Math.random() - 0.5) * screenShake * 2;
        const sy = (Math.random() - 0.5) * screenShake * 2;
        ctx.translate(sx, sy);
      }

      // Background
      const bgGrad = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
      bgGrad.addColorStop(0, '#0d1a30');
      bgGrad.addColorStop(0.5, '#0a1225');
      bgGrad.addColorStop(1, '#050a15');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      // Stars
      for (const star of stars) {
        const sx = ((star.x + starOffset * star.speed * 50) % 1.1) * W;
        const sy = star.y * H;
        const flicker = 0.7 + Math.sin(performance.now() * 0.001 * star.speed * 20) * 0.3;
        ctx.globalAlpha = star.brightness * flicker;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(sx, sy, star.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      if (state === 'title') {
        drawTitle();
        ctx.restore();
        return;
      }

      // Draw enemies
      for (const e of enemies) {
        drawEnemy(e);
      }

      // Draw beams
      for (const beam of beams) {
        const alpha = beam.life / beam.maxLife;
        // Outer glow
        ctx.strokeStyle = `rgba(68, 221, 255, ${alpha * 0.3})`;
        ctx.lineWidth = 8;
        ctx.beginPath();
        ctx.moveTo(beam.x1, beam.y1);
        ctx.lineTo(beam.x2, beam.y2);
        ctx.stroke();
        // Inner beam
        ctx.strokeStyle = `rgba(200, 240, 255, ${alpha * 0.9})`;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(beam.x1, beam.y1);
        ctx.lineTo(beam.x2, beam.y2);
        ctx.stroke();
        // Core
        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(beam.x1, beam.y1);
        ctx.lineTo(beam.x2, beam.y2);
        ctx.stroke();
      }

      // Draw particles
      for (const p of particles) {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 6;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.shadowBlur = 0;

      // Draw turret
      drawTurret();

      // Damage flash overlay
      if (damageFlash > 0) {
        ctx.fillStyle = `rgba(255, 0, 0, ${damageFlash * 0.04})`;
        ctx.fillRect(0, 0, W, H);
      }

      // HUD
      drawHUD();

      // Wave announce overlay
      if (state === 'waveAnnounce') {
        drawWaveAnnounce();
      }

      // Game over
      if (state === 'gameover') {
        drawGameOver();
      }

      // Victory
      if (state === 'victory') {
        drawVictory();
      }

      ctx.restore();
    }

    function drawTitle() {
      const W = canvas.width;
      const H = canvas.height;

      // Draw a sample turret in center
      drawTurret();

      // Title
      ctx.font = `${Math.min(36, W * 0.05)}px ${FONT}`;
      ctx.textAlign = 'center';
      ctx.fillStyle = '#44ddff';
      ctx.shadowColor = '#44ddff';
      ctx.shadowBlur = 20;
      ctx.fillText('LASER DEFENSE', W / 2, H * 0.28);
      ctx.shadowBlur = 0;

      // Subtitle
      ctx.font = `${Math.min(12, W * 0.02)}px ${FONT}`;
      ctx.fillStyle = '#8899aa';
      ctx.fillText('Survive 100 waves', W / 2, H * 0.34);

      // High score
      if (highScore > 0) {
        ctx.fillStyle = '#ffaa44';
        ctx.fillText(`High Score: ${highScore}`, W / 2, H * 0.40);
      }

      // Start prompt
      const blink = Math.sin(performance.now() * 0.004) > 0;
      if (blink) {
        ctx.font = `${Math.min(14, W * 0.022)}px ${FONT}`;
        ctx.fillStyle = '#4dacff';
        ctx.fillText('CLICK OR TAP TO START', W / 2, H * 0.70);
      }

      // Controls info
      ctx.font = `${Math.min(9, W * 0.014)}px ${FONT}`;
      ctx.fillStyle = '#556677';
      ctx.fillText('Mouse/touch to aim', W / 2, H * 0.80);
      ctx.fillText('Click/tap to fire', W / 2, H * 0.85);
    }

    function drawTurret() {
      const x = cx();
      const y = cy();
      const t = performance.now();
      const timeSinceFire = t - lastFireTime;
      const recoil = timeSinceFire < 150 ? (1 - timeSinceFire / 150) * 6 : 0;

      // Base glow
      ctx.beginPath();
      ctx.arc(x, y, 36, 0, Math.PI * 2);
      const baseGlow = ctx.createRadialGradient(x, y, 12, x, y, 36);
      baseGlow.addColorStop(0, 'rgba(68, 221, 255, 0.12)');
      baseGlow.addColorStop(1, 'rgba(68, 221, 255, 0)');
      ctx.fillStyle = baseGlow;
      ctx.fill();

      // Outer rotating ring — 6 arc segments (armor panels)
      const ringRotation = t * 0.0008;
      ctx.strokeStyle = '#44ddff';
      ctx.lineWidth = 3;
      for (let i = 0; i < 6; i++) {
        const startA = ringRotation + (Math.PI * 2 / 6) * i + 0.15;
        const endA = ringRotation + (Math.PI * 2 / 6) * (i + 1) - 0.15;
        ctx.beginPath();
        ctx.arc(x, y, 26, startA, endA);
        ctx.stroke();
      }

      // Inner tick marks — 8 radial lines (plate divisions)
      ctx.strokeStyle = 'rgba(68, 221, 255, 0.3)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI * 2 / 8) * i;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(a) * 12, y + Math.sin(a) * 12);
        ctx.lineTo(x + Math.cos(a) * 18, y + Math.sin(a) * 18);
        ctx.stroke();
      }

      // Base circle
      ctx.beginPath();
      ctx.arc(x, y, 20, 0, Math.PI * 2);
      const baseGrad = ctx.createRadialGradient(x - 4, y - 4, 2, x, y, 20);
      baseGrad.addColorStop(0, '#556688');
      baseGrad.addColorStop(0.5, '#334466');
      baseGrad.addColorStop(1, '#1a2a44');
      ctx.fillStyle = baseGrad;
      ctx.fill();
      ctx.strokeStyle = '#44ddff';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Pulsing energy core
      const coreSize = 6 + Math.sin(t * 0.006) * 2;
      const coreGrad = ctx.createRadialGradient(x, y, 0, x, y, coreSize);
      coreGrad.addColorStop(0, 'rgba(150, 240, 255, 0.9)');
      coreGrad.addColorStop(0.5, 'rgba(68, 221, 255, 0.5)');
      coreGrad.addColorStop(1, 'rgba(68, 221, 255, 0)');
      ctx.beginPath();
      ctx.arc(x, y, coreSize, 0, Math.PI * 2);
      ctx.fillStyle = coreGrad;
      ctx.fill();

      // Accent crosshair lines — 4 thin lines at 90° intervals, rotating independently
      const crossRotation = t * -0.0012;
      ctx.strokeStyle = 'rgba(68, 221, 255, 0.2)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < 4; i++) {
        const a = crossRotation + (Math.PI / 2) * i;
        ctx.beginPath();
        ctx.moveTo(x + Math.cos(a) * 8, y + Math.sin(a) * 8);
        ctx.lineTo(x + Math.cos(a) * 24, y + Math.sin(a) * 24);
        ctx.stroke();
      }

      // Dual barrels
      const barrelLen = 30 - recoil;
      const barrelW = 3;
      const spacing = 6;
      const pX = Math.cos(aimAngle + Math.PI / 2);
      const pY = Math.sin(aimAngle + Math.PI / 2);

      for (let side = -1; side <= 1; side += 2) {
        const offX = pX * spacing / 2 * side;
        const offY = pY * spacing / 2 * side;
        const sx = x + offX;
        const sy = y + offY;
        const ex = sx + Math.cos(aimAngle) * barrelLen;
        const ey = sy + Math.sin(aimAngle) * barrelLen;
        const bpx = Math.cos(aimAngle + Math.PI / 2) * barrelW;
        const bpy = Math.sin(aimAngle + Math.PI / 2) * barrelW;

        ctx.beginPath();
        ctx.moveTo(sx + bpx, sy + bpy);
        ctx.lineTo(ex + bpx, ey + bpy);
        ctx.lineTo(ex - bpx, ey - bpy);
        ctx.lineTo(sx - bpx, sy - bpy);
        ctx.closePath();
        const barrelGrad = ctx.createLinearGradient(sx + bpx, sy + bpy, sx - bpx, sy - bpy);
        barrelGrad.addColorStop(0, '#3a5577');
        barrelGrad.addColorStop(0.5, '#4a7799');
        barrelGrad.addColorStop(1, '#3a5577');
        ctx.fillStyle = barrelGrad;
        ctx.fill();
        ctx.strokeStyle = '#44ddff';
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // Barrel tip glow
        ctx.beginPath();
        ctx.arc(ex, ey, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(68, 221, 255, 0.6)';
        ctx.fill();
      }

      // Fire pulse
      if (timeSinceFire < 150) {
        const pulse = 1 - timeSinceFire / 150;
        const tipX = x + Math.cos(aimAngle) * barrelLen;
        const tipY = y + Math.sin(aimAngle) * barrelLen;
        ctx.beginPath();
        ctx.arc(tipX, tipY, 8 + pulse * 8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(68, 221, 255, ${pulse * 0.5})`;
        ctx.fill();
      }
    }

    function drawEnemy(e) {
      ctx.save();
      const glow = e.flashTimer > 0 ? '#ffffff' : e.glow;
      const fillColor = e.flashTimer > 0 ? '#ffffff' : e.color;
      const t = globalTick;

      switch (e.type) {
        case 'boss': drawBoss(e, fillColor, glow, t); break;
        case 'armored': drawArmored(e, fillColor, glow, t); break;
        case 'shielded': drawShielded(e, fillColor, glow, t); break;
        case 'fast': drawFast(e, fillColor, glow, t); break;
        case 'zigzag': drawZigzag(e, fillColor, glow, t); break;
        default: drawBasic(e, fillColor, glow, t); break;
      }

      // HP bar for multi-hit enemies
      if (e.maxHp > 1 && e.hp > 0) {
        ctx.globalAlpha = 1;
        const barW = e.radius * 2;
        const barH = 3;
        const barX = e.x - barW / 2;
        const barY = e.y - e.radius - 8;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(barX, barY, barW, barH);
        ctx.fillStyle = e.color;
        ctx.fillRect(barX, barY, barW * (e.hp / e.maxHp), barH);
      }

      ctx.restore();
    }

    // --- Basic (green) — Alien Drone ---
    function drawBasic(e, fillColor, glow, t) {
      // Manual glow circle (replaces shadowBlur)
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + 6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(68, 255, 102, 0.08)';
      ctx.fill();

      // Main orb
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(e.x - 2, e.y - 2, 1, e.x, e.y, e.radius);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.3, fillColor);
      grad.addColorStop(1, 'rgba(0, 60, 0, 0.6)');
      ctx.fillStyle = grad;
      ctx.fill();

      // Segmented outer shell — 4 panel-line arcs
      ctx.strokeStyle = 'rgba(200, 255, 200, 0.4)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const a = e.spawnAngle + (Math.PI / 2) * i + 0.3;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.radius - 1, a, a + 0.9);
        ctx.stroke();
      }

      // Internal circuitry lines
      ctx.strokeStyle = 'rgba(100, 255, 150, 0.2)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(e.x - e.radius * 0.5, e.y);
      ctx.lineTo(e.x + e.radius * 0.5, e.y);
      ctx.moveTo(e.x, e.y - e.radius * 0.5);
      ctx.lineTo(e.x, e.y + e.radius * 0.5);
      ctx.stroke();

      // Central tracking eye (faces turret)
      const eyeAngle = Math.atan2(cy() - e.y, cx() - e.x);
      const eyeDist = 3;
      const eyeX = e.x + Math.cos(eyeAngle) * eyeDist;
      const eyeY = e.y + Math.sin(eyeAngle) * eyeDist;
      ctx.beginPath();
      ctx.arc(eyeX, eyeY, 2.5, 0, Math.PI * 2);
      ctx.fillStyle = '#ffffff';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(eyeX + Math.cos(eyeAngle) * 0.8, eyeY + Math.sin(eyeAngle) * 0.8, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = '#003300';
      ctx.fill();

      // Antenna bumps (2 small rotating circles)
      const antAngle = t * 0.05 + e.spawnAngle;
      for (let i = -1; i <= 1; i += 2) {
        const ax = e.x + Math.cos(antAngle + i * 0.8) * (e.radius + 4);
        const ay = e.y + Math.sin(antAngle + i * 0.8) * (e.radius + 4);
        ctx.beginPath();
        ctx.arc(ax, ay, 2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(68, 255, 102, 0.6)';
        ctx.fill();
      }
    }

    // --- Fast (yellow) — Dart/Arrow ---
    function drawFast(e, fillColor, glow, t) {
      // Afterimage trail
      if (e.trailHistory.length > 0) {
        for (let i = 0; i < Math.min(e.trailHistory.length, 3); i++) {
          const trail = e.trailHistory[e.trailHistory.length - 1 - i];
          const alpha = (3 - i) / 3 * 0.25;
          ctx.globalAlpha = alpha;
          const ta = Math.atan2(cy() - trail.y, cx() - trail.x);
          ctx.save();
          ctx.translate(trail.x, trail.y);
          ctx.rotate(ta);
          ctx.beginPath();
          ctx.moveTo(e.radius + 2, 0);
          ctx.lineTo(-e.radius, -e.radius * 0.6);
          ctx.lineTo(-e.radius * 0.5, 0);
          ctx.lineTo(-e.radius, e.radius * 0.6);
          ctx.closePath();
          ctx.fillStyle = fillColor;
          ctx.fill();
          ctx.restore();
        }
        ctx.globalAlpha = 1;
      }

      // Movement angle toward turret
      const moveAngle = Math.atan2(cy() - e.y, cx() - e.x);

      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(moveAngle);

      // Manual glow
      ctx.beginPath();
      ctx.arc(0, 0, e.radius + 5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 221, 68, 0.06)';
      ctx.fill();

      // Main dart body — pointed triangle
      ctx.beginPath();
      ctx.moveTo(e.radius + 2, 0);
      ctx.lineTo(-e.radius, -e.radius * 0.6);
      ctx.lineTo(-e.radius * 0.5, 0);
      ctx.lineTo(-e.radius, e.radius * 0.6);
      ctx.closePath();
      ctx.fillStyle = fillColor;
      ctx.fill();
      ctx.strokeStyle = glow;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Wing fins
      ctx.fillStyle = 'rgba(255, 200, 50, 0.6)';
      ctx.beginPath();
      ctx.moveTo(-e.radius * 0.3, -e.radius * 0.5);
      ctx.lineTo(-e.radius * 0.8, -e.radius * 1.1);
      ctx.lineTo(-e.radius * 0.7, -e.radius * 0.4);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-e.radius * 0.3, e.radius * 0.5);
      ctx.lineTo(-e.radius * 0.8, e.radius * 1.1);
      ctx.lineTo(-e.radius * 0.7, e.radius * 0.4);
      ctx.closePath();
      ctx.fill();

      // Thruster glow at tail
      const thrustPulse = 0.6 + Math.sin(t * 0.3) * 0.4;
      const thrustGrad = ctx.createRadialGradient(-e.radius * 0.5, 0, 0, -e.radius * 0.5, 0, e.radius * 0.6);
      thrustGrad.addColorStop(0, `rgba(255, 200, 50, ${thrustPulse})`);
      thrustGrad.addColorStop(1, 'rgba(255, 100, 0, 0)');
      ctx.beginPath();
      ctx.arc(-e.radius * 0.5, 0, e.radius * 0.6, 0, Math.PI * 2);
      ctx.fillStyle = thrustGrad;
      ctx.fill();

      ctx.restore();
    }

    // --- Armored (red) — Heavy Tank ---
    function drawArmored(e, fillColor, glow, t) {
      // Manual glow
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + 8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 68, 68, 0.06)';
      ctx.fill();

      ctx.save();
      ctx.translate(e.x, e.y);
      const rot = performance.now() * 0.001;
      ctx.rotate(rot);

      const r = e.radius;

      // 8-sided octagon body
      ctx.beginPath();
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI * 2 / 8) * i;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = fillColor;
      ctx.fill();
      ctx.strokeStyle = '#ff8888';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Plate division lines through center
      ctx.strokeStyle = 'rgba(255, 150, 150, 0.3)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const a = (Math.PI / 4) * i;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * -r, Math.sin(a) * -r);
        ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
        ctx.stroke();
      }

      // Rivet dots at each vertex
      ctx.fillStyle = '#ffaaaa';
      for (let i = 0; i < 8; i++) {
        const a = (Math.PI * 2 / 8) * i;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * (r - 3), Math.sin(a) * (r - 3), 1.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // Pulsing inner core visible through gaps
      const coreSize = 5 + Math.sin(t * 0.08) * 2;
      const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, coreSize);
      coreGrad.addColorStop(0, 'rgba(255, 200, 150, 0.9)');
      coreGrad.addColorStop(1, 'rgba(255, 68, 68, 0)');
      ctx.beginPath();
      ctx.arc(0, 0, coreSize, 0, Math.PI * 2);
      ctx.fillStyle = coreGrad;
      ctx.fill();

      // Damage cracks when HP < max
      if (e.hp < e.maxHp) {
        ctx.strokeStyle = 'rgba(255, 255, 200, 0.7)';
        ctx.lineWidth = 1;
        const cracks = e.maxHp - e.hp;
        for (let c = 0; c < cracks; c++) {
          const ca = e.spawnAngle + c * 2.5;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          let crX = Math.cos(ca) * r * 0.3;
          let crY = Math.sin(ca) * r * 0.3;
          ctx.lineTo(crX, crY);
          crX += Math.cos(ca + 0.5) * r * 0.3;
          crY += Math.sin(ca + 0.5) * r * 0.3;
          ctx.lineTo(crX, crY);
          crX += Math.cos(ca - 0.3) * r * 0.3;
          crY += Math.sin(ca - 0.3) * r * 0.3;
          ctx.lineTo(crX, crY);
          ctx.stroke();
        }
      }

      ctx.restore();
    }

    // --- Shielded (purple) — Crystalline Entity ---
    function drawShielded(e, fillColor, glow, t) {
      // Manual glow
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius + 8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(204, 68, 255, 0.06)';
      ctx.fill();

      // Core orb (smaller r10)
      ctx.beginPath();
      ctx.arc(e.x, e.y, 10, 0, Math.PI * 2);
      ctx.fillStyle = fillColor;
      ctx.fill();

      // Swirling internal pattern
      ctx.strokeStyle = 'rgba(255, 200, 255, 0.4)';
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 3; i++) {
        const sa = t * 0.04 + (Math.PI * 2 / 3) * i;
        ctx.beginPath();
        ctx.arc(e.x, e.y, 6, sa, sa + 1.2);
        ctx.stroke();
      }

      // Orbiting shield fragments — e.hp arc segments
      const fragCount = e.hp;
      const orbitR = e.radius + 3;
      const orbitSpeed = t * 0.03;
      const arcLen = Math.PI * 2 / Math.max(fragCount, 1) - 0.3;

      for (let i = 0; i < fragCount; i++) {
        const baseA = orbitSpeed + (Math.PI * 2 / fragCount) * i;

        // Energy tendril connecting fragment to core
        const midA = baseA + arcLen / 2;
        const fragX = e.x + Math.cos(midA) * orbitR;
        const fragY = e.y + Math.sin(midA) * orbitR;
        ctx.strokeStyle = `rgba(204, 68, 255, ${0.15 + Math.sin(t * 0.1 + i) * 0.1})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(e.x, e.y);
        ctx.lineTo(fragX, fragY);
        ctx.stroke();

        // Fragment arc
        ctx.strokeStyle = glow;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(e.x, e.y, orbitR, baseA, baseA + arcLen);
        ctx.stroke();
      }
    }

    // --- Zigzag (cyan) — Glitch/Holographic ---
    function drawZigzag(e, fillColor, glow, t) {
      // Periodic flicker
      const flickerCycle = t % 30;
      const flickering = flickerCycle >= 28;
      const bodyAlpha = flickering ? 0.3 : 0.7;

      // Afterimage trail
      if (e.trailHistory.length > 0) {
        for (let i = 0; i < Math.min(e.trailHistory.length, 3); i++) {
          const trail = e.trailHistory[e.trailHistory.length - 1 - i];
          const alpha = (3 - i) / 3 * 0.15;
          ctx.globalAlpha = alpha;
          ctx.beginPath();
          ctx.arc(trail.x, trail.y, e.radius, 0, Math.PI * 2);
          ctx.fillStyle = fillColor;
          ctx.fill();
        }
      }

      ctx.globalAlpha = bodyAlpha;

      // Chromatic aberration — red/blue offset circles
      ctx.beginPath();
      ctx.arc(e.x - 1.5, e.y, e.radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 50, 50, 0.15)';
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e.x + 1.5, e.y, e.radius, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(50, 50, 255, 0.15)';
      ctx.fill();

      // Main body (solid fill for performance)
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
      ctx.fillStyle = fillColor;
      ctx.fill();

      // Scrolling scan lines
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
      ctx.lineWidth = 0.5;
      const scanOffset = (t * 0.5) % 4;
      ctx.save();
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
      ctx.clip();
      for (let sy = -e.radius; sy <= e.radius; sy += 4) {
        const lineY = e.y + sy + scanOffset;
        ctx.beginPath();
        ctx.moveTo(e.x - e.radius, lineY);
        ctx.lineTo(e.x + e.radius, lineY);
        ctx.stroke();
      }
      ctx.restore();

      ctx.globalAlpha = 1;
    }

    // --- Boss (orange) — Massive Mothership ---
    function drawBoss(e, fillColor, glow, t) {
      const r = e.radius;
      const hpRatio = e.hp / e.maxHp;
      const pulseSpeed = hpRatio < 0.3 ? 0.15 : 0.05;

      // Danger aura glow ring beyond hitbox
      ctx.beginPath();
      ctx.arc(e.x, e.y, r + 12, 0, Math.PI * 2);
      const auraGrad = ctx.createRadialGradient(e.x, e.y, r, e.x, e.y, r + 12);
      auraGrad.addColorStop(0, 'rgba(255, 136, 0, 0.15)');
      auraGrad.addColorStop(1, 'rgba(255, 136, 0, 0)');
      ctx.fillStyle = auraGrad;
      ctx.fill();

      // Boss gets shadowBlur
      ctx.shadowColor = glow;
      ctx.shadowBlur = 15;

      // 12-sided dodecagon body
      ctx.beginPath();
      for (let i = 0; i < 12; i++) {
        const a = (Math.PI * 2 / 12) * i - Math.PI / 2;
        const px = e.x + Math.cos(a) * r;
        const py = e.y + Math.sin(a) * r;
        if (i === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      const bodyGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r);
      bodyGrad.addColorStop(0, '#ffcc66');
      bodyGrad.addColorStop(0.5, fillColor);
      bodyGrad.addColorStop(1, 'rgba(255, 100, 0, 0.7)');
      ctx.fillStyle = bodyGrad;
      ctx.fill();
      ctx.strokeStyle = glow;
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.shadowBlur = 0;

      // 8 trapezoidal armor plate segments between r16-r28 (disappear as HP drops)
      const platesVisible = Math.ceil(8 * hpRatio);
      const plateRot = performance.now() * 0.0005;
      ctx.fillStyle = 'rgba(200, 120, 30, 0.4)';
      ctx.strokeStyle = 'rgba(255, 180, 80, 0.5)';
      ctx.lineWidth = 1;
      for (let i = 0; i < platesVisible; i++) {
        const a1 = plateRot + (Math.PI * 2 / 8) * i + 0.05;
        const a2 = plateRot + (Math.PI * 2 / 8) * (i + 1) - 0.05;
        const inner = 16;
        const outer = 28;
        ctx.beginPath();
        ctx.moveTo(e.x + Math.cos(a1) * inner, e.y + Math.sin(a1) * inner);
        ctx.lineTo(e.x + Math.cos(a1) * outer, e.y + Math.sin(a1) * outer);
        ctx.lineTo(e.x + Math.cos(a2) * outer, e.y + Math.sin(a2) * outer);
        ctx.lineTo(e.x + Math.cos(a2) * inner, e.y + Math.sin(a2) * inner);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();
      }

      // Energy veins radiating from core (wave-pulsing brightness)
      for (let i = 0; i < 6; i++) {
        const a = (Math.PI * 2 / 6) * i;
        const veinAlpha = 0.2 + Math.sin(t * 0.08 + i) * 0.15;
        ctx.strokeStyle = `rgba(255, 200, 80, ${veinAlpha})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(e.x, e.y);
        ctx.lineTo(e.x + Math.cos(a) * (r - 4), e.y + Math.sin(a) * (r - 4));
        ctx.stroke();
      }

      // 6 rotating weapon pod circles on outer ring
      const podRot = performance.now() * 0.002;
      for (let i = 0; i < 6; i++) {
        const a = podRot + (Math.PI * 2 / 6) * i;
        const px = e.x + Math.cos(a) * (r - 8);
        const py = e.y + Math.sin(a) * (r - 8);
        ctx.beginPath();
        ctx.arc(px, py, 3, 0, Math.PI * 2);
        ctx.fillStyle = '#ffdd88';
        ctx.fill();
        ctx.strokeStyle = '#ff8800';
        ctx.lineWidth = 0.8;
        ctx.stroke();
      }

      // Central pulsing eye/core (r6-10 oscillation, faster when critical)
      const coreR = 6 + Math.sin(t * pulseSpeed) * 4;
      const coreGrad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, coreR);
      coreGrad.addColorStop(0, 'rgba(255, 255, 200, 0.95)');
      coreGrad.addColorStop(0.5, 'rgba(255, 200, 80, 0.6)');
      coreGrad.addColorStop(1, 'rgba(255, 136, 0, 0)');
      ctx.beginPath();
      ctx.arc(e.x, e.y, coreR, 0, Math.PI * 2);
      ctx.fillStyle = coreGrad;
      ctx.fill();
    }

    function drawHUD() {
      const W = canvas.width;
      ctx.font = `${Math.min(12, W * 0.018)}px ${FONT}`;

      // HP (top-left) — shield icons
      const hpX = 60;
      const hpY = 30;
      for (let i = 0; i < MAX_HP; i++) {
        ctx.fillStyle = i < hp ? '#44ddff' : '#1a2a44';
        ctx.shadowColor = i < hp ? '#44ddff' : 'transparent';
        ctx.shadowBlur = i < hp ? 8 : 0;
        ctx.font = `${Math.min(16, W * 0.025)}px ${FONT}`;
        ctx.fillText('\u2665', hpX + i * 28, hpY);
      }
      ctx.shadowBlur = 0;

      // Wave (top-center)
      ctx.textAlign = 'center';
      ctx.font = `${Math.min(12, W * 0.018)}px ${FONT}`;
      ctx.fillStyle = '#8899aa';
      ctx.fillText(`WAVE ${wave}`, W / 2, 30);

      // Score (top-right)
      ctx.textAlign = 'right';
      ctx.fillStyle = '#ffaa44';
      ctx.fillText(`${score}`, W - 20, 30);

      // Enemies remaining (below wave)
      if (state === 'playing') {
        ctx.textAlign = 'center';
        ctx.font = `${Math.min(8, W * 0.012)}px ${FONT}`;
        ctx.fillStyle = '#556677';
        ctx.fillText(`${enemies.length + spawnQueue} remaining`, W / 2, 50);
      }

      ctx.textAlign = 'left';
    }

    function drawWaveAnnounce() {
      const W = canvas.width;
      const H = canvas.height;
      const progress = 1 - waveAnnounceDuration / 90;
      let alpha;
      if (progress < 0.2) alpha = progress / 0.2;
      else if (progress > 0.7) alpha = (1 - progress) / 0.3;
      else alpha = 1;

      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.font = `${Math.min(32, W * 0.05)}px ${FONT}`;
      ctx.fillStyle = '#44ddff';
      ctx.shadowColor = '#44ddff';
      ctx.shadowBlur = 20;
      ctx.fillText(`WAVE ${wave}`, W / 2, H / 2 - 10);

      if (wave % 10 === 0 && wave > 0 && wave >= 50) {
        ctx.font = `${Math.min(16, W * 0.025)}px ${FONT}`;
        ctx.fillStyle = '#ff8800';
        ctx.shadowColor = '#ff8800';
        ctx.fillText('BOSS INCOMING', W / 2, H / 2 + 30);
      }

      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.textAlign = 'left';
    }

    function drawGameOver() {
      const W = canvas.width;
      const H = canvas.height;

      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = 'center';
      ctx.font = `${Math.min(32, W * 0.05)}px ${FONT}`;
      ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 20;
      ctx.fillText('GAME OVER', W / 2, H * 0.35);
      ctx.shadowBlur = 0;

      ctx.font = `${Math.min(14, W * 0.022)}px ${FONT}`;
      ctx.fillStyle = '#aabbcc';
      ctx.fillText(`Wave: ${wave}`, W / 2, H * 0.45);
      ctx.fillText(`Score: ${score}`, W / 2, H * 0.52);
      ctx.fillStyle = '#ffaa44';
      ctx.fillText(`High Score: ${highScore}`, W / 2, H * 0.59);

      const blink = Math.sin(performance.now() * 0.004) > 0;
      if (blink) {
        ctx.font = `${Math.min(11, W * 0.017)}px ${FONT}`;
        ctx.fillStyle = '#4dacff';
        ctx.fillText('CLICK OR TAP TO CONTINUE', W / 2, H * 0.72);
      }
      ctx.textAlign = 'left';
    }

    function drawVictory() {
      const W = canvas.width;
      const H = canvas.height;

      ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
      ctx.fillRect(0, 0, W, H);

      ctx.textAlign = 'center';
      ctx.font = `${Math.min(32, W * 0.05)}px ${FONT}`;
      ctx.fillStyle = '#44ff66';
      ctx.shadowColor = '#44ff66';
      ctx.shadowBlur = 20;
      ctx.fillText('VICTORY!', W / 2, H * 0.30);
      ctx.shadowBlur = 0;

      ctx.font = `${Math.min(14, W * 0.022)}px ${FONT}`;
      ctx.fillStyle = '#aabbcc';
      ctx.fillText('All 100 waves cleared!', W / 2, H * 0.42);
      ctx.fillText(`Final Score: ${score}`, W / 2, H * 0.50);
      ctx.fillStyle = '#ffaa44';
      ctx.fillText(`High Score: ${highScore}`, W / 2, H * 0.57);

      const blink = Math.sin(performance.now() * 0.004) > 0;
      if (blink) {
        ctx.font = `${Math.min(11, W * 0.017)}px ${FONT}`;
        ctx.fillStyle = '#4dacff';
        ctx.fillText('CLICK OR TAP TO CONTINUE', W / 2, H * 0.72);
      }
      ctx.textAlign = 'left';
    }

    // --- Main Loop ---
    let prevTime = performance.now();
    function gameLoop(timestamp) {
      const dt = timestamp - prevTime;
      prevTime = timestamp;

      update(dt);
      updateWavePause();
      draw();
      requestAnimationFrame(gameLoop);
    }
    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
