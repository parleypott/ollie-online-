<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick the Plot - Ollie's Universe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    min-height: 100vh;
    overflow-x: hidden;
  }

  #particles {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 700px; margin: 0 auto; padding: 20px;
    min-height: 100vh; display: flex; flex-direction: column;
    justify-content: center;
  }

  h1 {
    text-align: center; font-size: 2.5em; margin-bottom: 10px;
    background: linear-gradient(135deg, #f093fb, #f5576c, #4facfe);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
  }

  .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 1.1em; }

  .stats-bar {
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(255,255,255,0.05); border-radius: 12px;
    padding: 12px 20px; margin-bottom: 20px; flex-wrap: wrap; gap: 8px;
  }

  .stat { font-size: 0.9em; color: #aaa; }
  .stat span { color: #4facfe; font-weight: bold; }

  .theme-badge {
    display: inline-block; padding: 4px 14px; border-radius: 20px;
    font-size: 0.85em; font-weight: bold; color: #fff;
    background: linear-gradient(135deg, var(--theme-color1), var(--theme-color2));
  }

  .card {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 30px; margin-bottom: 20px;
    backdrop-filter: blur(10px); animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .story-text { font-size: 1.15em; line-height: 1.7; margin-bottom: 25px; color: #d0d0d0; }

  .choices { display: flex; flex-direction: column; gap: 12px; }

  .choice-btn {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 16px 20px; color: #e0e0e0;
    font-size: 1.05em; cursor: pointer; transition: all 0.3s ease;
    text-align: left; position: relative; overflow: hidden;
  }

  .choice-btn:hover {
    background: rgba(79, 172, 254, 0.15); border-color: #4facfe;
    transform: translateX(8px); box-shadow: 0 0 20px rgba(79,172,254,0.2);
  }

  .choice-btn::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, var(--theme-color1), var(--theme-color2));
    opacity: 0; transition: opacity 0.3s;
  }

  .choice-btn:hover::before { opacity: 1; }

  .choice-btn.glow-green {
    border-color: #4ade80; background: rgba(74,222,128,0.13);
    pointer-events: none;
  }
  .choice-btn.glow-red {
    border-color: #f87171; background: rgba(248,113,113,0.13);
    pointer-events: none;
  }
  .choice-btn.dim {
    opacity: 0.4; pointer-events: none;
  }

  .result-card { text-align: center; padding: 40px 30px; }
  .result-icon { font-size: 4em; margin-bottom: 15px; }
  .result-title { font-size: 1.8em; margin-bottom: 15px; font-weight: bold; }
  .win .result-title { color: #4ade80; }
  .lose .result-title { color: #f87171; }
  .result-msg { font-size: 1.1em; color: #aaa; margin-bottom: 25px; line-height: 1.6; }

  .btn-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .action-btn {
    padding: 12px 28px; border-radius: 10px; border: none;
    font-size: 1em; cursor: pointer; font-weight: bold; transition: all 0.3s;
  }

  .btn-primary { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #000; }
  .btn-secondary {
    background: rgba(255,255,255,0.1); color: #e0e0e0;
    border: 1px solid rgba(255,255,255,0.2);
  }

  .action-btn:hover { transform: scale(1.05); }

  .theme-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px; max-height: 65vh; overflow-y: auto; padding: 5px;
  }

  .theme-grid::-webkit-scrollbar { width: 6px; }
  .theme-grid::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .theme-tile {
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 14px 10px; text-align: center;
    cursor: pointer; transition: all 0.3s; font-size: 0.85em;
  }

  .theme-tile:hover {
    transform: translateY(-4px); border-color: #4facfe;
    box-shadow: 0 8px 25px rgba(79,172,254,0.2);
  }

  .theme-tile .icon { font-size: 1.8em; margin-bottom: 6px; }
  .theme-tile .name { color: #ccc; }

  .theme-tile.completed { border-color: #4ade80; }
  .theme-tile.completed .name { color: #4ade80; }
  .theme-tile.completed::after { content: ' \u2713'; color: #4ade80; font-weight: bold; }

  .progress-bar {
    width: 100%; height: 8px; background: rgba(255,255,255,0.1);
    border-radius: 4px; margin: 15px 0; overflow: hidden;
  }

  .progress-fill {
    height: 100%; border-radius: 4px; transition: width 0.5s ease;
    background: linear-gradient(90deg, #4facfe, #4ade80);
  }

  .path-trail {
    display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    margin-bottom: 18px; font-size: 0.85em; color: #888;
  }

  .path-node {
    background: rgba(255,255,255,0.08); border-radius: 8px;
    padding: 4px 10px; color: #bbb; font-size: 0.85em;
  }

  .path-node.current { color: #4facfe; border: 1px solid rgba(79,172,254,0.3); }
  .path-arrow { color: #555; }

  .depth-label {
    font-size: 0.8em; color: #666; margin-bottom: 8px; text-transform: uppercase;
    letter-spacing: 1px;
  }

  @media (max-width: 500px) {
    h1 { font-size: 1.8em; }
    .theme-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); }
    .card { padding: 20px; }
  }
</style>
</head>

// --- Particles ---
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let pts = [];
function resizeCanvas() { canvas.width = innerWidth; canvas.height = innerHeight; }
resizeCanvas(); addEventListener('resize', resizeCanvas);
for (let i = 0; i < 60; i++) pts.push({ x: Math.random()*innerWidth, y: Math.random()*innerHeight, r: Math.random()*2+0.5, dx: (Math.random()-0.5)*0.5, dy: (Math.random()-0.5)*0.5, o: Math.random()*0.4+0.1 });
function drawPts() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  pts.forEach(p => { p.x+=p.dx; p.y+=p.dy; if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0; if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(79,172,254,${p.o})`; ctx.fill(); });
  requestAnimationFrame(drawPts);
}
drawPts();

  d:{t:"On the far bank, the treasure chest sits on a weighted stone platform. This is clearly a trap.",c:[["Slide the chest off slowly while adding rocks to match the weight","win"],["Grab the chest and sprint for the exit","lose"],["Open the chest where it sits and fill your pockets","lose"]]},
},w:"You escape the cave with the treasure! You're rich!",l:"The cave collapses, trapping the treasure within forever."},

// 29 Ghost Ship
{ n:{
  s:{t:"Your fishing boat encounters a ghostly galleon in thick fog. An invisible force pulls you aboard.",c:[["Search the captain's quarters for clues","a"],["Jump overboard immediately","b"],["Start redecorating the dusty ship","c"]]},
  a:{t:"The captain's log reveals the crew is cursed. They need a compass returned to the altar below deck.",c:[["Find the compass in the cargo hold","d"],["Tell the ghosts to just use a phone's GPS","lose"],["Throw the captain's log overboard","lose"]]},
  b:{t:"You jump, but the fog is so thick you can't find your boat. Ghostly hands reach up from the dark water.",c:[["Swim faster away from the hands","lose"],["Climb back aboard the ghost ship","lose"],["Float on your back and relax","lose"]]},
  c:{t:"You start tidying up. The ghosts are deeply offended by you moving their things. They surround you angrily.",c:[["Put everything back where it was","lose"],["Keep cleaning defiantly","lose"],["Offer interior design advice","lose"]]},
  d:{t:"You have the compass! But the ghost captain himself blocks the altar, sword drawn and eyes blazing.",c:[["Show the captain his own log and remind him of his mission","win"],["Try to fight the ghost with your fists","lose"],["Put the compass on an auction site","lose"]]},
},w:"The curse lifts! The crew finds peace and you're returned safely.",l:"You join the ghostly crew for all eternity."},

// 30 Witch's Hut
{ n:{
  s:{t:"Deep in the swamp, you find a witch's crooked hut. She cackles and offers you three glowing potions.",c:[["Ask the witch what each potion does first","a"],["Drink all three potions at once","b"],["Throw the potions at her face","c"]]},
  a:{t:"She explains: one heals, one grants wisdom, one is deadly poison. She'll trade wisdom for a favor.",c:[["Agree to gather moonlit mushrooms for her","d"],["Try to steal all the potions while she talks","lose"],["Trick her into drinking the poison one","lose"]]},
  b:{t:"Mixing all three potions creates a violent reaction in your stomach. You turn bright green and float.",c:[["Try to vomit the potions out","lose"],["Enjoy the floating sensation","lose"],["Ask the witch for an antidote","lose"]]},
  c:{t:"The witch deflects the potions with a wave of her hand. She's furious and her eyes glow red.",c:[["Apologize profusely","lose"],["Run out of the hut","lose"],["Throw more things at her","lose"]]},
  d:{t:"You return with moonlit mushrooms. The witch smiles and holds out both fists. 'Which hand holds wisdom?'",c:[["Choose the hand she holds closest to her heart","win"],["Pick the left hand always","lose"],["Slap both hands to knock out all potions","lose"]]},
},w:"You gain the potion of wisdom! Your mind expands infinitely.",l:"You drink the wrong potion. Ribbit. You're a frog now."},

// 31 Sky Castle
{ n:{
  s:{t:"A magnificent castle floats in the clouds above your village. A giant beanstalk vine reaches up to it.",c:[["Climb the vine carefully, testing each grip","a"],["Chop the vine down to bring the castle to you","b"],["Build a catapult to launch yourself up","c"]]},
  a:{t:"At the top, a golden bridge leads to the castle gate. A riddle is carved in glowing letters into the stone.",c:[["Solve the riddle: 'I fly without wings, I cry without eyes'","d"],["Ignore the riddle and cross anyway","lose"],["Answer 'a bird' confidently","lose"]]},
  b:{t:"You chop the vine. The castle stays floating but now there's no way to reach it. Ever. Great plan.",c:[["Try to regrow the vine","lose"],["Build a really tall ladder","lose"],["Give up and go home","lose"]]},
  c:{t:"The catapult launches you sideways into a tree. You have a headache and some bruises.",c:[["Try again with better aim","lose"],["Give up on the catapult approach","lose"],["Launch your friend instead","lose"]]},
  d:{t:"The answer is 'a cloud'! The gate opens. Inside, a sleeping giant guards a magical golden harp.",c:[["Tiptoe past the giant and take only the harp","win"],["Wake the giant and try to fight him","lose"],["Grab everything that isn't nailed down","lose"]]},
},w:"You return with the magical harp! Your village prospers forever.",l:"The giant awakens and the sky castle crumbles."},

// 32 Desert Oasis
{ n:{
  s:{t:"Lost in a vast desert, water running low. You see a shimmer on the distant horizon.",c:[["Navigate toward it carefully using your compass","a"],["Run toward it as fast as you can","b"],["Ignore it \u2014 probably just a mirage anyway","c"]]},
  a:{t:"It's a real oasis with palm trees and fresh water! But a sandstorm is building fast on the horizon.",c:[["Take shelter behind the oasis rock formation","d"],["Try to outrun the incoming sandstorm","lose"],["Stand your ground and face the storm heroically","lose"]]},
  b:{t:"You sprint in the heat and collapse from exhaustion halfway there. Your water is empty now.",c:[["Crawl the rest of the way","lose"],["Wait for nightfall to cool down","lose"],["Dig for water in the sand","lose"]]},

  d:{t:"The sandstorm passes. It uncovers ancient ruins half-buried in the sand near the oasis!",c:[["Explore carefully and document your discovery","win"],["Dig wildly with your bare hands","lose"],["Ignore the ruins and keep traveling","lose"]]},
},w:"You discover a lost civilization's ruins! History is rewritten!",l:"Swallowed by the endless desert sands."},

// 33 Pharaoh's Tomb
{ n:{
  s:{t:"You enter the pharaoh's tomb. Hieroglyphics cover every wall with warnings of deadly traps.",c:[["Translate the hieroglyphics to learn the safe path","a"],["Walk boldly forward ignoring the warnings","b"],["Spray paint over the warnings so they can't scare you","c"]]},
  a:{t:"The safe path requires walking in the pattern of the Eye of Horus, step by step.",c:[["Trace the pattern exactly as depicted on the wall","d"],["Walk in a straight line down the center","lose"],["Dance your way across freestyle","lose"]]},

  d:{t:"You reach the burial chamber! A golden amulet glows inside the sarcophagus, but the ceiling looks rigged.",c:[["Use the stone pillars to brace the ceiling first","win"],["Grab the amulet and sprint for the exit","lose"],["Put the amulet on immediately for power","lose"]]},
},w:"You recover the ancient amulet and escape the tomb safely!",l:"Trapped in the tomb with the pharaoh's mummy. Forever."},

// 34 Mad Scientist
{ n:{
  s:{t:"A mad scientist's experiment has created a growing blob in the lab! It's absorbing everything it touches.",c:[["Check the experiment notes for a weakness","a"],["Poke the blob with a stick to test it","b"],["Feed it more chemicals to see what happens","c"]]},
  a:{t:"The notes say the blob is vulnerable to extreme cold temperatures!",c:[["Lure it into the cryo-chamber and activate the freeze","d"],["Throw ice cubes at it from across the room","lose"],["Open a window and hope it's winter outside","lose"]]},
  b:{t:"The blob absorbs the stick instantly. Then it absorbs your glove. It reaches for your arm hungrily.",c:[["Pull your arm back and run","lose"],["Poke it with a longer stick","lose"],["Let it absorb you to fight from inside","lose"]]},

  d:{t:"The blob is frozen solid! But it's already slowly thawing from the inside. You need a permanent fix.",c:[["Apply the chemical solvent listed in the scientist's notes","win"],["Leave it frozen and hope for the best","lose"],["Chip off pieces as cool souvenirs","lose"]]},
},w:"The blob is dissolved completely! The lab is saved.",l:"The blob consumes the entire building and keeps growing."},

// 35 Viking Voyage
{ n:{
  s:{t:"Your Viking longship sails into unknown waters. The sea forks around a massive rock formation.",c:[["Follow the seabirds \u2014 they always lead to land","a"],["Sail toward the swirling whirlpool","b"],["Turn back toward home waters","c"]]},
  a:{t:"Land ho! But the coastline is treacherous with sharp rocks and hidden reefs everywhere.",c:[["Send a small rowboat to scout for a safe harbor","d"],["Sail full speed straight at the rocks","lose"],["Throw crew overboard to lighten the ship","lose"]]},

  d:{t:"The scouts find a safe harbor! On shore, a rival clan challenges you for the right to this land.",c:[["Propose a fair contest of strength to share the land","win"],["Attack them immediately with full force","lose"],["Cry and sail away in defeat","lose"]]},
},w:"You win the contest! Both clans share the bountiful new land.",l:"Your longship sinks on the rocky coast."},

// 36 Enchanted Library
{ n:{
  s:{t:"Every book in the enchanted library has come alive! Characters run amok through the shelves.",c:[["Find the librarian's master catalog to restore order","a"],["Start reading books aloud to put characters back","b"],["Join the chaos and have fun with the characters","c"]]},
  a:{t:"The catalog is locked with a literary riddle: 'Name the story where a whale swallows a man.'",c:[["The Bible \u2014 Jonah and the Whale","d"],["Finding Nemo","lose"],["The Very Hungry Caterpillar","lose"]]},
  b:{t:"Reading aloud summons MORE characters! Now there are pirates fighting knights while wizards cast spells on robots.",c:[["Stop reading immediately","lose"],["Read faster to overload the system","lose"],["Pick a side in the character war","lose"]]},
  c:{t:"A dragon character from a fantasy novel mistakes you for a villain in its story and chases you with fire.",c:[["Hide behind the non-fiction section","lose"],["Try to explain you're not in its book","lose"],["Challenge the dragon to a book report contest","lose"]]},
  d:{t:"The catalog opens! You can send characters back by stamping their books with the return seal.",c:[["Stamp the books in reverse catalog order as instructed","win"],["Stamp everything randomly and hope it works","lose"],["Burn the catalog to reset everything","lose"]]},
},w:"All characters return to their books! The library is peaceful again.",l:"The characters rewrite reality itself. Chaos reigns forever."},

// 37 Monster Island
{ n:{
  s:{t:"You wash up on Monster Island after a shipwreck. Roars echo from the dense jungle interior.",c:[["Set up camp on the beach and build a signal fire","a"],["Walk into the dark jungle at night","b"],["Yell 'COME AND GET ME' at the jungle","c"]]},
  a:{t:"A small, shy monster peeks out from the tree line. It looks curious and holds out a piece of fruit.",c:[["Accept the fruit and offer something in return","d"],["Scream and throw rocks at it","lose"],["Try to ride it like a horse","lose"]]},
  b:{t:"In the pitch-dark jungle, you walk straight into a nest of giant spider-monsters. Eyes glow all around you.",c:[["Stay absolutely still","lose"],["Run in any direction","lose"],["Try to make friends in the dark","lose"]]},
  c:{t:"Something enormous responds. The ground shakes. Trees topple as a monster the size of a building approaches.",c:[["Hide behind a rock","lose"],["Yell even louder to show dominance","lose"],["Run into the ocean","lose"]]},
  d:{t:"Your new monster friend guides you through the jungle. It leads you to the island's only boat \u2014 guarded by a giant!",c:[["Have your friend distract the giant while you prep the boat","win"],["Challenge the giant monster directly","lose"],["Forget the boat and just swim for it","lose"]]},
},w:"You escape Monster Island with your new monster friend!",l:"Stranded on Monster Island. You're the newest resident."},

// 38 Royal Palace
{ n:{
  s:{t:"The royal crown has been stolen in the night! The coronation is tomorrow morning. Panic fills the palace.",c:[["Question the night guards about anything unusual","a"],["Blame the court jester immediately","b"],["Cancel the entire coronation","c"]]},
  a:{t:"A guard saw a shadow heading toward the secret passages. The passages split three ways.",c:[["Follow the passage with fresh torch marks on the walls","d"],["Choose the darkest, scariest passage","lose"],["Yell 'THIEF!' down all three and wait","lose"]]},
  b:{t:"The jester is innocent and deeply offended. He rallies the court entertainers to go on strike.",c:[["Apologize to the jester","lose"],["Arrest the jester anyway","lose"],["Try to be the jester yourself","lose"]]},
  c:{t:"The kingdom panics. Without a coronation, rival nobles declare themselves king. Civil war breaks out.",c:[["Try to find the crown now during the chaos","lose"],["Negotiate between the rival nobles","lose"],["Leave the kingdom entirely","lose"]]},
  d:{t:"You corner the thief in a dead end! It's the jealous duke. He holds the crown over a deep well.",c:[["Negotiate calmly and promise a fair, public trial","win"],["Tackle him immediately","lose"],["Offer him an even fancier crown","lose"]]},
},w:"The crown is recovered! The coronation proceeds beautifully.",l:"The crown is lost forever. No coronation today."},

// 39 Zombie Outbreak
{ n:{
  s:{t:"Zombies swarm the neighborhood! Moaning figures shuffle past your window. You need a safe place NOW.",c:[["Barricade inside the hardware store across the street","a"],["Run toward the cemetery (they probably came from there)","b"],["Invite the zombies in for tea and conversation","c"]]},
  a:{t:"You're safe in the hardware store with tools and supplies. But food is running low after two days.",c:[["Create a distraction and sneak to the grocery store","d"],["Run straight through the zombie horde","lose"],["Eat the paint and lumber in the store","lose"]]},
  b:{t:"The cemetery is the worst possible destination. Zombies are literally climbing out of every grave around you.",c:[["Run back the way you came","lose"],["Hide behind a tombstone","lose"],["Start digging to go underground","lose"]]},
  c:{t:"You open the door. The zombies don't want tea. They want brains. YOUR brains. They shuffle inside.",c:[["Push them back out the door","lose"],["Offer cookies instead of tea","lose"],["Run to the back of the house","lose"]]},
  d:{t:"You reach the grocery store with supplies! A rescue helicopter circles overhead, looking for survivors.",c:[["Build a signal flare from hardware store chemicals","win"],["Wave your hands and hope they see you","lose"],["Attract zombies to make a visible crowd from the air","lose"]]},
},w:"The helicopter spots your flare and rescues your entire group!",l:"The zombies are everywhere. Game over, man. Game over!"},

// 40 Dream World
{ n:{
  s:{t:"You're trapped in a dream! Nothing makes sense. Doors float sideways, stairs go in circles, colors taste like sounds.",c:[["Look for the golden thread \u2014 it always leads to waking","a"],["Pinch yourself over and over as hard as you can","b"],["Go deeper to sleep within the dream","c"]]},
  a:{t:"The golden thread leads through a dreamscape to three impossible doors: one laughs, one cries, one is silent.",c:[["Enter the silent door \u2014 silence is the path to waking","d"],["Enter the laughing door for something fun","lose"],["Enter the crying door to see what's sad","lose"]]},
  b:{t:"Pinching in a dream just creates copies of yourself. Now there are twelve of you, all confused.",c:[["Try to figure out which one is real","lose"],["Have all copies pinch each other","lose"],["Organize the copies into a support group","lose"]]},
  c:{t:"Going deeper leads to a dream within a dream within a dream. You forget which layer is real.",c:[["Try to wake up through all layers at once","lose"],["Accept this as your new reality","lose"],["Count your fingers to reality-check","lose"]]},
  d:{t:"Behind the silent door is a mirror showing your sleeping body. Something dark blocks the connection between you.",c:[["Speak your own true name into the mirror","win"],["Smash the mirror with your fist","lose"],["Walk away from the mirror","lose"]]},
},w:"You wake up gasping! The dream world releases you. Reality never felt so good.",l:"Lost in dreams forever, never to wake again..."},

// 41 Atlantis
{ n:{
  s:{t:"Your deep-sea probe discovers the legendary city of Atlantis! But its protective shield is failing fast.",c:[["Offer to help the Atlanteans repair their shield","a"],["Try to steal their advanced technology","b"],["Report back to the surface and return with a military force","c"]]},
  a:{t:"The shield generator needs a rare crystal. The crystal mine is infested with massive electric eels.",c:[["Use sonic pulses from your equipment to drive the eels away","d"],["Wrestle the eels out of the mine","lose"],["Use yourself as bait to lure them out","lose"]]},
  b:{t:"Atlantean security detects your theft attempt. Energy barriers trap you in a holding cell deep underwater.",c:[["Try to break through the energy barrier","lose"],["Negotiate your release","lose"],["Pretend it was a misunderstanding","lose"]]},
  c:{t:"By the time you return, the shield has failed completely. Atlantis is buried under a thousand feet of sediment.",c:[["Try to dig it out","lose"],["Search for survivors","lose"],["Write a research paper about it","lose"]]},
  d:{t:"Eels scattered! You retrieve the crystal, but it needs to be cut with extreme precision to fit.",c:[["Let the Atlantean crystal smith cut it with their water laser","win"],["Karate chop it into the right shape","lose"],["Shove it in roughly and hope it fits","lose"]]},
},w:"Atlantis is saved! You're named an honorary citizen of the deep.",l:"Atlantis sinks even deeper into the ocean abyss."},

// 42 Train Heist
{ n:{
  s:{t:"A villain has hijacked a speeding train carrying critical medical supplies. Thousands need that medicine!",c:[["Board the train at the next water stop","a"],["Stand on the tracks to stop the train","b"],["Send a strongly-worded letter to the villain","c"]]},
  a:{t:"On board! The villain's armed henchmen patrol every passenger car. You need to reach the engine.",c:[["Move across the rooftops of the train cars","d"],["Fight through every car one by one","lose"],["Hide in the bathroom until it's all over","lose"]]},
  b:{t:"The train doesn't stop. You dive out of the way at the last second, eating a mouthful of gravel.",c:[["Chase after the train on foot","lose"],["Try to find a car to chase it","lose"],["Lie there and reconsider your life choices","lose"]]},

},w:"The supply cars stop safely! The villain is arrested and medicine is delivered!",l:"The train goes over the broken bridge. Supplies lost."},

// 43 Magic School
{ n:{
  s:{t:"First day at magic school! A mysterious shimmering door appears in the hallway, visible only to new students.",c:[["Speak the welcome phrase from your acceptance letter","a"],["Kick the door open with your foot","b"],["Pretend you don't see it and walk past","c"]]},

  d:{t:"The crystal orb chose you! Your first test: make a feather float. Three incantation versions are on the board.",c:[["Use the basic form with clear pronunciation and calm focus","win"],["Shout the most powerful advanced version","lose"],["Make up your own words and wing it","lose"]]},

// 44 Rainforest
{ n:{
  s:{t:"You're a wildlife researcher in the deep rainforest. A flash flood destroys your base camp overnight.",c:[["Move to higher ground and build a temporary shelter","a"],["Stay and bail out water with your cooking pot","b"],["Build a swimming pool since it's already flooded anyway","c"]]},
  a:{t:"From higher ground, you spot the ultra-rare golden frog you've searched months for! It sits on a mossy branch.",c:[["Set up your camera quietly and document from a distance","d"],["Grab it with both hands before it escapes","lose"],["Chase it through the canopy","lose"]]},

// 45 Space Pirates
{ n:{
  s:{t:"Space pirates board your cargo vessel! They want your shipment of valuable star crystals.",c:[["Activate the ship's emergency lockdown protocols","a"],["Surrender and hand over everything immediately","b"],["Challenge the pirate captain to a dance battle","c"]]},

  b:{t:"The pirates take everything, including your personal belongings. They also take your ship. You float in an escape pod.",c:[["Send a distress signal from the tiny pod","lose"],["Try to follow the pirates in the pod","lose"],["Accept your new life as a space drifter","lose"]]},
  c:{t:"The pirate captain is genuinely confused, then annoyed. He orders his crew to take everything while you dance.",c:[["Stop dancing and fight back","lose"],["Dance harder to intimidate them","lose"],["Challenge to karaoke instead","lose"]]},
  d:{t:"Pirates breach the empty cargo bay and find nothing. The captain calls you on comms, absolutely furious.",c:[["Bluff that military reinforcements are 2 minutes away","win"],["Confess where you hid the crystals","lose"],["Laugh at them over the intercom","lose"]]},
},w:"The pirates flee in panic! Your cargo and crew are completely safe.",l:"Pirates take everything. Stranded in deep space with nothing."},

// 46 Labyrinth
{ n:{
  s:{t:"You enter a vast stone labyrinth. The walls grind and shift behind you, sealing off your path back.",c:[["Mark your path by scratching arrows on the walls","a"],["Run as fast as you can in one direction","b"],["Stand perfectly still and wait for rescue","c"]]},

  b:{t:"Running leads you in circles. You pass the same skull three times. You're hopelessly lost and exhausted.",c:[["Try running in the opposite direction","lose"],["Yell for help in the echoing corridors","lose"],["Sit down and give up","lose"]]},

// 47 Carnival
{ n:{
  s:{t:"The magical midnight carnival appears! The sign reads: 'Win three games to earn one wish!' First game: ring toss.",c:[["Study the trick carefully before throwing","a"],["Throw rings wildly at everything in sight","b"],["Demand the wish without playing any games","c"]]},

},w:"Your careful research makes scientific history! The caves are preserved.",l:"The caves collapse entirely. A treasure destroyed by greed."},

// --- Game State ---
let completed = JSON.parse(localStorage.getItem('cg2_done') || '[]');
let currentTheme = null;
let currentNode = null;
let pathHistory = []; // [{nodeId, choiceText}]

const app = document.getElementById('app');

function setC(c1, c2) {
  document.documentElement.style.setProperty('--theme-color1', c1);
  document.documentElement.style.setProperty('--theme-color2', c2);
}

function save() { localStorage.setItem('cg2_done', JSON.stringify(completed)); }

// --- Render ---
function renderMenu() {
  setC('#4facfe', '#f093fb');
  const pct = Math.round((completed.length / 50) * 100);
  app.innerHTML = `
    <h1>50 Worlds</h1>
    <p class="subtitle">Every choice leads somewhere new. Only one path wins.</p>
    <div style="margin-bottom:10px"><a href="index.html" style="color:#888;text-decoration:none;font-size:0.85em;">\u2190 Back to Ollie's Universe</a></div>
    <div class="stats-bar">
      <div class="stat">Worlds Conquered: <span>${completed.length}/50</span></div>
      <div class="stat">Progress: <span>${pct}%</span></div>
      ${completed.length === 50 ? '<div class="stat" style="color:#4ade80;font-weight:bold">ALL 50 WORLDS COMPLETE!</div>' : ''}
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="story-text" style="text-align:center;margin-bottom:15px;">
        Choose a world. Every choice branches into new scenarios.<br>Find the one true path to win!
      </div>
      <div class="theme-grid" id="tg"></div>
    </div>
    ${completed.length > 0 ? '<div class="btn-row" style="margin-top:15px"><button class="action-btn btn-secondary" onclick="resetAll()">Reset All Progress</button></div>' : ''}
  `;
  const g = document.getElementById('tg');
  THEMES.forEach(t => {
    const done = completed.includes(t.id);
    const d = document.createElement('div');
    d.className = 'theme-tile' + (done ? ' completed' : '');
    d.innerHTML = `<div class="icon">${t.icon}</div><div class="name">${t.name}</div>`;
    d.onclick = () => startTheme(t);
    g.appendChild(d);
  });
}

function startTheme(theme) {
  currentTheme = theme;
  pathHistory = [];
  goToNode('s');
}

function goToNode(nodeId) {
  currentNode = nodeId;
  const theme = currentTheme;
  const story = S[theme.id];
  const node = story.n[nodeId];
  setC(theme.c1, theme.c2);

  // Shuffle choices but track their data
  const shuffled = node.c.map((c, i) => ({ text: c[0], next: c[1], orig: i }));
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  const depth = pathHistory.length;
  const depthLabels = ['First Choice', 'Second Choice', 'Final Choice'];

  app.innerHTML = `
    <div class="stats-bar">
      <span class="theme-badge">${theme.icon} ${theme.name}</span>
      <div class="stat">Depth: <span>${depth + 1} / 3</span></div>
    </div>
    ${pathHistory.length > 0 ? `
    <div class="path-trail">
      ${pathHistory.map((p, i) => `<span class="path-node">${p.short}</span><span class="path-arrow">\u2192</span>`).join('')}
      <span class="path-node current">?</span>
    </div>` : ''}
    <div class="card">
      <div class="depth-label">${depthLabels[depth] || 'Choose wisely'}</div>
      <div class="story-text">${node.t}</div>
      <div class="choices" id="choices">
        ${shuffled.map(c =>
          `<button class="choice-btn" data-next="${c.next}" data-text="${c.text.replace(/"/g, '&quot;')}" onclick="choose(this)">${c.text}</button>`
        ).join('')}
      </div>
    </div>
    <div class="btn-row">
      <button class="action-btn btn-secondary" onclick="renderMenu()">Back to Worlds</button>
      <button class="action-btn btn-secondary" onclick="startTheme(THEMES[${theme.id}])">Restart</button>
    </div>
  `;
}

function choose(btn) {
  const next = btn.dataset.next;
  const text = btn.dataset.text;
  const story = S[currentTheme.id];

  // Highlight the chosen button
  document.querySelectorAll('.choice-btn').forEach(b => {
    b.onclick = null;
    b.style.cursor = 'default';
    if (b === btn) {
      if (next === 'win') b.classList.add('glow-green');
      else if (next === 'lose') b.classList.add('glow-red');
      else b.classList.add('glow-green'); // going to next node (could be right or wrong path)
    } else {
      b.classList.add('dim');
    }
  });

  // Short label for path trail
  const short = text.length > 25 ? text.substring(0, 22) + '...' : text;
  pathHistory.push({ short, nodeId: currentNode });

  setTimeout(() => {
    if (next === 'win') {
      renderResult(true);
    } else if (next === 'lose') {
      renderResult(false);
    } else {
      goToNode(next);
    }
  }, 800);
}

function renderResult(won) {
  const theme = currentTheme;
  const story = S[theme.id];

  if (won && !completed.includes(theme.id)) {
    completed.push(theme.id);
    save();
  }

  app.innerHTML = `
    <div class="stats-bar">
      <span class="theme-badge">${theme.icon} ${theme.name}</span>
    </div>
    <div class="path-trail">
      ${pathHistory.map(p => `<span class="path-node">${p.short}</span><span class="path-arrow">\u2192</span>`).join('')}
      <span class="path-node ${won ? 'current' : ''}" style="color:${won ? '#4ade80' : '#f87171'}">${won ? 'Victory!' : 'Dead End'}</span>
    </div>
    <div class="card result-card ${won ? 'win' : 'lose'}">
      <div class="result-icon">${won ? '\u{1F3C6}' : '\u{1F4A5}'}</div>
      <div class="result-title">${won ? 'You Win!' : 'Wrong Path!'}</div>
      <div class="result-msg">${won ? story.w : story.l}</div>
      ${!won ? '<div class="result-msg" style="color:#888;font-size:0.9em;">Every choice leads somewhere different. Try another path!</div>' : ''}
      ${completed.length === 50 && won ? '<div class="result-msg" style="color:#fbbf24;font-weight:bold;">You conquered ALL 50 worlds! True champion!</div>' : ''}
      <div class="btn-row">
        <button class="action-btn btn-primary" onclick="startTheme(THEMES[${theme.id}])">Try Again</button>
        <button class="action-btn btn-secondary" onclick="renderMenu()">All Worlds</button>
        ${won ? getNextBtn() : ''}
      </div>
    </div>
  `;
}

function getNextBtn() {
  const n = THEMES.find(t => !completed.includes(t.id));
  return n ? `<button class="action-btn btn-primary" onclick="startTheme(THEMES[${n.id}])">Next World ${n.icon}</button>` : '';
}

function resetAll() {
  if (confirm('Reset all progress? This cannot be undone.')) {
    completed = [];
    save();
    renderMenu();
  }
}

renderMenu();
</script>
