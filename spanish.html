<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>¡Palabra! — Ollie's Spanish Project</title>

<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preconnect" href="https://unpkg.com" crossorigin/>

<style>
  :root {
    --pal-paper: #FFF8E7;
    --pal-paper-deep: #F4F2E6;
    --pal-ink: #121118;
    --pal-blue: #004CFF;
    --pal-red: #DD2C1E;
    --pal-yellow: #FFBF00;
    --pal-green: #0D5921;
    --pal-burgundy: #520004;
    --pal-cool: #D9D9D9;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--pal-paper);
    color: var(--pal-ink);
    font-family: ui-monospace, 'JetBrains Mono', monospace;
    min-height: 100vh;
  }
  .boot {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: var(--pal-paper);
    gap: 16px;
    z-index: 999;
  }
  .boot-logo {
    font-family: 'Fredoka', system-ui, sans-serif;
    font-weight: 700;
    font-size: 64px;
    color: var(--pal-red);
    letter-spacing: -0.02em;
  }
  .boot-logo em {
    color: var(--pal-ink);
    font-style: italic;
    font-family: Georgia, serif;
  }
  .boot-tag {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--pal-ink);
    opacity: 0.6;
  }
  .boot-bar {
    width: 200px; height: 8px;
    border: 2px solid var(--pal-ink);
    overflow: hidden;
    margin-top: 8px;
  }
  .boot-bar::after {
    content: '';
    display: block;
    height: 100%;
    background: var(--pal-red);
    animation: boot-fill 1.6s ease-out infinite;
  }
  @keyframes boot-fill {
    0% { width: 0%; }
    100% { width: 100%; }
  }
  .boot.is-done {
    opacity: 0;
    pointer-events: none;
    transition: opacity 220ms;
  }
  .app-bar-brand { cursor: pointer; }
</style>

<link rel="stylesheet" href="newpress/bundle.css"/>

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Instrument+Sans:wght@400;500;600;700&family=Fredoka:wght@400;600;700&display=swap" media="print" onload="this.media='all'"/>
</head>
<body>
<div class="boot" id="boot">
  <div class="boot-logo">¡Palabra<em>!</em></div>
  <div class="boot-tag">Spanish Quiz Arcade · Cargando…</div>
  <div class="boot-bar"></div>
</div>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="newpress/bundle.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = { "featuredMode": "cafe" };

const App = () => {
  const { values, setTweak } = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState('lobby');
  const [questions, setQuestions] = React.useState(() => window.pickQuestions(8));
  const [score, setScore] = React.useState(0);
  const [amigo, setAmigo] = React.useState('tigre');
  const [gsOpen, setGsOpen] = React.useState(false);

  const mode = window.GAME_MODES.find(m => m.id === values.featuredMode) || window.GAME_MODES[0];

  // Hide boot splash only after app has mounted
  React.useEffect(() => {
    const boot = document.getElementById('boot');
    if (boot) {
      boot.classList.add('is-done');
      setTimeout(() => boot.remove(), 300);
    }
  }, []);

  const startGame = () => {
    setQuestions(window.pickQuestions(8));
    setScore(0);
    setScreen('game');
  };
  const finishGame = (finalScore) => { setScore(finalScore); setScreen('results'); };
  const goLobby = () => setScreen('lobby');

  const GameComp = {
    cafe: window.CafeGame, fish: window.FishGame, match: window.MatchGame,
    race: window.RaceGame, bingo: window.BingoGame, pinata: window.PinataGame,
    loteria: window.LoteriaGame, balloon: window.BalloonGame, soccer: window.SoccerGame,
  }[mode.id];

  return (
    <>
      <header className="app-bar">
        <div className="app-bar-brand" onClick={goLobby}>
          <div className="app-bar-logo">¡Palabra<em>!</em></div>
          <div className="app-bar-tag">A Spanish Quiz Arcade</div>
        </div>
        <div className="app-bar-meta">
          <span>4to GRADO</span><span>·</span>
          <span>SR. RAMÍREZ' CLASS</span><span>·</span>
          <span>SEMANA 14</span>
        </div>
      </header>

      {screen === 'lobby' && (
        <Lobby mode={mode} onStart={startGame} currentAmigo={amigo} onChangeAmigo={setAmigo}/>
      )}
      {screen === 'game' && GameComp && (
        <GameComp questions={questions} onFinish={finishGame}/>
      )}
      {screen === 'results' && (
        <Results score={score} mode={mode} amigo={amigo} onPlayAgain={startGame} onLobby={goLobby}/>
      )}

      <GameSelectButton onClick={() => setGsOpen(true)}/>
      <GameSelect
        open={gsOpen} currentId={mode.id}
        onClose={() => setGsOpen(false)}
        onPick={(id) => { setTweak('featuredMode', id); setScreen('lobby'); setGsOpen(false); }}
      />

      <TweaksPanel title="Tweaks">
        <TweakSection title="Featured Game">
          <TweakSelect
            label="Mode" value={values.featuredMode}
            onChange={v => { setTweak('featuredMode', v); setScreen('lobby'); }}
            options={window.GAME_MODES.map(m => ({ value: m.id, label: `${m.emoji}  ${m.name}` }))}
          />
        </TweakSection>
        <TweakSection title="Quick Jump">
          <TweakButton onClick={() => setScreen('lobby')}>Back to Lobby</TweakButton>
          <TweakButton onClick={startGame}>Start Game Now</TweakButton>
          <TweakButton onClick={() => { setScore(1450); setScreen('results'); }}>See Results Screen</TweakButton>
        </TweakSection>
      </TweaksPanel>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
